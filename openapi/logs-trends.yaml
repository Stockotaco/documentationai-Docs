openapi: "3.0.0"
info:
  version: 1.0.0
  title: Logs & Trends
  description: >-
    Retrieve event logs and event analytics (trend, summary, daily) for Mythic
    Analytics client tenants. All endpoints proxy the Tinybird analytics
    pipeline and return a `data` array with a `rows` count.
servers:
  - url: https://mythic-analytics.gulp.workers.dev/api/v1
security:
  - BearerAuth: []
  - AdminKeyQuery: []
paths:
  /clients/{id}/logs:
    get:
      summary: Get event logs
      operationId: getClientLogs
      description: >
        Retrieve a chronological activity stream of events for a client tenant,
        newest first. Backed by the Tinybird `pubsub_activity_stream` pipe. The
        window is controlled by `hours_back` (there is no offset-based paging).
      parameters:
        - $ref: "#/components/parameters/ClientId"
        - name: hours_back
          in: query
          description: How many hours back to include. Default `24`, min `1`, max `720`.
          required: false
          schema:
            type: integer
            default: 24
            minimum: 1
            maximum: 720
        - name: limit
          in: query
          description: Maximum events returned. Default `500`, min `1`, max `1000`.
          required: false
          schema:
            type: integer
            default: 500
            minimum: 1
            maximum: 1000
        - name: distinct_id
          in: query
          description: Filter to a single distinct (anonymous/device) id.
          required: false
          schema:
            type: string
        - name: session_id
          in: query
          description: Filter to a single session id.
          required: false
          schema:
            type: string
        - name: uuid
          in: query
          description: >
            Resolve a single event by its `event_uuid`. Lets a destination
            delivery-log row link straight to the source event that triggered it.
          required: false
          schema:
            type: string
        - name: event_type
          in: query
          description: >
            Filter by event name. Accepts a comma-separated list to return
            several event types in a single request (e.g.
            `event_type=pageview,form_submitted`) — no need to issue one
            request per type.
          required: false
          schema:
            type: string
            example: pageview,form_submitted
        - name: exclude_event_type
          in: query
          description: >
            Omit these event types (comma-separated deny-list). Applied *before*
            the `limit`, so high-volume telemetry like `$replay_summary` (which
            fires ~once per minute per recorded session) cannot crowd real events
            off the page. Composes with `event_type` (allow-list wins the set,
            exclude trims it). e.g. `exclude_event_type=$replay_summary`.
          required: false
          schema:
            type: string
            example: $replay_summary
      responses:
        "200":
          description: Event activity stream
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogListResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Analytics service not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clients/{id}/last-event:
    get:
      summary: Get last event heartbeat
      operationId: getClientLastEvent
      description: >
        Lightweight tracking heartbeat: the timestamp of the most recent event
        and the event count for a client tenant within the lookback window.
        Backed by the Tinybird `client_last_event` pipe, which reads only the
        timestamp column — orders of magnitude cheaper than `/logs`. Use this
        for high-frequency "is the pixel installed / still sending" checks
        instead of polling `/logs` with `limit=1`.
      parameters:
        - $ref: "#/components/parameters/ClientId"
        - name: hours_back
          in: query
          description: How many hours back to include. Default `24`, min `1`, max `720`.
          required: false
          schema:
            type: integer
            default: 24
            minimum: 1
            maximum: 720
      responses:
        "200":
          description: Last event heartbeat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LastEventResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Analytics service not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clients/{id}/trend:
    get:
      summary: Get event trend
      operationId: getClientTrend
      description: >
        Daily event counts for a client tenant, suitable for sparklines. Backed
        by the Tinybird `pubsub_event_trend` pipe. Provide either an explicit
        `start_date` or the `days` shorthand.
      parameters:
        - $ref: "#/components/parameters/ClientId"
        - name: days
          in: query
          description: >
            Number of days back from today. Default `14`, min `1`, max `365`.
            Ignored when `start_date` is supplied.
          required: false
          schema:
            type: integer
            default: 14
            minimum: 1
            maximum: 365
        - name: start_date
          in: query
          description: Explicit start date (ISO 8601 `YYYY-MM-DD`). Overrides `days`.
          required: false
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          description: End date (ISO 8601 `YYYY-MM-DD`). Defaults to today.
          required: false
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Daily event counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrendResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Analytics service not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clients/{id}/events/summary:
    get:
      summary: Get event type summary
      operationId: getClientEventSummary
      description: >
        Per-event-type totals for a client tenant — total events, unique users,
        and unique sessions. Backed by the Tinybird `client_event_summary` pipe.
      parameters:
        - $ref: "#/components/parameters/ClientId"
        - name: date_from
          in: query
          description: Start date (ISO 8601). Defaults to 30 days ago.
          required: false
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          description: End date (ISO 8601), inclusive.
          required: false
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Event type summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventSummaryResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Analytics service not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clients/{id}/events/daily:
    get:
      summary: Get daily event breakdown
      operationId: getClientEventDaily
      description: >
        Daily time-series of events for a client tenant — total events, unique
        users, unique sessions, and pageviews per day. Backed by the Tinybird
        `client_event_daily` pipe.
      parameters:
        - $ref: "#/components/parameters/ClientId"
        - name: date_from
          in: query
          description: Start date (ISO 8601). Defaults to 30 days ago.
          required: false
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          description: End date (ISO 8601), inclusive.
          required: false
          schema:
            type: string
            format: date
        - name: event_type
          in: query
          description: Restrict the breakdown to a single event type.
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Daily event breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventDailyResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Analytics service not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: "Admin API key as bearer token. Format: `Bearer YOUR_ADMIN_KEY`"
    AdminKeyQuery:
      type: apiKey
      in: query
      name: admin_key
      description: Alternative to the Authorization header for server-to-server scenarios.
  parameters:
    ClientId:
      name: id
      in: path
      required: true
      description: Client identifier.
      schema:
        type: string
        pattern: "^[a-zA-Z0-9_-]{1,255}$"
  schemas:
    LogEntry:
      type: object
      description: >
        A single event from the activity stream. Fields are passed through from
        the Tinybird pipe; the most useful are documented here.
      properties:
        location_id:
          type: string
          example: acme-retail
        event:
          type: string
          example: $pageview
        distinct_id:
          type: string
        user_id:
          type: string
          nullable: true
        session_id:
          type: string
        device_id:
          type: string
          nullable: true
        timestamp:
          type: string
          format: date-time
        formatted_timestamp:
          type: string
          example: "2024-06-15 14:32:10"
        properties:
          type: string
          description: Raw event properties as a JSON string.
        uuid:
          type: string
        url:
          type: string
          nullable: true
          example: https://acme-retail.com/products
        page_title:
          type: string
          nullable: true
        referrer:
          type: string
          nullable: true
        browser:
          type: string
          nullable: true
        browser_version:
          type: string
          nullable: true
        os:
          type: string
          nullable: true
        platform:
          type: string
          nullable: true
        device_type:
          type: string
          nullable: true
        user_agent:
          type: string
          nullable: true
        utm_source:
          type: string
          nullable: true
        utm_medium:
          type: string
          nullable: true
        utm_campaign:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
          example: US
        timezone:
          type: string
          nullable: true
        is_identify_event:
          type: integer
          example: 0
        is_identified:
          type: integer
          example: 1
        event_position_in_session:
          type: integer
        session_event_count:
          type: integer
        session_start:
          type: string
          format: date-time
        session_end:
          type: string
          format: date-time
        session_total_events:
          type: integer
        session_duration_seconds:
          type: integer
        user_journey_step:
          type: integer
    TrendDataPoint:
      type: object
      properties:
        date:
          type: string
          format: date
          example: "2024-06-15"
        events:
          type: integer
          example: 1420
    EventSummaryRow:
      type: object
      properties:
        event_type:
          type: string
          example: $pageview
        total_events:
          type: integer
          example: 42600
        unique_users:
          type: integer
          example: 26700
        unique_sessions:
          type: integer
          example: 31200
    EventDailyRow:
      type: object
      properties:
        date:
          type: string
          format: date
          example: "2024-06-15"
        total_events:
          type: integer
          example: 1420
        unique_users:
          type: integer
          example: 890
        unique_sessions:
          type: integer
          example: 1050
        pageviews:
          type: integer
          example: 980
    LogListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/LogEntry"
        rows:
          type: integer
          description: Number of events returned.
          example: 250
    LastEventResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            events:
              type: integer
              description: Number of events in the lookback window.
              example: 27090
            last_event_at:
              type: string
              nullable: true
              description: >
                Timestamp of the most recent event (`YYYY-MM-DD HH:MM:SS`,
                UTC), or `null` when no events occurred in the window.
              example: "2026-07-17 05:04:13"
    TrendResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/TrendDataPoint"
        rows:
          type: integer
          example: 14
    EventSummaryResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/EventSummaryRow"
        rows:
          type: integer
          example: 8
    EventDailyResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/EventDailyRow"
        rows:
          type: integer
          example: 30
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        data:
          nullable: true
          example: null
        error:
          type: string
          example: Unauthorized
        count:
          type: integer
          example: 0
