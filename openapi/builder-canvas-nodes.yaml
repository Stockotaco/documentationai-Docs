openapi: "3.0.0"
info:
  version: 1.0.0
  title: Canvas Nodes & Edges
  description: >-
    Read a canvas's nodes and edges, and manage a node's URL patterns and
    tracked events. Nodes represent funnel pages/actions; URL patterns bind a
    node to matching page URLs; events define what fires on the node.
servers:
  - url: https://mythic-analytics.gulp.workers.dev/builder
security:
  - BearerAuth: []
  - AgencyKeyQuery: []
  - SecretKeyQuery: []
paths:
  /canvases/{canvasId}/nodes:
    get:
      summary: List nodes
      operationId: listCanvasNodes
      description: >
        List all nodes on a canvas, each with its embedded URL patterns and
        events. The canvas must belong to the resolved location. Agency keys
        (`ak_`) must pass `?location_id=`.
      parameters:
        - $ref: "#/components/parameters/CanvasId"
        - $ref: "#/components/parameters/LocationId"
      responses:
        "200":
          description: Nodes with embedded URLs and events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeListResponse"
        "404":
          description: Canvas not found for this location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /canvases/{canvasId}/edges:
    get:
      summary: List edges
      operationId: listCanvasEdges
      description: >
        List all edges (node-to-node connections) on a canvas. The canvas must
        belong to the resolved location.
      parameters:
        - $ref: "#/components/parameters/CanvasId"
        - $ref: "#/components/parameters/LocationId"
      responses:
        "200":
          description: Canvas edges
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EdgeListResponse"
        "404":
          description: Canvas not found for this location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /canvases/{canvasId}/nodes/{nodeId}/urls:
    get:
      summary: List node URL patterns
      operationId: listNodeUrls
      description: >
        List URL patterns for a node, ordered with the primary pattern first.
        Readable with an agency key (`ak_`, requires `?location_id=`) or a
        viewer key (`sk_`).
      parameters:
        - $ref: "#/components/parameters/CanvasId"
        - $ref: "#/components/parameters/NodeId"
        - $ref: "#/components/parameters/LocationId"
      responses:
        "200":
          description: URL patterns for the node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeUrlListResponse"
    post:
      summary: Add node URL pattern
      operationId: addNodeUrl
      description: >
        Add a URL pattern to a node. Requires an agency key (`ak_`). Returns the
        created row.
      parameters:
        - $ref: "#/components/parameters/CanvasId"
        - $ref: "#/components/parameters/NodeId"
        - $ref: "#/components/parameters/LocationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddNodeUrlRequest"
      responses:
        "200":
          description: URL pattern added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeUrlResponse"
        "403":
          description: Write access requires an agency key (`ak_`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /canvases/{canvasId}/urls/{urlId}:
    patch:
      summary: Update node URL pattern
      operationId: updateNodeUrl
      description: >
        Update a URL pattern by its ID. Requires an agency key (`ak_`).
      parameters:
        - $ref: "#/components/parameters/CanvasId"
        - $ref: "#/components/parameters/UrlId"
        - $ref: "#/components/parameters/LocationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNodeUrlRequest"
      responses:
        "200":
          description: URL pattern updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Write access requires an agency key (`ak_`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete node URL pattern
      operationId: deleteNodeUrl
      description: >
        Delete a URL pattern by its ID. Requires an agency key (`ak_`).
      parameters:
        - $ref: "#/components/parameters/CanvasId"
        - $ref: "#/components/parameters/UrlId"
        - $ref: "#/components/parameters/LocationId"
      responses:
        "200":
          description: URL pattern deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Write access requires an agency key (`ak_`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /canvases/{canvasId}/nodes/{nodeId}/events:
    get:
      summary: List node events
      operationId: listNodeEvents
      description: >
        List events configured on a node, ordered by creation time. Readable
        with an agency key (`ak_`, requires `?location_id=`) or a viewer key
        (`sk_`).
      parameters:
        - $ref: "#/components/parameters/CanvasId"
        - $ref: "#/components/parameters/NodeId"
        - $ref: "#/components/parameters/LocationId"
      responses:
        "200":
          description: Events for the node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeEventListResponse"
    post:
      summary: Add node event
      operationId: addNodeEvent
      description: >
        Add an event to a node. Requires an agency key (`ak_`). Returns the
        created row.
      parameters:
        - $ref: "#/components/parameters/CanvasId"
        - $ref: "#/components/parameters/NodeId"
        - $ref: "#/components/parameters/LocationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddNodeEventRequest"
      responses:
        "200":
          description: Event added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeEventResponse"
        "403":
          description: Write access requires an agency key (`ak_`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /canvases/{canvasId}/events/{eventId}:
    patch:
      summary: Update node event
      operationId: updateNodeEvent
      description: >
        Update an event by its ID. Requires an agency key (`ak_`).
      parameters:
        - $ref: "#/components/parameters/CanvasId"
        - $ref: "#/components/parameters/EventId"
        - $ref: "#/components/parameters/LocationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNodeEventRequest"
      responses:
        "200":
          description: Event updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Write access requires an agency key (`ak_`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete node event
      operationId: deleteNodeEvent
      description: >
        Delete an event by its ID. Requires an agency key (`ak_`).
      parameters:
        - $ref: "#/components/parameters/CanvasId"
        - $ref: "#/components/parameters/EventId"
        - $ref: "#/components/parameters/LocationId"
      responses:
        "200":
          description: Event deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Write access requires an agency key (`ak_`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /canvases/{canvasId}/nodes/{nodeId}/cross-domain:
    patch:
      summary: Toggle node cross-domain tracking
      operationId: toggleNodeCrossDomain
      description: >
        Set the `cross_domain` flag on a node. Requires an agency key (`ak_`).
      parameters:
        - $ref: "#/components/parameters/CanvasId"
        - $ref: "#/components/parameters/NodeId"
        - $ref: "#/components/parameters/LocationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrossDomainRequest"
      responses:
        "200":
          description: Cross-domain flag updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Write access requires an agency key (`ak_`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >-
        Builder key as a bearer token. Use an agency key for full CRUD
        (`Bearer ak_...`) or a viewer key for read-only access
        (`Bearer sk_...`).
    AgencyKeyQuery:
      type: apiKey
      in: query
      name: ak
      description: "Agency key passed as a query parameter. Format: `ak_...`."
    SecretKeyQuery:
      type: apiKey
      in: query
      name: sk
      description: "Viewer (secret) key passed as a query parameter. Format: `sk_...`."
  parameters:
    CanvasId:
      name: canvasId
      in: path
      required: true
      description: Canvas UUID.
      schema:
        type: string
        format: uuid
    NodeId:
      name: nodeId
      in: path
      required: true
      description: Canvas node UUID.
      schema:
        type: string
        format: uuid
    UrlId:
      name: urlId
      in: path
      required: true
      description: Node URL pattern UUID.
      schema:
        type: string
        format: uuid
    EventId:
      name: eventId
      in: path
      required: true
      description: Node event UUID.
      schema:
        type: string
        format: uuid
    LocationId:
      name: location_id
      in: query
      required: false
      description: >-
        Client location to scope the request to. Required when authenticating
        with an agency key (`ak_`). Ignored for viewer keys (`sk_`).
      schema:
        type: string
        example: acme-retail
  schemas:
    CanvasNode:
      type: object
      properties:
        id:
          type: string
          format: uuid
        canvas_id:
          type: string
          format: uuid
        type:
          type: string
          enum: [page, action, decision, offsite]
          example: page
        label:
          type: string
          example: Checkout Page
        position_x:
          type: number
          example: 320
        position_y:
          type: number
          example: 100
        config:
          type: object
        cross_domain:
          type: boolean
          example: false
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        canvas_node_urls:
          type: array
          items:
            $ref: "#/components/schemas/NodeUrl"
        canvas_node_events:
          type: array
          items:
            $ref: "#/components/schemas/NodeEvent"
    CanvasEdge:
      type: object
      properties:
        id:
          type: string
        canvas_id:
          type: string
          format: uuid
        source_node_id:
          type: string
          format: uuid
        target_node_id:
          type: string
          format: uuid
        label:
          type: string
          nullable: true
        config:
          type: object
    NodeUrl:
      type: object
      properties:
        id:
          type: string
          format: uuid
        node_id:
          type: string
          format: uuid
        url_pattern:
          type: string
          example: /checkout
        match_type:
          type: string
          enum: [exact, contains, starts_with, regex, glob, pathname, step_id]
          example: contains
        is_primary:
          type: boolean
          example: false
    NodeEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        node_id:
          type: string
          format: uuid
        platform_config_id:
          type: string
          format: uuid
          nullable: true
        platform:
          type: string
          enum: [mythic, meta_pixel, ga4, google_ads, tiktok, linkedin, pinterest, custom_html]
          example: meta_pixel
        event_type:
          type: string
          example: Purchase
        trigger:
          type: string
          enum: [page_load, form_submit, button_click, scroll_depth, time_on_page, element_visible, custom]
          example: page_load
        trigger_config:
          type: object
        event_params:
          type: object
        journey_condition:
          type: object
          nullable: true
        enabled:
          type: boolean
          example: true
        template_id:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
    AddNodeUrlRequest:
      type: object
      required:
        - url_pattern
      properties:
        url_pattern:
          type: string
          example: /checkout
        match_type:
          type: string
          enum: [exact, contains, starts_with, regex, glob, pathname, step_id]
          default: contains
        is_primary:
          type: boolean
          default: false
    UpdateNodeUrlRequest:
      type: object
      description: Any subset of URL-pattern fields.
      properties:
        url_pattern:
          type: string
        match_type:
          type: string
          enum: [exact, contains, starts_with, regex, glob, pathname, step_id]
        is_primary:
          type: boolean
    AddNodeEventRequest:
      type: object
      required:
        - platform
        - event_type
      properties:
        platform:
          type: string
          enum: [mythic, meta_pixel, ga4, google_ads, tiktok, linkedin, pinterest, custom_html]
        event_type:
          type: string
          example: Purchase
        trigger:
          type: string
          enum: [page_load, form_submit, button_click, scroll_depth, time_on_page, element_visible, custom]
          default: page_load
        trigger_config:
          type: object
        event_params:
          type: object
        platform_config_id:
          type: string
          format: uuid
        enabled:
          type: boolean
          default: true
    UpdateNodeEventRequest:
      type: object
      description: Any subset of event fields.
      properties:
        event_type:
          type: string
        trigger:
          type: string
          enum: [page_load, form_submit, button_click, scroll_depth, time_on_page, element_visible, custom]
        trigger_config:
          type: object
        event_params:
          type: object
        enabled:
          type: boolean
    CrossDomainRequest:
      type: object
      required:
        - cross_domain
      properties:
        cross_domain:
          type: boolean
          example: true
    NodeUrlResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/NodeUrl"
    NodeUrlListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/NodeUrl"
    NodeEventResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/NodeEvent"
    NodeEventListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/NodeEvent"
    NodeListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CanvasNode"
    EdgeListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CanvasEdge"
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Canvas not found
