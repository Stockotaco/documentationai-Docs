openapi: "3.0.0"
info:
  version: 1.0.0
  title: Data
  description: >
    Read-only event analytics and BigQuery export status for agencies.
    Event endpoints are location-scoped; export is agency-wide. Served from
    Mythic Analytics. Person profiles and the identity graph live in the
    People API.
servers:
  - url: https://mythic-analytics.gulp.workers.dev/client/v1/data
security:
  - BearerAuth: []
  - AgencyKeyQuery: []
  - SecretKeyQuery: []
paths:
  /events/summary:
    get:
      summary: Event summary
      operationId: getEventsSummary
      description: Aggregated event counts by type for the location over an optional date range.
      parameters:
        - $ref: "#/components/parameters/LocationIdHeader"
        - $ref: "#/components/parameters/LocationIdQuery"
        - $ref: "#/components/parameters/DateFrom"
        - $ref: "#/components/parameters/DateTo"
      responses:
        "200":
          description: Event summary rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RowsResponse"
        "400":
          $ref: "#/components/responses/LocationRequired"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/UpstreamError"
        "503":
          $ref: "#/components/responses/NotConfigured"
  /events/daily:
    get:
      summary: Daily events
      operationId: getEventsDaily
      description: Per-day event counts for the location over an optional date range, optionally filtered to one event type.
      parameters:
        - $ref: "#/components/parameters/LocationIdHeader"
        - $ref: "#/components/parameters/LocationIdQuery"
        - $ref: "#/components/parameters/DateFrom"
        - $ref: "#/components/parameters/DateTo"
        - name: event_type
          in: query
          description: Filter to a single event type.
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Daily event rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RowsResponse"
        "400":
          $ref: "#/components/responses/LocationRequired"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/UpstreamError"
        "503":
          $ref: "#/components/responses/NotConfigured"
  /events/trend:
    get:
      summary: Event trend
      operationId: getEventsTrend
      description: >
        Event volume trend for the location. Provide an explicit
        `start_date`/`end_date`, or use `days` to derive a rolling window
        ending today.
      parameters:
        - $ref: "#/components/parameters/LocationIdHeader"
        - $ref: "#/components/parameters/LocationIdQuery"
        - name: start_date
          in: query
          description: Window start date (`YYYY-MM-DD`). Defaults to `days` before today.
          required: false
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          description: Window end date (`YYYY-MM-DD`).
          required: false
          schema:
            type: string
            format: date
        - name: days
          in: query
          description: Rolling window size in days, used when `start_date` is omitted. Default `14`, min `1`, max `365`.
          required: false
          schema:
            type: integer
            default: 14
            minimum: 1
            maximum: 365
      responses:
        "200":
          description: Event trend rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RowsResponse"
        "400":
          $ref: "#/components/responses/LocationRequired"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/UpstreamError"
        "503":
          $ref: "#/components/responses/NotConfigured"
  /events/breakdown:
    get:
      summary: Traffic breakdown by dimension
      operationId: getEventsBreakdown
      description: >
        True pageview volume broken down by a single dimension — the source for
        Top Pages, Devices, Geo, and Sources reports. Reads raw events (not
        Core Web Vitals samples), so counts are honest traffic. Each row is
        `{ value, pageviews, unique_users, unique_sessions }`, ordered by
        `pageviews` descending. `value` is an empty string when the dimension
        is not set on an event. `pageviews` always counts `$pageview` events
        regardless of `event_type`.


        **Segment scoping**: pass `segment_id` (a segment created via the
        Segments API) to count only traffic from that segment's members — e.g.
        top pages read by customers, or by paid-search visitors:


        `GET /client/v1/data/events/breakdown?dimension=page&segment_id=9f4e...`
      parameters:
        - $ref: "#/components/parameters/LocationIdHeader"
        - $ref: "#/components/parameters/LocationIdQuery"
        - $ref: "#/components/parameters/DateFrom"
        - $ref: "#/components/parameters/DateTo"
        - name: dimension
          in: query
          required: false
          description: Dimension to group by. Defaults to `page`.
          schema:
            type: string
            default: page
            enum:
              - page
              - page_url
              - referrer
              - referring_domain
              - device
              - browser
              - os
              - country
              - utm_source
              - utm_medium
              - utm_campaign
              - utm_content
              - utm_term
        - name: event_type
          in: query
          required: false
          description: Filter to a single event type. Default counts all events.
          schema:
            type: string
        - $ref: "#/components/parameters/SegmentId"
        - name: limit
          in: query
          required: false
          description: Max rows. Default `50`, min `1`, max `1000`.
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 1000
      responses:
        "200":
          description: Breakdown rows
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/RowsResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/BreakdownRow"
        "400":
          description: Unknown `dimension` (`invalid_dimension`), or no location bound (`location_required`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/SegmentNotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/UpstreamError"
        "503":
          $ref: "#/components/responses/NotConfigured"
  /sessions:
    get:
      summary: Session list
      operationId: getSessions
      description: >
        One row per session, most recent first — the backbone of attribution
        reporting. Attribution fields (all UTMs, click IDs, referrer, landing
        page) come from the session's entry properties. `engaged` is derived:
        a session is engaged if it has more than one pageview, lasted at least
        10 seconds, or fired a non-pageview event; `bounce` is the inverse.
        Empty string on a filter means "no value set". Not yet returned:
        `is_new_visitor` and `converted`/goal fields.


        **Segment scoping**: pass `segment_id` (a segment created via the
        Segments API) to list only sessions by that segment's members —
        composable with every other filter:


        `GET /client/v1/data/sessions?segment_id=9f4e...&engaged=1&device_type=mobile`


        The segment decides *which people* qualify (evaluated live at query
        time); the date window decides *which of their sessions* are returned —
        a qualifying person contributes all their in-window sessions, including
        ones unrelated to how they qualified. See the `segment_id` parameter
        for attribution-scope and identity-graph details.


        **Person scoping (profile views)**: pass `person_id` (canonical id
        from the People API) or `distinct_id` (any raw identity value) to list
        one person's sessions — resolved through the identity graph, so
        anonymous pre-identification sessions are included:


        `GET /client/v1/data/sessions?person_id=019f69bc-...&date_from=2026-01-01`
      parameters:
        - $ref: "#/components/parameters/LocationIdHeader"
        - $ref: "#/components/parameters/LocationIdQuery"
        - name: session_id
          in: query
          required: false
          description: >
            Return just this one session (exact match). Useful for looking up a
            single session's attribution — e.g. alongside its replay. When set,
            other filters and the date window are effectively moot.
          schema:
            type: string
        - $ref: "#/components/parameters/DateFrom"
        - $ref: "#/components/parameters/DateTo"
        - $ref: "#/components/parameters/FilterUtmSource"
        - $ref: "#/components/parameters/FilterUtmMedium"
        - $ref: "#/components/parameters/FilterUtmCampaign"
        - $ref: "#/components/parameters/FilterDeviceType"
        - $ref: "#/components/parameters/FilterBrowser"
        - $ref: "#/components/parameters/FilterOs"
        - $ref: "#/components/parameters/FilterCountry"
        - $ref: "#/components/parameters/FilterLandingPage"
        - $ref: "#/components/parameters/FilterEngaged"
        - $ref: "#/components/parameters/FilterBounce"
        - $ref: "#/components/parameters/FilterIsIdentified"
        - $ref: "#/components/parameters/FilterPersonId"
        - $ref: "#/components/parameters/FilterDistinctId"
        - name: min_duration
          in: query
          required: false
          description: Minimum session duration in seconds.
          schema:
            type: integer
        - $ref: "#/components/parameters/SegmentId"
        - name: limit
          in: query
          required: false
          description: Max rows. Default `100`, min `1`, max `1000`.
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
        - name: offset
          in: query
          required: false
          description: Row offset for pagination.
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Session rows
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/RowsResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/SessionRow"
        "400":
          $ref: "#/components/responses/LocationRequired"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/SegmentNotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/UpstreamError"
        "503":
          $ref: "#/components/responses/NotConfigured"
  /sessions/breakdown:
    get:
      summary: Session group-by aggregates
      operationId: getSessionsBreakdown
      description: >
        Session aggregates grouped by one dimension: session count, engaged
        count/rate, bounce rate, average duration and pages per group. Accepts
        the same filters as `/sessions`, so you can group a filtered set.
        Ordered by `session_count` descending. Single dimension only —
        comma-list multi-dimension group-by is not yet supported.


        **Segment scoping**: pass `segment_id` to aggregate only the segment's
        members' sessions — e.g. which campaigns drive engaged sessions from
        identified customers:


        `GET /client/v1/data/sessions/breakdown?group_by=utm_campaign&segment_id=9f4e...`
      parameters:
        - $ref: "#/components/parameters/LocationIdHeader"
        - $ref: "#/components/parameters/LocationIdQuery"
        - $ref: "#/components/parameters/DateFrom"
        - $ref: "#/components/parameters/DateTo"
        - $ref: "#/components/parameters/FilterUtmSource"
        - $ref: "#/components/parameters/FilterUtmMedium"
        - $ref: "#/components/parameters/FilterUtmCampaign"
        - $ref: "#/components/parameters/FilterDeviceType"
        - $ref: "#/components/parameters/FilterBrowser"
        - $ref: "#/components/parameters/FilterOs"
        - $ref: "#/components/parameters/FilterCountry"
        - $ref: "#/components/parameters/FilterLandingPage"
        - $ref: "#/components/parameters/FilterEngaged"
        - $ref: "#/components/parameters/FilterBounce"
        - $ref: "#/components/parameters/FilterIsIdentified"
        - $ref: "#/components/parameters/FilterPersonId"
        - $ref: "#/components/parameters/FilterDistinctId"
        - name: min_duration
          in: query
          required: false
          description: Minimum session duration in seconds.
          schema:
            type: integer
        - $ref: "#/components/parameters/SegmentId"
        - name: group_by
          in: query
          required: true
          description: Dimension to group by.
          schema:
            type: string
            enum:
              - utm_source
              - utm_medium
              - utm_campaign
              - utm_content
              - utm_term
              - device_type
              - browser
              - os
              - country
              - landing_page
              - exit_page
              - referring_domain
              - engaged
              - bounce
              - is_identified
        - name: limit
          in: query
          required: false
          description: Max groups. Default `50`, min `1`, max `1000`.
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 1000
      responses:
        "200":
          description: Grouped session rows
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/RowsResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/SessionBreakdownRow"
        "400":
          description: Missing or unknown `group_by` (`invalid_group_by`), or no location bound (`location_required`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/SegmentNotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/UpstreamError"
        "503":
          $ref: "#/components/responses/NotConfigured"
  /exceptions/issues:
    get:
      summary: Grouped exception issues
      operationId: getExceptionIssues
      description: >
        The error-tracking issue list. `$exception` events (uncaught JS errors
        and unhandled promise rejections captured by the SDK) are grouped into
        issues by a **stable server-side fingerprint**: `issue_id` = `v1:` +
        md5(exception_type + normalized message, with digits stripped so
        per-instance values collapse). The `v1:` prefix versions the grouping
        algorithm — a future change ships as `v2:`, a clean migration rather
        than a silent remint of your saved state. The fingerprint deliberately **excludes
        the stack trace**, so minified frame names churning across deploys can
        never mint a new id — persist your own resolve/ignore state against
        `issue_id` and it stays put.


        Each row carries `occurrences` / `sessions` / `users`, `first_seen` /
        `last_seen`, a `culprit` (top in-app stack frame, for the list
        subtitle), and a `volume_series` bucketed to the window (hourly for
        short ranges, else daily) for the sparkline.


        **Time window**: `date_from`/`date_to`, or `hours_back` for a window
        ending now. **Segment scoping**: pass `segment_id` to count only errors
        from that segment's members.
      parameters:
        - $ref: "#/components/parameters/LocationIdHeader"
        - $ref: "#/components/parameters/LocationIdQuery"
        - $ref: "#/components/parameters/DateFrom"
        - $ref: "#/components/parameters/DateTo"
        - name: hours_back
          in: query
          required: false
          description: Alternative to `date_from` — window of the last N hours ending now.
          schema: { type: integer }
        - name: search
          in: query
          required: false
          description: Substring match over exception type and message.
          schema: { type: string }
        - name: sort_by
          in: query
          required: false
          description: Sort column. Default `last_seen`.
          schema:
            type: string
            default: last_seen
            enum: [last_seen, occurrences, sessions, users]
        - name: order
          in: query
          required: false
          schema:
            type: string
            default: desc
            enum: [asc, desc]
        - $ref: "#/components/parameters/SegmentId"
        - $ref: "#/components/parameters/ExcludeSegmentId"
        - name: limit
          in: query
          required: false
          description: Max rows. Default `50`, min `1`, max `200`.
          schema: { type: integer, default: 50, minimum: 1, maximum: 200 }
        - name: offset
          in: query
          required: false
          description: Row offset for pagination.
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Issue rows
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/RowsResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ExceptionIssue"
        "400":
          $ref: "#/components/responses/LocationRequired"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/SegmentNotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/UpstreamError"
        "503":
          $ref: "#/components/responses/NotConfigured"
  /exceptions/issues/{id}:
    get:
      summary: Single exception issue
      operationId: getExceptionIssue
      description: >
        The detail-header view: the same aggregates and `volume_series` as a
        list row, fetched by the stable `issue_id`. Returns `404`
        (`issue_not_found`) when no occurrences match the id in the window.
      parameters:
        - $ref: "#/components/parameters/LocationIdHeader"
        - $ref: "#/components/parameters/LocationIdQuery"
        - name: id
          in: path
          required: true
          description: The stable `issue_id` from the issue list.
          schema: { type: string }
        - $ref: "#/components/parameters/DateFrom"
        - $ref: "#/components/parameters/DateTo"
        - name: hours_back
          in: query
          required: false
          schema: { type: integer }
        - $ref: "#/components/parameters/SegmentId"
        - $ref: "#/components/parameters/ExcludeSegmentId"
      responses:
        "200":
          description: Issue
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    $ref: "#/components/schemas/ExceptionIssue"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Unknown issue for this location and date range
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/UpstreamError"
        "503":
          $ref: "#/components/responses/NotConfigured"
  /exceptions/issues/{id}/occurrences:
    get:
      summary: Occurrences of one exception issue
      operationId: getExceptionOccurrences
      description: >
        Paginated raw `$exception` events belonging to the issue, most recent
        first — powers the occurrence list and the stack-trace / session panels
        of the detail view. Each row carries `browser` / `os` / `url`, a
        `session_id` for deep-linking to the session replay, and
        worker-parsed `stack_frames` (the original string is kept in
        `stack_raw`).
      parameters:
        - $ref: "#/components/parameters/LocationIdHeader"
        - $ref: "#/components/parameters/LocationIdQuery"
        - name: id
          in: path
          required: true
          description: The stable `issue_id` from the issue list.
          schema: { type: string }
        - $ref: "#/components/parameters/DateFrom"
        - $ref: "#/components/parameters/DateTo"
        - name: hours_back
          in: query
          required: false
          schema: { type: integer }
        - name: limit
          in: query
          required: false
          description: Max rows. Default `50`, min `1`, max `200`.
          schema: { type: integer, default: 50, minimum: 1, maximum: 200 }
        - name: offset
          in: query
          required: false
          schema: { type: integer, default: 0 }
        - $ref: "#/components/parameters/SegmentId"
        - $ref: "#/components/parameters/ExcludeSegmentId"
      responses:
        "200":
          description: Occurrence rows
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/RowsResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ExceptionOccurrence"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/UpstreamError"
        "503":
          $ref: "#/components/responses/NotConfigured"
  /export:
    get:
      summary: BigQuery export status
      operationId: getExport
      description: >
        Return the agency's BigQuery export dataset status. Agency-wide — this
        is the only route that does not require a bound location. Requires an
        agency (`ak_`) key; secret keys receive `403`.
      responses:
        "200":
          description: BigQuery export dataset status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Route requires an agency (`ak_`) key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No BigQuery export provisioned for the agency
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >
        Agency key (`ak_`) or location secret key (`sk_`) as a bearer token.
        Format: `Bearer ak_...` or `Bearer sk_...`.
    AgencyKeyQuery:
      type: apiKey
      in: query
      name: ak
      description: Agency key passed as a query parameter. Prefer the `Authorization` header.
    SecretKeyQuery:
      type: apiKey
      in: query
      name: sk
      description: Location secret key passed as a query parameter. Prefer the `Authorization` header.
  parameters:
    LocationIdHeader:
      name: X-Location-Id
      in: header
      required: false
      description: >
        Location to scope the request to. Required for agency (`ak_`) keys on
        the event routes. Ignored for secret (`sk_`) keys, which resolve their
        own location, and not used by `/export`.
      schema:
        type: string
    LocationIdQuery:
      name: location_id
      in: query
      required: false
      description: >
        Alternative to the `X-Location-Id` header for agency (`ak_`) keys.
        Ignored for secret (`sk_`) keys.
      schema:
        type: string
    DateFrom:
      name: date_from
      in: query
      required: false
      description: Start date (`YYYY-MM-DD`).
      schema:
        type: string
        format: date
    DateTo:
      name: date_to
      in: query
      required: false
      description: End date (`YYYY-MM-DD`).
      schema:
        type: string
        format: date
    FilterUtmSource:
      name: utm_source
      in: query
      required: false
      description: Filter to sessions with this UTM source. Empty string = "no value set".
      schema:
        type: string
    FilterUtmMedium:
      name: utm_medium
      in: query
      required: false
      description: Filter to sessions with this UTM medium.
      schema:
        type: string
    FilterUtmCampaign:
      name: utm_campaign
      in: query
      required: false
      description: Filter to sessions with this UTM campaign.
      schema:
        type: string
    FilterDeviceType:
      name: device_type
      in: query
      required: false
      description: Filter to sessions on this device type.
      schema:
        type: string
    FilterBrowser:
      name: browser
      in: query
      required: false
      description: Filter to sessions on this browser.
      schema:
        type: string
    FilterOs:
      name: os
      in: query
      required: false
      description: Filter to sessions on this operating system.
      schema:
        type: string
    FilterCountry:
      name: country
      in: query
      required: false
      description: Filter to sessions from this country (ISO code).
      schema:
        type: string
    FilterLandingPage:
      name: landing_page
      in: query
      required: false
      description: >
        Filter to sessions whose entry path matches. Case-insensitive and
        trailing-slash-insensitive (`/About/` matches `/about`). Query params
        never apply — the path is captured without them.
      schema:
        type: string
    FilterEngaged:
      name: engaged
      in: query
      required: false
      description: Filter by engagement (`1`/`0`, or `true`/`false`).
      schema:
        type: boolean
    FilterBounce:
      name: bounce
      in: query
      required: false
      description: Filter by bounce (`1`/`0`, or `true`/`false`).
      schema:
        type: boolean
    FilterIsIdentified:
      name: is_identified
      in: query
      required: false
      description: Filter to identified (`1`) or anonymous (`0`) sessions.
      schema:
        type: boolean
    FilterPersonId:
      name: person_id
      in: query
      required: false
      description: >
        Scope to one person's sessions: the canonical person id from the
        People API (`GET /people`, `GET /people/{personId}`). Matches every
        session whose visitor id belongs to that person in the identity graph
        (anonymous ids, user ids, emails), so pre-identification sessions are
        included. Powers per-person Sessions/Recordings tabs on a profile
        view. Composable with all other filters and the date window; widen
        `date_from` for history older than the 30-day default.
      schema:
        type: string
    FilterDistinctId:
      name: distinct_id
      in: query
      required: false
      description: >
        Scope to one person's sessions by any raw identity value (anonymous
        id, user id, or email). Resolved through the identity graph to the
        owning person's full identity set — same resolution as
        `GET /people/{personId}` — so it returns the same rows as `person_id`
        for the same person. A value not in the graph (a never-identified
        visitor) falls back to an exact `distinct_id` match. If `person_id`
        is also given, both conditions must match (AND) — pass one or the
        other.
      schema:
        type: string
    SegmentId:
      name: segment_id
      in: query
      required: false
      description: >
        Scope results to members of a saved segment (created via the Segments
        API). Two independent time filters apply: the segment decides WHICH
        PEOPLE qualify (a live definition, evaluated at query time — not
        stored membership), and `date_from`/`date_to` decides WHICH OF THEIR
        ROWS are returned. A person who qualifies today contributes all their
        sessions/events inside the date window — including ones unrelated to
        how they qualified; there is no "only rows from while they were a
        member". For `first`/`last` attribution scopes membership runs through
        the identity graph (a row counts when its `distinct_id` maps to a
        matching person); a segment with `attribution: "session"` instead
        matches visitors directly against the sessions store ("ever had a
        session that arrived via X"), with no identity-graph dependency.
        Composable with all other filters. Unknown or foreign id →
        `404 segment_not_found`.
      schema:
        type: string
        format: uuid
    ExcludeSegmentId:
      name: exclude_segment_id
      in: query
      required: false
      description: >
        Scope results OUT — exclude rows from members of a saved segment
        (the inverse of `segment_id`, evaluated the same live way). Fully
        composable with `segment_id`: scope to one segment and exclude another
        simultaneously. The primary use is stripping your own QA/test traffic —
        which is often anonymous, so a rule-based segment (email domain, known
        ids) catches it with no SDK changes on the client's site. Unknown or
        foreign id → `404 exclude_segment_not_found`.
      schema:
        type: string
        format: uuid
  responses:
    Unauthorized:
      description: Missing, malformed, or invalid key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: >
        Access denied — location not linked to the agency
        (`location_not_linked`) or the location has HIPAA mode enabled
        (`hipaa_restricted`).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    LocationRequired:
      description: An agency key called an event route without binding a location
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    SegmentNotFound:
      description: "`segment_id` does not exist for this location (`segment_not_found`)"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimited:
      description: >
        Rate limit exceeded (120 requests per 10 seconds, per location).
      headers:
        Retry-After:
          description: Seconds to wait before retrying.
          schema:
            type: integer
        X-RateLimit-Limit:
          description: Request ceiling for the window.
          schema:
            type: integer
        X-RateLimit-Remaining:
          description: Requests remaining in the current window.
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UpstreamError:
      description: An upstream data service failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotConfigured:
      description: The analytics service is not configured for this deployment
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    RowsResponse:
      type: object
      description: Generic Tinybird result envelope for analytics rows.
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            type: object
            additionalProperties: true
        rows:
          type: integer
          description: Number of rows returned.
    BreakdownRow:
      type: object
      description: One dimension value with its traffic counts.
      properties:
        value:
          type: string
          description: The dimension value (e.g. `/pricing`). Empty string when unset.
          example: /pricing
        pageviews:
          type: integer
          example: 1240
        unique_users:
          type: integer
          example: 830
        unique_sessions:
          type: integer
          example: 910
    ExceptionIssue:
      type: object
      description: >
        One grouped exception issue. `issue_id` is stable across requests and
        deploys — persist resolve/ignore state against it.
      properties:
        issue_id:
          type: string
          description: >
            Stable, versioned fingerprint — `v1:` + md5(exception_type +
            normalized message). Stable across requests and deploys; persist
            resolve/ignore state against it. The version prefix means any
            future change to the grouping algorithm ships as `v2:` — a clean
            migration, never a silent remint of your saved state.
          example: v1:1d908dc6145bd8dc7982aff9366b5042
        exception_type:
          type: string
          example: TypeError
        message:
          type: string
          example: "Cannot read properties of null (reading 'addEventListener')"
        culprit:
          type: string
          nullable: true
          description: Top in-app stack frame ("function in file"), for the list subtitle.
          example: "handler in app.js"
        first_seen: { type: string, format: date-time }
        last_seen: { type: string, format: date-time }
        occurrences: { type: integer, example: 366 }
        sessions: { type: integer, example: 204 }
        users: { type: integer, example: 183 }
        volume_series:
          type: array
          description: Counts bucketed (hourly or daily) across the window, for the sparkline.
          items:
            type: object
            properties:
              bucket: { type: string, format: date-time }
              count: { type: integer }
    ExceptionOccurrence:
      type: object
      description: One raw `$exception` event belonging to an issue.
      properties:
        event_uuid: { type: string }
        timestamp: { type: string, format: date-time }
        message: { type: string }
        browser: { type: string, example: Chrome }
        os: { type: string, example: Windows }
        url: { type: string }
        session_id:
          type: string
          description: Deep-links to the session replay for this occurrence.
        distinct_id:
          type: string
          description: Raw identity value. Canonical person_id resolution is a planned follow-up.
        stack_frames:
          type: array
          description: Stack parsed into frames from the raw error.stack string.
          items:
            type: object
            properties:
              function: { type: string, nullable: true }
              file: { type: string }
              line: { type: integer, nullable: true }
              col: { type: integer, nullable: true }
              in_app:
                type: boolean
                description: False for third-party frames (gtm.js, node_modules, cdn, chunks…).
        stack_raw:
          type: string
          nullable: true
          description: The original error.stack string.
    SessionRow:
      type: object
      description: One session.
      properties:
        session_id: { type: string }
        distinct_id: { type: string }
        user_id: { type: string, nullable: true }
        is_identified: { type: boolean }
        started_at: { type: string, format: date-time }
        ended_at: { type: string, format: date-time }
        duration_seconds: { type: integer }
        events: { type: integer }
        pageviews: { type: integer }
        engaged: { type: boolean }
        bounce: { type: boolean }
        landing_page: { type: string }
        landing_url: { type: string }
        exit_page: { type: string }
        referrer: { type: string }
        referring_domain: { type: string }
        utm_source: { type: string }
        utm_medium: { type: string }
        utm_campaign: { type: string }
        utm_content: { type: string }
        utm_term: { type: string }
        utm_id: { type: string }
        gclid: { type: string }
        gbraid: { type: string }
        wbraid: { type: string }
        fbclid: { type: string }
        msclkid: { type: string }
        ttclid: { type: string }
        twclid: { type: string }
        li_fat_id: { type: string }
        epik: { type: string }
        sccid: { type: string }
        device_type: { type: string }
        browser: { type: string }
        os: { type: string }
        country: { type: string }
        city: { type: string }
        timezone: { type: string }
    SessionBreakdownRow:
      type: object
      description: Session aggregates for one group.
      properties:
        value:
          type: string
          description: The group value. For boolean group_by (`engaged`/`bounce`/`is_identified`) this is `"true"`/`"false"`.
          example: google
        session_count:
          type: integer
          example: 1204
        engaged_count:
          type: integer
          example: 812
        engaged_rate:
          type: number
          description: Engaged sessions as a percentage.
          example: 67.4
        bounce_rate:
          type: number
          description: Bounced sessions as a percentage.
          example: 32.6
        avg_duration_seconds:
          type: number
          example: 84.2
        avg_pageviews:
          type: number
          example: 2.7
    ExportResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            dataset:
              type: string
              description: Fully-qualified BigQuery dataset (`mythic-data.<dataset_name>`).
              example: mythic-data.agency_acme
            tables:
              type: array
              items:
                type: string
              example: ["events"]
            location_count:
              type: integer
              description: Number of locations included in the export dataset.
            status:
              type: string
              description: Provisioning status of the export dataset.
            provisioned_at:
              type: string
              format: date-time
              nullable: true
            updated_at:
              type: string
              format: date-time
              nullable: true
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              description: Machine-readable error code.
              example: unauthorized
            message:
              type: string
              description: Human-readable error message.
              example: Missing authorization
