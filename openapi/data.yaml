openapi: "3.0.0"
info:
  version: 1.0.0
  title: Data
  description: >
    Read-only event analytics and BigQuery export status for agencies.
    Event endpoints are location-scoped; export is agency-wide. Served from
    Mythic Analytics. Person profiles and the identity graph live in the
    People API.
servers:
  - url: https://mythic-analytics.gulp.workers.dev/client/v1/data
security:
  - BearerAuth: []
  - AgencyKeyQuery: []
  - SecretKeyQuery: []
paths:
  /events/summary:
    get:
      summary: Event summary
      operationId: getEventsSummary
      description: Aggregated event counts by type for the location over an optional date range.
      parameters:
        - $ref: "#/components/parameters/LocationIdHeader"
        - $ref: "#/components/parameters/LocationIdQuery"
        - $ref: "#/components/parameters/DateFrom"
        - $ref: "#/components/parameters/DateTo"
      responses:
        "200":
          description: Event summary rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RowsResponse"
        "400":
          $ref: "#/components/responses/LocationRequired"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/UpstreamError"
        "503":
          $ref: "#/components/responses/NotConfigured"
  /events/daily:
    get:
      summary: Daily events
      operationId: getEventsDaily
      description: Per-day event counts for the location over an optional date range, optionally filtered to one event type.
      parameters:
        - $ref: "#/components/parameters/LocationIdHeader"
        - $ref: "#/components/parameters/LocationIdQuery"
        - $ref: "#/components/parameters/DateFrom"
        - $ref: "#/components/parameters/DateTo"
        - name: event_type
          in: query
          description: Filter to a single event type.
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Daily event rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RowsResponse"
        "400":
          $ref: "#/components/responses/LocationRequired"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/UpstreamError"
        "503":
          $ref: "#/components/responses/NotConfigured"
  /events/trend:
    get:
      summary: Event trend
      operationId: getEventsTrend
      description: >
        Event volume trend for the location. Provide an explicit
        `start_date`/`end_date`, or use `days` to derive a rolling window
        ending today.
      parameters:
        - $ref: "#/components/parameters/LocationIdHeader"
        - $ref: "#/components/parameters/LocationIdQuery"
        - name: start_date
          in: query
          description: Window start date (`YYYY-MM-DD`). Defaults to `days` before today.
          required: false
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          description: Window end date (`YYYY-MM-DD`).
          required: false
          schema:
            type: string
            format: date
        - name: days
          in: query
          description: Rolling window size in days, used when `start_date` is omitted. Default `14`, min `1`, max `365`.
          required: false
          schema:
            type: integer
            default: 14
            minimum: 1
            maximum: 365
      responses:
        "200":
          description: Event trend rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RowsResponse"
        "400":
          $ref: "#/components/responses/LocationRequired"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/UpstreamError"
        "503":
          $ref: "#/components/responses/NotConfigured"
  /events/breakdown:
    get:
      summary: Traffic breakdown by dimension
      operationId: getEventsBreakdown
      description: >
        True pageview volume broken down by a single dimension — the source for
        Top Pages, Devices, Geo, and Sources reports. Reads raw events (not
        Core Web Vitals samples), so counts are honest traffic. Each row is
        `{ value, pageviews, unique_users, unique_sessions }`, ordered by
        `pageviews` descending. `value` is an empty string when the dimension
        is not set on an event. `pageviews` always counts `$pageview` events
        regardless of `event_type`.


        **Segment scoping**: pass `segment_id` (a segment created via the
        Segments API) to count only traffic from that segment's members — e.g.
        top pages read by customers, or by paid-search visitors:


        `GET /client/v1/data/events/breakdown?dimension=page&segment_id=9f4e...`
      parameters:
        - $ref: "#/components/parameters/LocationIdHeader"
        - $ref: "#/components/parameters/LocationIdQuery"
        - $ref: "#/components/parameters/DateFrom"
        - $ref: "#/components/parameters/DateTo"
        - name: dimension
          in: query
          required: false
          description: Dimension to group by. Defaults to `page`.
          schema:
            type: string
            default: page
            enum:
              - page
              - page_url
              - referrer
              - referring_domain
              - device
              - browser
              - os
              - country
              - utm_source
              - utm_medium
              - utm_campaign
              - utm_content
              - utm_term
        - name: event_type
          in: query
          required: false
          description: Filter to a single event type. Default counts all events.
          schema:
            type: string
        - $ref: "#/components/parameters/SegmentId"
        - name: limit
          in: query
          required: false
          description: Max rows. Default `50`, min `1`, max `1000`.
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 1000
      responses:
        "200":
          description: Breakdown rows
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/RowsResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/BreakdownRow"
        "400":
          description: Unknown `dimension` (`invalid_dimension`), or no location bound (`location_required`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/SegmentNotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/UpstreamError"
        "503":
          $ref: "#/components/responses/NotConfigured"
  /sessions:
    get:
      summary: Session list
      operationId: getSessions
      description: >
        One row per session, most recent first — the backbone of attribution
        reporting. Attribution fields (all UTMs, click IDs, referrer, landing
        page) come from the session's entry properties. `engaged` is derived:
        a session is engaged if it has more than one pageview, lasted at least
        10 seconds, or fired a non-pageview event; `bounce` is the inverse.
        Empty string on a filter means "no value set". Not yet returned:
        `is_new_visitor` and `converted`/goal fields.


        **Segment scoping**: pass `segment_id` (a segment created via the
        Segments API) to list only sessions by that segment's members —
        composable with every other filter:


        `GET /client/v1/data/sessions?segment_id=9f4e...&engaged=1&device_type=mobile`


        Membership is resolved live at query time ("people currently in the
        segment"), through the identity graph — a session counts when its
        `distinct_id` maps to a matching person.
      parameters:
        - $ref: "#/components/parameters/LocationIdHeader"
        - $ref: "#/components/parameters/LocationIdQuery"
        - $ref: "#/components/parameters/DateFrom"
        - $ref: "#/components/parameters/DateTo"
        - $ref: "#/components/parameters/FilterUtmSource"
        - $ref: "#/components/parameters/FilterUtmMedium"
        - $ref: "#/components/parameters/FilterUtmCampaign"
        - $ref: "#/components/parameters/FilterDeviceType"
        - $ref: "#/components/parameters/FilterBrowser"
        - $ref: "#/components/parameters/FilterOs"
        - $ref: "#/components/parameters/FilterCountry"
        - $ref: "#/components/parameters/FilterLandingPage"
        - $ref: "#/components/parameters/FilterEngaged"
        - $ref: "#/components/parameters/FilterBounce"
        - $ref: "#/components/parameters/FilterIsIdentified"
        - name: min_duration
          in: query
          required: false
          description: Minimum session duration in seconds.
          schema:
            type: integer
        - $ref: "#/components/parameters/SegmentId"
        - name: limit
          in: query
          required: false
          description: Max rows. Default `100`, min `1`, max `1000`.
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
        - name: offset
          in: query
          required: false
          description: Row offset for pagination.
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Session rows
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/RowsResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/SessionRow"
        "400":
          $ref: "#/components/responses/LocationRequired"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/SegmentNotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/UpstreamError"
        "503":
          $ref: "#/components/responses/NotConfigured"
  /sessions/breakdown:
    get:
      summary: Session group-by aggregates
      operationId: getSessionsBreakdown
      description: >
        Session aggregates grouped by one dimension: session count, engaged
        count/rate, bounce rate, average duration and pages per group. Accepts
        the same filters as `/sessions`, so you can group a filtered set.
        Ordered by `session_count` descending. Single dimension only —
        comma-list multi-dimension group-by is not yet supported.


        **Segment scoping**: pass `segment_id` to aggregate only the segment's
        members' sessions — e.g. which campaigns drive engaged sessions from
        identified customers:


        `GET /client/v1/data/sessions/breakdown?group_by=utm_campaign&segment_id=9f4e...`
      parameters:
        - $ref: "#/components/parameters/LocationIdHeader"
        - $ref: "#/components/parameters/LocationIdQuery"
        - $ref: "#/components/parameters/DateFrom"
        - $ref: "#/components/parameters/DateTo"
        - $ref: "#/components/parameters/FilterUtmSource"
        - $ref: "#/components/parameters/FilterUtmMedium"
        - $ref: "#/components/parameters/FilterUtmCampaign"
        - $ref: "#/components/parameters/FilterDeviceType"
        - $ref: "#/components/parameters/FilterBrowser"
        - $ref: "#/components/parameters/FilterOs"
        - $ref: "#/components/parameters/FilterCountry"
        - $ref: "#/components/parameters/FilterLandingPage"
        - $ref: "#/components/parameters/FilterEngaged"
        - $ref: "#/components/parameters/FilterBounce"
        - $ref: "#/components/parameters/FilterIsIdentified"
        - name: min_duration
          in: query
          required: false
          description: Minimum session duration in seconds.
          schema:
            type: integer
        - $ref: "#/components/parameters/SegmentId"
        - name: group_by
          in: query
          required: true
          description: Dimension to group by.
          schema:
            type: string
            enum:
              - utm_source
              - utm_medium
              - utm_campaign
              - utm_content
              - utm_term
              - device_type
              - browser
              - os
              - country
              - landing_page
              - exit_page
              - referring_domain
              - engaged
              - bounce
              - is_identified
        - name: limit
          in: query
          required: false
          description: Max groups. Default `50`, min `1`, max `1000`.
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 1000
      responses:
        "200":
          description: Grouped session rows
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/RowsResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/SessionBreakdownRow"
        "400":
          description: Missing or unknown `group_by` (`invalid_group_by`), or no location bound (`location_required`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/SegmentNotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/UpstreamError"
        "503":
          $ref: "#/components/responses/NotConfigured"
  /export:
    get:
      summary: BigQuery export status
      operationId: getExport
      description: >
        Return the agency's BigQuery export dataset status. Agency-wide — this
        is the only route that does not require a bound location. Requires an
        agency (`ak_`) key; secret keys receive `403`.
      responses:
        "200":
          description: BigQuery export dataset status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Route requires an agency (`ak_`) key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No BigQuery export provisioned for the agency
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >
        Agency key (`ak_`) or location secret key (`sk_`) as a bearer token.
        Format: `Bearer ak_...` or `Bearer sk_...`.
    AgencyKeyQuery:
      type: apiKey
      in: query
      name: ak
      description: Agency key passed as a query parameter. Prefer the `Authorization` header.
    SecretKeyQuery:
      type: apiKey
      in: query
      name: sk
      description: Location secret key passed as a query parameter. Prefer the `Authorization` header.
  parameters:
    LocationIdHeader:
      name: X-Location-Id
      in: header
      required: false
      description: >
        Location to scope the request to. Required for agency (`ak_`) keys on
        the event routes. Ignored for secret (`sk_`) keys, which resolve their
        own location, and not used by `/export`.
      schema:
        type: string
    LocationIdQuery:
      name: location_id
      in: query
      required: false
      description: >
        Alternative to the `X-Location-Id` header for agency (`ak_`) keys.
        Ignored for secret (`sk_`) keys.
      schema:
        type: string
    DateFrom:
      name: date_from
      in: query
      required: false
      description: Start date (`YYYY-MM-DD`).
      schema:
        type: string
        format: date
    DateTo:
      name: date_to
      in: query
      required: false
      description: End date (`YYYY-MM-DD`).
      schema:
        type: string
        format: date
    FilterUtmSource:
      name: utm_source
      in: query
      required: false
      description: Filter to sessions with this UTM source. Empty string = "no value set".
      schema:
        type: string
    FilterUtmMedium:
      name: utm_medium
      in: query
      required: false
      description: Filter to sessions with this UTM medium.
      schema:
        type: string
    FilterUtmCampaign:
      name: utm_campaign
      in: query
      required: false
      description: Filter to sessions with this UTM campaign.
      schema:
        type: string
    FilterDeviceType:
      name: device_type
      in: query
      required: false
      description: Filter to sessions on this device type.
      schema:
        type: string
    FilterBrowser:
      name: browser
      in: query
      required: false
      description: Filter to sessions on this browser.
      schema:
        type: string
    FilterOs:
      name: os
      in: query
      required: false
      description: Filter to sessions on this operating system.
      schema:
        type: string
    FilterCountry:
      name: country
      in: query
      required: false
      description: Filter to sessions from this country (ISO code).
      schema:
        type: string
    FilterLandingPage:
      name: landing_page
      in: query
      required: false
      description: Filter to sessions whose entry path matches.
      schema:
        type: string
    FilterEngaged:
      name: engaged
      in: query
      required: false
      description: Filter by engagement (`1`/`0`, or `true`/`false`).
      schema:
        type: boolean
    FilterBounce:
      name: bounce
      in: query
      required: false
      description: Filter by bounce (`1`/`0`, or `true`/`false`).
      schema:
        type: boolean
    FilterIsIdentified:
      name: is_identified
      in: query
      required: false
      description: Filter to identified (`1`) or anonymous (`0`) sessions.
      schema:
        type: boolean
    SegmentId:
      name: segment_id
      in: query
      required: false
      description: >
        Scope results to members of a saved segment (created via the Segments
        API). Membership is resolved live at query time — "people currently in
        the segment" — through the identity graph: a row counts when its
        `distinct_id` maps to a person matching the segment's definition.
        Composable with all other filters. Unknown or foreign id →
        `404 segment_not_found`.
      schema:
        type: string
        format: uuid
  responses:
    Unauthorized:
      description: Missing, malformed, or invalid key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: >
        Access denied — location not linked to the agency
        (`location_not_linked`) or the location has HIPAA mode enabled
        (`hipaa_restricted`).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    LocationRequired:
      description: An agency key called an event route without binding a location
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    SegmentNotFound:
      description: "`segment_id` does not exist for this location (`segment_not_found`)"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimited:
      description: >
        Rate limit exceeded (120 requests per 10 seconds, per location).
      headers:
        Retry-After:
          description: Seconds to wait before retrying.
          schema:
            type: integer
        X-RateLimit-Limit:
          description: Request ceiling for the window.
          schema:
            type: integer
        X-RateLimit-Remaining:
          description: Requests remaining in the current window.
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UpstreamError:
      description: An upstream data service failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotConfigured:
      description: The analytics service is not configured for this deployment
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    RowsResponse:
      type: object
      description: Generic Tinybird result envelope for analytics rows.
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            type: object
            additionalProperties: true
        rows:
          type: integer
          description: Number of rows returned.
    BreakdownRow:
      type: object
      description: One dimension value with its traffic counts.
      properties:
        value:
          type: string
          description: The dimension value (e.g. `/pricing`). Empty string when unset.
          example: /pricing
        pageviews:
          type: integer
          example: 1240
        unique_users:
          type: integer
          example: 830
        unique_sessions:
          type: integer
          example: 910
    SessionRow:
      type: object
      description: One session.
      properties:
        session_id: { type: string }
        distinct_id: { type: string }
        user_id: { type: string, nullable: true }
        is_identified: { type: boolean }
        started_at: { type: string, format: date-time }
        ended_at: { type: string, format: date-time }
        duration_seconds: { type: integer }
        events: { type: integer }
        pageviews: { type: integer }
        engaged: { type: boolean }
        bounce: { type: boolean }
        landing_page: { type: string }
        landing_url: { type: string }
        exit_page: { type: string }
        referrer: { type: string }
        referring_domain: { type: string }
        utm_source: { type: string }
        utm_medium: { type: string }
        utm_campaign: { type: string }
        utm_content: { type: string }
        utm_term: { type: string }
        utm_id: { type: string }
        gclid: { type: string }
        gbraid: { type: string }
        wbraid: { type: string }
        fbclid: { type: string }
        msclkid: { type: string }
        ttclid: { type: string }
        twclid: { type: string }
        li_fat_id: { type: string }
        epik: { type: string }
        sccid: { type: string }
        device_type: { type: string }
        browser: { type: string }
        os: { type: string }
        country: { type: string }
        city: { type: string }
        timezone: { type: string }
    SessionBreakdownRow:
      type: object
      description: Session aggregates for one group.
      properties:
        value:
          type: string
          description: The group value. For boolean group_by (`engaged`/`bounce`/`is_identified`) this is `"true"`/`"false"`.
          example: google
        session_count:
          type: integer
          example: 1204
        engaged_count:
          type: integer
          example: 812
        engaged_rate:
          type: number
          description: Engaged sessions as a percentage.
          example: 67.4
        bounce_rate:
          type: number
          description: Bounced sessions as a percentage.
          example: 32.6
        avg_duration_seconds:
          type: number
          example: 84.2
        avg_pageviews:
          type: number
          example: 2.7
    ExportResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            dataset:
              type: string
              description: Fully-qualified BigQuery dataset (`mythic-data.<dataset_name>`).
              example: mythic-data.agency_acme
            tables:
              type: array
              items:
                type: string
              example: ["events"]
            location_count:
              type: integer
              description: Number of locations included in the export dataset.
            status:
              type: string
              description: Provisioning status of the export dataset.
            provisioned_at:
              type: string
              format: date-time
              nullable: true
            updated_at:
              type: string
              format: date-time
              nullable: true
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              description: Machine-readable error code.
              example: unauthorized
            message:
              type: string
              description: Human-readable error message.
              example: Missing authorization
