openapi: "3.0.0"
info:
  version: 1.0.0
  title: Person API
  description: >
    Read-only, tenant-isolated access to resolved person profiles, their
    linked identities, session-grained attribution, and the identity merge
    ledger. Part of the agency-facing Data API. Authenticate with an agency
    key (`ak_`) or a location secret key (`sk_`). All routes are scoped to a
    single location.
servers:
  - url: https://mythic-analytics.gulp.workers.dev/client/v1/data
security:
  - AgencyKey: []
  - SecretKey: []
  - AgencyKeyQuery: []
  - SecretKeyQuery: []
paths:
  /people:
    get:
      summary: List people
      operationId: listPeople
      description: >
        List resolved person profiles for the location, most-recent first.
        Each row carries resolved display fields top-level — `display_name`,
        `email` (falls back to an email-type identity when no `$email`
        property is set), and `user_id` (the person's first user_id-type
        identity) — so list UIs can label rows (e.g. user_id → email → name)
        without a per-row `GET /people/{personId}` fetch. Rows also include
        `company`, `avatar`, `session_count`, and first/last-touch channel
        fields. Use `search` to match against name, email, or identities.
      parameters:
        - $ref: "#/components/parameters/LocationId"
        - name: limit
          in: query
          description: Maximum results per page. Default `50`, min `1`, max `200`.
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
        - name: offset
          in: query
          description: Number of results to skip. Default `0`.
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: search
          in: query
          description: Substring match against name, email, or company.
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of people
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PeopleListResponse"
        "400":
          $ref: "#/components/responses/LocationRequired"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
  /people/{personId}:
    get:
      summary: Retrieve a person
      operationId: getPerson
      description: >
        Fetch a single resolved person profile. `personId` may be either the
        canonical person id or a raw identity value (anonymous id, device id,
        email, or user id) — raw values are resolved to their canonical person.


        If the id refers to a person that was merged away, the response
        follows the merged-into profile by default and includes
        `resolved_from`. Pass `resolve_merged=false` to instead receive a
        `410` with the `merged_into_id` so you can update your own records.
      parameters:
        - $ref: "#/components/parameters/PersonId"
        - $ref: "#/components/parameters/LocationId"
        - name: resolve_merged
          in: query
          description: >
            When a person was merged away, `true` (default) returns the
            canonical merged-into profile. Set to `false` to receive `410
            person_merged` with `merged_into_id` instead.
          required: false
          schema:
            type: string
            enum: ["true", "false"]
            default: "true"
      responses:
        "200":
          description: Resolved person profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonResponse"
        "400":
          $ref: "#/components/responses/LocationRequired"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "410":
          description: Person was merged into another profile (only when `resolve_merged=false`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonMergedResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
  /people/{personId}/summary:
    get:
      summary: Retrieve a person summary
      operationId: getPersonSummary
      description: >
        Fetch a person profile with an expanded `metrics` block (sessions,
        devices, first-touch geography, technology, landing page, and UTM
        attribution). Returns `data: null` when no matching person exists.
      parameters:
        - $ref: "#/components/parameters/PersonId"
        - $ref: "#/components/parameters/LocationId"
      responses:
        "200":
          description: Person summary, or `null` when not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonSummaryResponse"
        "400":
          $ref: "#/components/responses/LocationRequired"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
  /people/{personId}/activity:
    get:
      summary: Retrieve a person's activity
      operationId: getPersonActivity
      description: >
        Recent events for a person within a look-back window. `personId` is
        resolved through the identity graph, so any linked identity value
        returns the same activity.


        Each row carries a `uuid` (the source event's id). To show whether an
        event was forwarded to a destination, pass a page of these uuids as a
        comma-separated `event_uuid` list to
        `GET /client/v1/destinations/deliveries` (status per destination), and
        drill into `GET /client/v1/destinations/{id}/deliveries/{eventUuid}`
        for the sent request and destination response bodies.
      parameters:
        - $ref: "#/components/parameters/PersonId"
        - $ref: "#/components/parameters/LocationId"
        - name: hours_back
          in: query
          description: >
            Look-back window in hours. Default `720` (30 days, the maximum) —
            pass a smaller value to narrow the window. Min `1`, max `720`.
          required: false
          schema:
            type: integer
            default: 720
            minimum: 1
            maximum: 720
        - name: limit
          in: query
          description: Maximum events to return. Default `100`, min `1`, max `1000`.
          required: false
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
        - name: event_type
          in: query
          description: Restrict to a single event type.
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Activity rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RowsResponse"
        "400":
          $ref: "#/components/responses/LocationRequired"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
  /people/{personId}/attribution:
    get:
      summary: Retrieve a person's attribution
      operationId: getPersonAttribution
      description: >
        First- and last-touch marketing attribution for a person. Returns
        `data: null` when no attribution row exists.
      parameters:
        - $ref: "#/components/parameters/PersonId"
        - $ref: "#/components/parameters/LocationId"
      responses:
        "200":
          description: Attribution object, or `null` when unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttributionResponse"
        "400":
          $ref: "#/components/responses/LocationRequired"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
  /people/{personId}/merges:
    get:
      summary: List a person's merges
      operationId: getPersonMerges
      description: >
        Merge ledger rows where this person is either the source or the
        target. Returns `404` if the person does not belong to the
        authenticated location.
      parameters:
        - $ref: "#/components/parameters/PersonId"
        - $ref: "#/components/parameters/LocationId"
      responses:
        "200":
          description: Merge rows for the person
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MergeListResponse"
        "400":
          $ref: "#/components/responses/LocationRequired"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
  /identities:
    get:
      summary: List identity mappings
      operationId: listIdentities
      description: >
        Bulk identity mappings (identity value → canonical person id) for the
        location. Use watermark pagination: pass the previous page's
        `next_since` as `since` to fetch the next page. Re-pulls are harmless
        (upsert stream).
      parameters:
        - $ref: "#/components/parameters/LocationId"
        - name: since
          in: query
          description: >
            Watermark. Return only mappings updated after this timestamp.
            Pass the previous page's `next_since`.
          required: false
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          description: Maximum mappings per page. Default `1000`, min `1`, max `5000`.
          required: false
          schema:
            type: integer
            default: 1000
            minimum: 1
            maximum: 5000
      responses:
        "200":
          description: Identity mappings with a pagination watermark
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityListResponse"
        "400":
          $ref: "#/components/responses/LocationRequired"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
  /merges:
    get:
      summary: List merges
      operationId: listMerges
      description: >
        Authoritative merge ledger for the location, oldest first. Use
        watermark pagination with `since` and the returned `next_since`.
      parameters:
        - $ref: "#/components/parameters/LocationId"
        - name: since
          in: query
          description: Return only merges created after this timestamp. Pass the previous page's `next_since`.
          required: false
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          description: Maximum merges per page. Default `500`, min `1`, max `5000`.
          required: false
          schema:
            type: integer
            default: 500
            minimum: 1
            maximum: 5000
      responses:
        "200":
          description: Merge ledger with a pagination watermark
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MergeWatermarkResponse"
        "400":
          $ref: "#/components/responses/LocationRequired"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
  /merge-warnings:
    get:
      summary: List merge warnings
      operationId: listMergeWarnings
      description: >
        Merge warnings for the location — conflicting identity signals the
        processor flagged but did not act on. Use watermark pagination with
        `since` and the returned `next_since`.
      parameters:
        - $ref: "#/components/parameters/LocationId"
        - name: since
          in: query
          description: Return only warnings created after this timestamp. Pass the previous page's `next_since`.
          required: false
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          description: Maximum warnings per page. Default `500`, min `1`, max `5000`.
          required: false
          schema:
            type: integer
            default: 500
            minimum: 1
            maximum: 5000
      responses:
        "200":
          description: Merge warnings with a pagination watermark
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MergeWarningListResponse"
        "400":
          $ref: "#/components/responses/LocationRequired"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
components:
  securitySchemes:
    AgencyKey:
      type: http
      scheme: bearer
      description: >
        Agency key as bearer token. Format: `Bearer ak_...`. Must name a
        location via the `location_id` query parameter or `X-Location-Id`
        header.
    SecretKey:
      type: http
      scheme: bearer
      description: >
        Location secret key as bearer token. Format: `Bearer sk_...`.
        Resolves its own location — no `location_id` needed.
    AgencyKeyQuery:
      type: apiKey
      in: query
      name: ak
      description: Agency key as a query parameter. Alternative to the Authorization header.
    SecretKeyQuery:
      type: apiKey
      in: query
      name: sk
      description: Location secret key as a query parameter. Alternative to the Authorization header.
  parameters:
    PersonId:
      name: personId
      in: path
      required: true
      description: >
        Canonical person id, or any raw identity value linked to the person
        (anonymous id, device id, email, or user id).
      schema:
        type: string
      example: 8f3c1e00-4a2b-4c9d-9e11-1a2b3c4d5e6f
    LocationId:
      name: location_id
      in: query
      required: false
      description: >
        Required for agency (`ak_`) keys. Ignored for secret (`sk_`) keys,
        which resolve their own location. May also be supplied via the
        `X-Location-Id` header.
      schema:
        type: string
      example: acme-retail
  responses:
    Unauthorized:
      description: Missing or invalid key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: >
        Location not linked to the agency (`location_not_linked`), or the
        location has HIPAA mode enabled (`hipaa_restricted`).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Person not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    LocationRequired:
      description: Agency key supplied without a location
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimited:
      description: Too many requests (120 per 10s per location)
      headers:
        Retry-After:
          description: Seconds to wait before retrying.
          schema:
            type: string
        X-RateLimit-Limit:
          description: Request ceiling for the window.
          schema:
            type: string
        X-RateLimit-Remaining:
          description: Requests remaining in the current window.
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    PersonListItem:
      type: object
      properties:
        id:
          type: string
          description: Canonical person id.
          example: 8f3c1e00-4a2b-4c9d-9e11-1a2b3c4d5e6f
        location_id:
          type: string
          example: acme-retail
        display_name:
          type: string
          description: >
            Resolved display name from `$name` (or `$first_name`/`$last_name`)
            person properties. Empty string when unset.
          example: Dana Reyes
        email:
          type: string
          description: >
            `$email` person property, falling back to the person's first
            email-type identity. Empty string when the person has neither.
          example: dana@example.com
        user_id:
          type: string
          description: >
            The person's first user_id-type identity (the value passed to
            `identify()`). Empty string when the person is anonymous.
          example: usr_2841
        company:
          type: string
          example: Example Co
        avatar:
          type: string
          example: https://cdn.example.com/avatars/dana.png
        session_count:
          type: integer
          example: 17
        first_channel:
          type: string
          example: paid/google
        last_channel:
          type: string
          example: direct/none
        last_utm_source:
          type: string
        last_utm_medium:
          type: string
        last_utm_campaign:
          type: string
        last_geo_country_name:
          type: string
          example: United States
        properties:
          type: object
          description: >
            Legacy mirror of the display fields (`$name`, `$email`, `$company`,
            `$avatar`); keys are omitted when unset. Prefer the top-level
            `display_name` / `email` / `company` / `avatar` fields.
          properties:
            $name:
              type: string
              example: Dana Reyes
            $email:
              type: string
              example: dana@example.com
            $company:
              type: string
              example: Example Co
            $avatar:
              type: string
              example: https://cdn.example.com/avatars/dana.png
        first_seen_at:
          type: string
          format: date-time
        last_seen_at:
          type: string
          format: date-time
        identity_count:
          type: integer
          description: Number of identity values linked to this person.
          example: 3
    Person:
      type: object
      properties:
        id:
          type: string
          example: 8f3c1e00-4a2b-4c9d-9e11-1a2b3c4d5e6f
        location_id:
          type: string
          example: acme-retail
        resolved_from:
          type: string
          description: >
            Present only when the requested id was merged away and
            `resolve_merged` was not `false` — the original id you requested.
          example: 1c9d2e00-7f3a-4b1c-8d22-9a8b7c6d5e4f
        properties:
          type: object
          description: Arbitrary person properties as key/value pairs.
          additionalProperties: true
        identities:
          type: array
          description: Identity values linked to this person.
          items:
            type: object
            additionalProperties: true
        first_seen_at:
          type: string
          format: date-time
        last_seen_at:
          type: string
          format: date-time
        session_count:
          type: integer
        unique_sessions:
          type: integer
        unique_devices:
          type: integer
        first_geo_country_name:
          type: string
          nullable: true
        first_browser:
          type: string
          nullable: true
        first_os:
          type: string
          nullable: true
        first_device_type:
          type: string
          nullable: true
    PersonSummary:
      type: object
      properties:
        id:
          type: string
          example: 8f3c1e00-4a2b-4c9d-9e11-1a2b3c4d5e6f
        properties:
          type: object
          additionalProperties: true
        identities:
          type: array
          items:
            type: object
            additionalProperties: true
        first_seen_at:
          type: string
          format: date-time
        last_seen_at:
          type: string
          format: date-time
        metrics:
          type: object
          properties:
            session_count:
              type: integer
            unique_sessions:
              type: integer
            unique_devices:
              type: integer
            first_geo_country_name:
              type: string
              nullable: true
            last_geo_country_name:
              type: string
              nullable: true
            first_browser:
              type: string
              nullable: true
            first_os:
              type: string
              nullable: true
            first_device_type:
              type: string
              nullable: true
            first_landing_page:
              type: string
              nullable: true
            first_utm_source:
              type: string
              nullable: true
            first_utm_medium:
              type: string
              nullable: true
            first_utm_campaign:
              type: string
              nullable: true
            first_referrer:
              type: string
              nullable: true
            first_referring_domain:
              type: string
              nullable: true
    Attribution:
      type: object
      description: >
        Attribution dimensions for the person. Always includes
        `first_seen_at` and `last_seen_at`; remaining fields are
        first-/last-touch attribution dimensions.
      properties:
        first_seen_at:
          type: string
          format: date-time
        last_seen_at:
          type: string
          format: date-time
      additionalProperties: true
    IdentityMapping:
      type: object
      description: A single identity-value → person mapping.
      properties:
        updated_at:
          type: string
          format: date-time
          description: Last time this mapping changed. Used as the pagination watermark.
      additionalProperties: true
    Merge:
      type: object
      properties:
        id:
          type: string
          format: uuid
        source_person_id:
          type: string
          description: The person that was merged away.
        target_person_id:
          type: string
          description: The surviving canonical person.
        merge_reason:
          type: string
          nullable: true
        merged_by:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
    MergeWarning:
      type: object
      properties:
        id:
          type: string
          format: uuid
        source_person_id:
          type: string
        target_person_id:
          type: string
        event_name:
          type: string
          nullable: true
        event_distinct_id:
          type: string
          nullable: true
        identity_value:
          type: string
          nullable: true
        reason:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
    PeopleListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/PersonListItem"
        count:
          type: integer
          description: Number of rows returned.
          example: 50
    PersonResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/Person"
    PersonSummaryResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/PersonSummary"
    AttributionResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/Attribution"
    RowsResponse:
      type: object
      description: Generic list envelope used by activity.
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            type: object
            additionalProperties: true
        rows:
          type: integer
          description: Number of rows returned.
          example: 12
    IdentityListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/IdentityMapping"
        rows:
          type: integer
          example: 1000
        next_since:
          type: string
          format: date-time
          nullable: true
          description: Watermark for the next page. `null` when the page is empty.
    MergeListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/Merge"
        rows:
          type: integer
          example: 2
    MergeWatermarkResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/Merge"
        rows:
          type: integer
          example: 500
        next_since:
          type: string
          format: date-time
          nullable: true
          description: Watermark for the next page. `null` when the page is empty.
    MergeWarningListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/MergeWarning"
        rows:
          type: integer
          example: 500
        next_since:
          type: string
          format: date-time
          nullable: true
          description: Watermark for the next page. `null` when the page is empty.
    PersonMergedResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              example: person_merged
            message:
              type: string
              example: Person was merged into another profile
            merged_into_id:
              type: string
              description: The canonical person the requested id was merged into.
              example: 8f3c1e00-4a2b-4c9d-9e11-1a2b3c4d5e6f
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              description: Machine-readable error code.
              example: unauthorized
            message:
              type: string
              description: Human-readable error message.
              example: Missing authorization
