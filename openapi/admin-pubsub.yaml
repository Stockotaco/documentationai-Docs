openapi: "3.0.0"
info:
  version: 1.0.0
  title: Pub/Sub
  description: >
    Manage Google Cloud Pub/Sub subscriptions for the configured Mythic
    Analytics events topic: create, inspect, update, delete, pull messages for
    debugging, read Cloud Monitoring metrics, and pause/resume push delivery.
    Mounted at `/admin/pubsub`. The topic is fixed by the worker's
    `PUBSUB_TOPIC_NAME` env var and is not supplied per request.
servers:
  - url: https://mythic-analytics.gulp.workers.dev
security:
  - BearerAuth: []
  - AdminKeyQuery: []
paths:
  /admin/pubsub/subscriptions:
    get:
      summary: List subscriptions
      operationId: listSubscriptions
      description: >
        List all subscriptions attached to the configured topic, with each
        subscription's resolved configuration.
      responses:
        "200":
          description: List of subscriptions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionListResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: GCP configuration missing or upstream error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create subscription
      operationId: createSubscription
      description: >
        Create (or replace) a subscription on the configured topic. Uses an
        idempotent PUT against the Pub/Sub API, so re-creating an existing
        subscription updates it rather than returning a conflict. Provide
        `pushEndpoint` for push delivery; omit it for pull delivery.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubscriptionRequest"
      responses:
        "201":
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSubscriptionResponse"
        "400":
          description: Subscription name missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: GCP configuration missing or upstream error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/pubsub/subscriptions/{name}:
    get:
      summary: Retrieve subscription
      operationId: getSubscription
      description: Fetch a single subscription's resolved configuration.
      parameters:
        - $ref: "#/components/parameters/SubscriptionName"
      responses:
        "200":
          description: Subscription details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Subscription not found or upstream error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      summary: Update subscription
      operationId: updateSubscription
      description: >
        Partially update a subscription. Only the supplied fields are included
        in the update mask. Setting `pushEndpoint` to an empty/false value
        clears the push config (converting the subscription to pull mode).
      parameters:
        - $ref: "#/components/parameters/SubscriptionName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSubscriptionRequest"
      responses:
        "200":
          description: Subscription updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MutationResponse"
        "400":
          description: No fields to update
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Subscription not found or upstream error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete subscription
      operationId: deleteSubscription
      description: >
        Permanently delete a subscription and clear any stored paused-state in
        KV. Undelivered messages are lost.
      parameters:
        - $ref: "#/components/parameters/SubscriptionName"
      responses:
        "200":
          description: Subscription deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Subscription not found or upstream error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/pubsub/subscriptions/{name}/metrics:
    get:
      summary: Get subscription metrics
      operationId: getSubscriptionMetrics
      description: >
        Read the last hour of Cloud Monitoring metrics for a subscription:
        latest values plus time series for backlog and delivery rate.
      parameters:
        - $ref: "#/components/parameters/SubscriptionName"
      responses:
        "200":
          description: Subscription metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: GCP configuration missing or upstream error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/pubsub/subscriptions/{name}/pull:
    post:
      summary: Pull messages
      operationId: pullMessages
      description: >
        Pull messages for debugging without acknowledging them (the pull uses
        `returnImmediately`, so messages remain in the subscription and will be
        redelivered). There is no acknowledge endpoint.
      parameters:
        - $ref: "#/components/parameters/SubscriptionName"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PullRequest"
      responses:
        "200":
          description: Pulled messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PullResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Subscription not found or upstream error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/pubsub/subscriptions/{name}/pause:
    post:
      summary: Pause push subscription
      operationId: pauseSubscription
      description: >
        Pause a push subscription by storing its current push endpoint in KV
        and clearing the push config (converting it to pull mode). Only valid
        for push subscriptions.
      parameters:
        - $ref: "#/components/parameters/SubscriptionName"
      responses:
        "200":
          description: Subscription paused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PauseResponse"
        "400":
          description: Subscription is not a push subscription or already paused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Subscription not found or upstream error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/pubsub/subscriptions/{name}/resume:
    post:
      summary: Resume push subscription
      operationId: resumeSubscription
      description: >
        Restore a paused push subscription by re-applying the push endpoint
        stored in KV, then clearing the paused state.
      parameters:
        - $ref: "#/components/parameters/SubscriptionName"
      responses:
        "200":
          description: Subscription resumed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeResponse"
        "400":
          description: No paused state found for this subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Subscription not found or upstream error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: "Admin API key as bearer token. Format: `Bearer YOUR_ADMIN_KEY`"
    AdminKeyQuery:
      type: apiKey
      in: query
      name: admin_key
      description: Alternative to the Authorization header for server-to-server scenarios.
  parameters:
    SubscriptionName:
      name: name
      in: path
      required: true
      description: Subscription name (the short name, not the fully-qualified path).
      schema:
        type: string
  schemas:
    CreateSubscriptionRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Unique subscription name. The topic is taken from worker config.
          example: identity-processor-push
        ackDeadlineSeconds:
          type: integer
          description: Seconds to acknowledge a message before redelivery. Default `60`.
          default: 60
        pushEndpoint:
          type: string
          format: uri
          description: Push delivery URL. Omit for pull delivery.
          example: https://processor.example.com/pubsub/push
        pushAuthToken:
          type: boolean
          description: >
            When true, attach an OIDC token (using the worker service account,
            audience = `pushEndpoint`) to push requests.
        unwrapPubsubMessage:
          type: boolean
          description: >
            When true, deliver the raw message payload instead of the Pub/Sub
            envelope (`noWrapper`).
        writeMetadata:
          type: boolean
          description: >
            When unwrapping, include message metadata as headers. Defaults to
            true.
          default: true
        retryPolicy:
          type: object
          description: Retry backoff bounds.
          properties:
            minimumBackoff:
              type: string
              description: Minimum backoff duration. Default `10s`.
              example: 10s
            maximumBackoff:
              type: string
              description: Maximum backoff duration. Default `600s`.
              example: 600s
        filter:
          type: string
          description: Pub/Sub message filter expression (attribute filter).
          example: 'attributes.event_type = "pageview"'
        deadLetterTopic:
          type: string
          description: >
            Fully-qualified dead-letter topic. When set, a dead-letter policy is
            attached.
          example: projects/my-project/topics/mythic-events-dlq
        maxDeliveryAttempts:
          type: integer
          description: >
            Max delivery attempts before dead-lettering. Only applied when
            `deadLetterTopic` is set. Default `5`.
          default: 5
        expirationTtl:
          type: string
          description: Subscription expiration TTL (e.g., `2678400s`).
          example: 2678400s
    UpdateSubscriptionRequest:
      type: object
      description: >
        Only the fields you include are updated. Pass an empty/false
        `pushEndpoint` to clear push config.
      properties:
        pushEndpoint:
          type: string
          format: uri
          nullable: true
        ackDeadlineSeconds:
          type: integer
        retryPolicy:
          type: object
        deadLetterPolicy:
          type: object
        expirationPolicy:
          type: object
    PullRequest:
      type: object
      properties:
        maxMessages:
          type: integer
          description: Maximum messages to return. Default `10`, max `100`.
          default: 10
          maximum: 100
    Subscription:
      type: object
      properties:
        name:
          type: string
          example: identity-processor-push
        fullName:
          type: string
          example: projects/my-project/subscriptions/identity-processor-push
        topic:
          type: string
          example: projects/my-project/topics/mythic-events
        pushConfig:
          type: object
          nullable: true
        ackDeadlineSeconds:
          type: integer
          example: 60
        retryPolicy:
          type: object
          nullable: true
        deadLetterPolicy:
          type: object
          nullable: true
        filter:
          type: string
          nullable: true
        expirationPolicy:
          type: object
          nullable: true
        state:
          type: string
          example: ACTIVE
        type:
          type: string
          enum: ["PUSH", "PULL"]
          example: PUSH
        unwrapped:
          type: boolean
          description: >
            Whether push messages are delivered unwrapped. Present on the list
            endpoint.
          example: false
    SubscriptionListResponse:
      type: object
      properties:
        subscriptions:
          type: array
          items:
            $ref: "#/components/schemas/Subscription"
    CreateSubscriptionResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        subscription:
          type: object
          description: >
            The created subscription — the request's `name`/`fullName` merged
            with the raw Pub/Sub API response.
    MutationResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        subscription:
          type: object
          description: Raw Pub/Sub API response for the updated subscription.
    DeleteResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        deleted:
          type: string
          description: The subscription name that was deleted.
          example: identity-processor-push
    PauseResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        paused:
          type: string
          example: identity-processor-push
        originalEndpoint:
          type: string
          description: The push endpoint stored so it can be restored on resume.
          example: https://processor.example.com/pubsub/push
    ResumeResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        resumed:
          type: string
          example: identity-processor-push
        pushEndpoint:
          type: string
          example: https://processor.example.com/pubsub/push
    SubscriptionMetrics:
      type: object
      properties:
        backlogCount:
          type: number
          nullable: true
          description: Latest number of undelivered messages.
          example: 30
        oldestUnackedAge:
          type: number
          nullable: true
          description: Age (seconds) of the oldest unacknowledged message.
          example: 12
        pushRequestCount:
          type: number
          nullable: true
          example: 15230
        pullRequestCount:
          type: number
          nullable: true
          example: 0
    MetricsTimePoint:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          example: "2024-04-01T10:00:00.000Z"
        value:
          type: number
          example: 30
    MetricsResponse:
      type: object
      properties:
        subscription:
          type: string
          example: identity-processor-push
        metrics:
          $ref: "#/components/schemas/SubscriptionMetrics"
        timeSeries:
          type: object
          properties:
            backlog:
              type: array
              items:
                $ref: "#/components/schemas/MetricsTimePoint"
            deliveryRate:
              type: array
              items:
                $ref: "#/components/schemas/MetricsTimePoint"
    PulledMessage:
      type: object
      properties:
        ackId:
          type: string
          example: "UAYWLF1G..."
        messageId:
          type: string
          example: "9876543210"
        publishTime:
          type: string
          format: date-time
          example: "2024-04-01T10:00:00.000Z"
        attributes:
          type: object
          description: Message attributes for filtering.
        data:
          description: >
            Decoded message payload. Parsed as JSON when possible, otherwise the
            raw (base64) string.
        deliveryAttempt:
          type: integer
          example: 1
    PullResponse:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/PulledMessage"
        count:
          type: integer
          example: 3
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error message.
          example: Subscription name is required
