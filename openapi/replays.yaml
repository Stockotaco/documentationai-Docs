openapi: "3.0.0"
info:
  version: 1.0.0
  title: Session Replays
  description: >
    Read recorded browser sessions (rrweb) for a location. Capture is enabled
    per client via server config — nothing records until turned on. Recordings
    expire after 30 days. Served from Mythic Analytics. HIPAA-mode locations
    are not served.


    **Build your own replays page** — Mythic's own admin replays UI is built
    entirely on this API plus the open-source `rrweb-player`; the full recipe:

    1. Enable/tune recording once per client: `PATCH /api/v1/clients/:id` with
    `{"session_replay": {"enabled": true, "sampleRate": 1, "minDurationMs": 10000}}`
    (served to the SDK via remote config on the next page load).

    2. List recordings: `GET /replays` — identity, URL, browser/device,
    duration, activity counters per row.

    3. Play one: `GET /replays/{sessionId}` → feed `data.events` straight into
    `rrweb-player`. Console and network entries ride along in the same stream
    (rrweb Plugin/Custom events) if you want DevTools-style tabs. Version
    note: streams are recorded with rrweb 2.1.0 — pin `rrweb-player` to
    exactly `2.0.0-alpha.20` (the stable 2.0.x/2.1.x ESM builds ship without
    the replay engine and crash on load); a custom player on `@rrweb/replay`
    2.1.0 works.

    4. Attribution sidebar: `GET /sessions?session_id={id}` (Data API) — one
    row with source/medium/campaign, click IDs, device, geo.

    5. New vs returning (optional): `GET /people/{distinctId}/summary` —
    `metrics.session_count > 1` means returning.

    For feeding a model instead of a human, use
    `GET /replays/{sessionId}/timeline`.
servers:
  - url: https://mythic-analytics.gulp.workers.dev/client/v1/data
security:
  - BearerAuth: []
  - AgencyKeyQuery: []
  - SecretKeyQuery: []
paths:
  /replays:
    get:
      summary: List session replays
      operationId: listReplays
      description: >
        List recorded sessions for the location, newest-first, within the
        30-day retention window. Each row carries the session's full entry
        attribution (UTMs, landing page, referrer, device, geo — the same
        fields as `GET /sessions` in the Data API) plus identity, duration,
        and activity counters derived from the recording.


        **Filtering**: accepts the same filters as `GET /sessions` —
        `utm_source`, `utm_medium`, `utm_campaign`, `landing_page`,
        `device_type`, `browser`, `os`, `country`, `date_from`/`date_to`,
        `engaged`, `bounce`, `is_identified`, `min_duration` — plus
        `segment_id` to scope to a saved segment's members:


        `GET /client/v1/data/replays?utm_source=Facebook&landing_page=/pricing`


        `GET /client/v1/data/replays?segment_id=9f4e...&device_type=mobile`


        **Recordings tab (person scoping)**: pass `person_id` (canonical id
        from the People API) or `distinct_id` (any raw identity value) to
        list one person's recordings, resolved through the identity graph —
        no more fetching the recent list and filtering client-side:


        `GET /client/v1/data/replays?person_id=019f69bc-...`
      parameters:
        - $ref: "#/components/parameters/LocationIdHeader"
        - $ref: "#/components/parameters/LocationIdQuery"
        - $ref: "#/components/parameters/DateFrom"
        - $ref: "#/components/parameters/DateTo"
        - $ref: "#/components/parameters/FilterUtmSource"
        - $ref: "#/components/parameters/FilterUtmMedium"
        - $ref: "#/components/parameters/FilterUtmCampaign"
        - $ref: "#/components/parameters/FilterDeviceType"
        - $ref: "#/components/parameters/FilterBrowser"
        - $ref: "#/components/parameters/FilterOs"
        - $ref: "#/components/parameters/FilterCountry"
        - $ref: "#/components/parameters/FilterLandingPage"
        - $ref: "#/components/parameters/FilterEngaged"
        - $ref: "#/components/parameters/FilterBounce"
        - $ref: "#/components/parameters/FilterIsIdentified"
        - $ref: "#/components/parameters/FilterPersonId"
        - $ref: "#/components/parameters/FilterDistinctId"
        - name: min_duration
          in: query
          required: false
          description: Minimum session duration in seconds.
          schema:
            type: integer
        - $ref: "#/components/parameters/SegmentId"
        - name: limit
          in: query
          required: false
          description: Max sessions to return (1–1000).
          schema:
            type: integer
            default: 100
            maximum: 1000
        - name: offset
          in: query
          required: false
          description: Row offset for pagination.
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Session list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplayListResponse"
        "400":
          $ref: "#/components/responses/LocationRequired"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Unknown `segment_id` for this location (`segment_not_found`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
  /replays/{sessionId}:
    get:
      summary: Get a session recording
      operationId: getReplay
      description: >
        Return the full rrweb event stream for one session (DOM + console +
        network), concatenated in order. Feed `data.events` straight into an
        rrweb player such as `rrweb-player` — pinned to exactly
        `2.0.0-alpha.20` (streams are rrweb 2.1.0; the stable 2.0.x/2.1.x
        rrweb-player ESM builds ship without the replay engine and crash on
        load).
      parameters:
        - $ref: "#/components/parameters/LocationIdHeader"
        - $ref: "#/components/parameters/LocationIdQuery"
        - name: sessionId
          in: path
          required: true
          description: The session id from the list endpoint.
          schema:
            type: string
      responses:
        "200":
          description: Recording events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplayEventsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: No recording exists for that session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /replays/{sessionId}/timeline:
    get:
      summary: Get a session timeline (LLM-ready)
      operationId: getReplayTimeline
      description: >
        Return a compact, chronological timeline of the session — the
        AI-summarization view, NOT the raw rrweb stream. Turns the event stream
        into an ordered sequence of meaningful steps (page journey, dwell time,
        form submissions, field inputs, identify, and custom events). Replay
        heartbeat/start markers, engagement pings, and web vitals are dropped.
        Contains no PII — form and input values are excluded, only field
        metadata. `sessionId` must be a UUIDv7 (all recording session ids are).
        Feed `data` to a model to summarize what the visitor did and where they
        dropped off.
      parameters:
        - $ref: "#/components/parameters/LocationIdHeader"
        - $ref: "#/components/parameters/LocationIdQuery"
        - name: sessionId
          in: path
          required: true
          description: The session id from the list endpoint.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Max timeline rows (1–2000).
          schema:
            type: integer
            default: 500
            maximum: 2000
      responses:
        "200":
          description: Session timeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplayTimelineResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >
        Agency key (`ak_`) or location secret key (`sk_`) as a bearer token.
        Format: `Bearer ak_...` or `Bearer sk_...`.
    AgencyKeyQuery:
      type: apiKey
      in: query
      name: ak
      description: Agency key passed as a query parameter. Prefer the `Authorization` header.
    SecretKeyQuery:
      type: apiKey
      in: query
      name: sk
      description: Location secret key passed as a query parameter. Prefer the `Authorization` header.
  parameters:
    LocationIdHeader:
      name: X-Location-Id
      in: header
      required: false
      description: >
        Location to scope the request to. Required for agency (`ak_`) keys.
        Ignored for secret (`sk_`) keys, which resolve their own location.
      schema:
        type: string
    LocationIdQuery:
      name: location_id
      in: query
      required: false
      description: >
        Alternative to the `X-Location-Id` header for agency (`ak_`) keys.
        Ignored for secret (`sk_`) keys.
      schema:
        type: string
    DateFrom:
      name: date_from
      in: query
      required: false
      description: Start date (`YYYY-MM-DD`), on session start time.
      schema:
        type: string
        format: date
    DateTo:
      name: date_to
      in: query
      required: false
      description: End date (`YYYY-MM-DD`).
      schema:
        type: string
        format: date
    FilterUtmSource:
      name: utm_source
      in: query
      required: false
      description: Filter to sessions with this UTM source. Empty string = "no value set".
      schema:
        type: string
    FilterUtmMedium:
      name: utm_medium
      in: query
      required: false
      description: Filter to sessions with this UTM medium.
      schema:
        type: string
    FilterUtmCampaign:
      name: utm_campaign
      in: query
      required: false
      description: Filter to sessions with this UTM campaign.
      schema:
        type: string
    FilterDeviceType:
      name: device_type
      in: query
      required: false
      description: Filter to sessions on this device type.
      schema:
        type: string
    FilterBrowser:
      name: browser
      in: query
      required: false
      description: Filter to sessions on this browser.
      schema:
        type: string
    FilterOs:
      name: os
      in: query
      required: false
      description: Filter to sessions on this operating system.
      schema:
        type: string
    FilterCountry:
      name: country
      in: query
      required: false
      description: Filter to sessions from this country (ISO code).
      schema:
        type: string
    FilterLandingPage:
      name: landing_page
      in: query
      required: false
      description: >
        Filter to sessions whose entry path matches. Case-insensitive and
        trailing-slash-insensitive (`/About/` matches `/about`). Query params
        never apply — the path is captured without them.
      schema:
        type: string
    FilterEngaged:
      name: engaged
      in: query
      required: false
      description: Filter by engagement (`1`/`0`, or `true`/`false`).
      schema:
        type: boolean
    FilterBounce:
      name: bounce
      in: query
      required: false
      description: Filter by bounce (`1`/`0`, or `true`/`false`).
      schema:
        type: boolean
    FilterIsIdentified:
      name: is_identified
      in: query
      required: false
      description: Filter to identified (`1`) or anonymous (`0`) sessions.
      schema:
        type: boolean
    FilterPersonId:
      name: person_id
      in: query
      required: false
      description: >
        Scope to one person's recordings: the canonical person id from the
        People API. Matches every recorded session whose visitor id belongs
        to that person in the identity graph (anonymous ids, user ids,
        emails), so pre-identification recordings are included. Powers a
        profile view's Recordings tab. Composable with all other filters and
        the date window.
      schema:
        type: string
    FilterDistinctId:
      name: distinct_id
      in: query
      required: false
      description: >
        Scope to one person's recordings by any raw identity value (anonymous
        id, user id, or email), resolved through the identity graph to the
        owning person's full identity set. A value not in the graph (a
        never-identified visitor) falls back to an exact `distinct_id` match.
        Pass either this or `person_id`, not both (they AND together).
      schema:
        type: string
    SegmentId:
      name: segment_id
      in: query
      required: false
      description: >
        Scope results to members of a saved segment (created via the Segments
        API). The segment decides WHICH PEOPLE qualify (a live definition,
        evaluated at query time); the date window decides which of their
        recorded sessions are returned. Composable with all other filters.
        Unknown or foreign id → `404 segment_not_found`.
      schema:
        type: string
        format: uuid
  responses:
    Unauthorized:
      description: Missing, malformed, or invalid key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: >
        Access denied — location not linked to the agency
        (`location_not_linked`) or the location has HIPAA mode enabled
        (`hipaa_restricted`).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    LocationRequired:
      description: An agency key called the route without binding a location
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimited:
      description: Rate limit exceeded (120 requests per 10 seconds, per location).
      headers:
        Retry-After:
          description: Seconds to wait before retrying.
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ReplaySession:
      type: object
      description: >
        A recorded session row: the full session record from `GET /sessions`
        (entry attribution — all UTMs, click IDs, landing/exit page, referrer,
        device, geo — plus `duration_seconds`, `events`, `pageviews`,
        `engaged`, `bounce`, `is_identified`) with replay activity counters
        merged on top. Only replay-specific fields are listed here; see the
        Data API `SessionRow` schema for the rest.
      additionalProperties: true
      properties:
        session_id:
          type: string
          description: Stable session identifier; use it to fetch the recording.
        started_at:
          type: string
          nullable: true
          description: Session start time.
        person_id:
          type: string
          nullable: true
          description: >
            Legacy identity value (the session's `user_id`, falling back to
            `distinct_id`) — NOT the canonical person id from the People API.
            To filter recordings by this value, pass it as `distinct_id`; the
            `person_id` query filter expects a People API id.
        distinct_id:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
          description: Legacy alias of `landing_url`.
        landing_page:
          type: string
          nullable: true
          description: Entry path of the session.
        utm_source:
          type: string
          nullable: true
        utm_medium:
          type: string
          nullable: true
        utm_campaign:
          type: string
          nullable: true
        browser:
          type: string
          nullable: true
        device_type:
          type: string
          nullable: true
        duration_ms:
          type: integer
          nullable: true
          description: Recorded duration from the replay summary (absent if the tab closed before the summary flushed).
        clicks:
          type: integer
        keypresses:
          type: integer
        console_errors:
          type: integer
        network_count:
          type: integer
    ReplayListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/ReplaySession"
        cursor:
          type: string
          nullable: true
          description: Reserved; currently always `null` (no pagination beyond the cap).
    ReplayEventsResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            session_id:
              type: string
            events:
              type: array
              description: rrweb `eventWithTime` objects, in playback order.
              items:
                type: object
                additionalProperties: true
    TimelineEvent:
      type: object
      properties:
        t:
          type: string
          description: Event timestamp (UTC).
        seconds_from_start:
          type: integer
          description: Seconds elapsed since the first event in the session.
        event:
          type: string
          example: $pageview
          description: Event type ($pageview, $pageleave, form_submitted, input_captured, $identify, custom_event).
        path:
          type: string
          description: URL path the event occurred on.
        detail:
          type: string
          description: Compact, human-readable summary of the event (no PII).
    ReplayTimelineResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        rows:
          type: integer
        truncated:
          type: boolean
          description: >
            True when the row cap was hit; the most-recent rows (the session
            outcome) are kept and earlier rows dropped.
        data:
          type: array
          items:
            $ref: "#/components/schemas/TimelineEvent"
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              example: replay_not_found
            message:
              type: string
              example: No recording for that session
