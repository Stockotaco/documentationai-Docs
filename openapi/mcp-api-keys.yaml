openapi: "3.0.0"
info:
  version: 1.0.0
  title: MCP API Keys
  description: >-
    Platform-level provisioning of `mcp_` API keys used to authenticate
    against the MCP gateway. Mounted under /admin/mcp and authenticated with
    the platform ADMIN_KEY. Each key is scoped to one agency and one location.
servers:
  - url: https://mythic-analytics.gulp.workers.dev
security:
  - BearerAuth: []
  - AdminKeyQuery: []
paths:
  /admin/mcp/api-keys:
    get:
      summary: List API keys
      operationId: listMcpApiKeys
      description: >
        List MCP API keys. Only the `key_prefix` is returned — the raw key and
        its hash are never exposed.
      parameters:
        - name: agency_id
          in: query
          description: Filter keys to a single agency.
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of API keys
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyListResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create API key
      operationId: createMcpApiKey
      description: >
        Create a new `mcp_` API key. The raw key is returned only once, in the
        `data.key` field of this response. Only its SHA-256 hash and 12-char
        prefix are stored afterwards.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiKeyRequest"
      responses:
        "201":
          description: API key created. The full key is returned only once.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyCreatedResponse"
        "400":
          description: Missing required field (name, agency_id, or location_id)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/mcp/api-keys/{id}:
    delete:
      summary: Delete API key
      operationId: deleteMcpApiKey
      description: Permanently delete (revoke) an MCP API key.
      parameters:
        - $ref: "#/components/parameters/ApiKeyId"
      responses:
        "200":
          description: API key deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: "Platform admin key as bearer token. Format: `Bearer YOUR_ADMIN_KEY`"
    AdminKeyQuery:
      type: apiKey
      in: query
      name: admin_key
      description: Alternative to the Authorization header for server-to-server scenarios.
  parameters:
    ApiKeyId:
      name: id
      in: path
      required: true
      description: MCP API key UUID.
      schema:
        type: string
        format: uuid
  schemas:
    CreateApiKeyRequest:
      type: object
      required:
        - name
        - agency_id
        - location_id
      properties:
        name:
          type: string
          description: Human-readable name for the key.
          example: Production Gateway Key
        agency_id:
          type: string
          format: uuid
          description: Agency this key belongs to.
        location_id:
          type: string
          description: Location (client/tenant) the key operates on behalf of.
          example: acme-retail
        scopes:
          type: array
          description: >
            Permission scopes in `resource:action`, `resource:*`, or `*` form
            (e.g. `insights:read`, `dashboards:*`, `analytics:call`). An empty
            array grants unrestricted access. See the Authentication page.
          items:
            type: string
          example:
            - insights:read
            - dashboards:*
        rate_limit_per_minute:
          type: integer
          description: Per-key request ceiling. Defaults to 60.
          example: 60
    McpApiKey:
      type: object
      properties:
        id:
          type: string
          format: uuid
        agency_id:
          type: string
          format: uuid
        location_id:
          type: string
          example: acme-retail
        name:
          type: string
          example: Production Gateway Key
        key_prefix:
          type: string
          description: First 12 characters of the key (`mcp_` + 8 hex) for identification.
          example: mcp_a1b2c3d4
        scopes:
          type: array
          items:
            type: string
          example:
            - insights:read
            - dashboards:*
        is_active:
          type: boolean
          example: true
        rate_limit_per_minute:
          type: integer
          example: 60
        last_used_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
    McpApiKeyCreated:
      allOf:
        - $ref: "#/components/schemas/McpApiKey"
        - type: object
          properties:
            key:
              type: string
              description: Full `mcp_` key. Returned only once at creation.
              example: mcp_a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4
    ApiKeyListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/McpApiKey"
    ApiKeyCreatedResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/McpApiKeyCreated"
        warning:
          type: string
          example: Save this key now. It cannot be retrieved after this response.
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Unauthorized
