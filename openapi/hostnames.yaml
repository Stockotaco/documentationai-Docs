openapi: "3.0.0"
info:
  version: 1.0.0
  title: Hostnames
  description: Manage the custom hostname for a Mythic Analytics client tenant.
servers:
  - url: https://mythic-analytics.gulp.workers.dev/api/v1
security:
  - BearerAuth: []
  - AdminKeyQuery: []
paths:
  /clients/{id}/hostname:
    post:
      summary: Add custom hostname
      operationId: addHostname
      description: >
        Register a custom hostname for a client tenant. Provisioning is handled
        by Cloudflare for SaaS and validated asynchronously — the response
        returns the initial status plus the CNAME target and DNS instructions to
        complete verification. A client has at most one custom hostname.
      parameters:
        - $ref: "#/components/parameters/ClientId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddHostnameRequest"
      responses:
        "201":
          description: Hostname registered; verification pending
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddHostnameResponse"
        "400":
          description: Invalid JSON, missing hostname, or invalid hostname format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      summary: Get custom hostname
      operationId: getHostname
      description: >
        Retrieve the custom hostname for a client tenant. Returns `data: null`
        when no hostname is configured. When the hostname or its SSL certificate
        is still pending, the endpoint refreshes status from Cloudflare before
        responding.
      parameters:
        - $ref: "#/components/parameters/ClientId"
      responses:
        "200":
          description: The client's custom hostname, or `null` if none is configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostnameResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete custom hostname
      operationId: deleteHostname
      description: >
        Remove the client's custom hostname. Deletes the hostname from Cloudflare
        and clears the associated KV routing entry. No request body is required —
        the hostname is resolved from the client.
      parameters:
        - $ref: "#/components/parameters/ClientId"
      responses:
        "200":
          description: Hostname deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteHostnameResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No custom hostname found for this client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: "Admin API key as bearer token. Format: `Bearer YOUR_ADMIN_KEY`"
    AdminKeyQuery:
      type: apiKey
      in: query
      name: admin_key
      description: Alternative to the Authorization header for server-to-server scenarios.
  parameters:
    ClientId:
      name: id
      in: path
      required: true
      description: Client identifier.
      schema:
        type: string
        pattern: "^[a-zA-Z0-9_-]{1,255}$"
  schemas:
    AddHostnameRequest:
      type: object
      required:
        - hostname
      properties:
        hostname:
          type: string
          description: Fully-qualified domain name to associate with the client.
          example: analytics.acme-retail.com
    AddedHostname:
      type: object
      properties:
        hostname:
          type: string
          example: analytics.acme-retail.com
        status:
          type: string
          description: Initial Cloudflare hostname status.
          example: pending_validation
        cname_target:
          type: string
          nullable: true
          description: CNAME target the customer must point their DNS record to.
          example: api.adberserk.com
        dns_instructions:
          type: string
          description: Human-readable DNS setup instruction.
          example: "Add a CNAME record: analytics.acme-retail.com → api.adberserk.com"
    Hostname:
      type: object
      properties:
        hostname:
          type: string
          example: analytics.acme-retail.com
        cf_status:
          type: string
          description: Cloudflare custom-hostname status.
          example: active
        cf_ssl_status:
          type: string
          nullable: true
          description: Cloudflare SSL certificate status.
          example: active
        created_at:
          type: string
          format: date-time
          example: "2024-06-15T10:30:00.000Z"
        verified_at:
          type: string
          format: date-time
          nullable: true
          example: "2024-06-15T10:42:00.000Z"
    AddHostnameResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/AddedHostname"
    HostnameResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/Hostname"
    DeleteHostnameResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        deleted:
          type: boolean
          example: true
        hostname:
          type: string
          example: analytics.acme-retail.com
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        data:
          nullable: true
          example: null
        error:
          type: string
          example: Unauthorized
        count:
          type: integer
          example: 0
