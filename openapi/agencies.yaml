openapi: "3.0.0"
info:
  version: 1.0.0
  title: Agencies
  description: Manage agencies and link Mythic Analytics client tenants (locations) to them.
servers:
  - url: https://mythic-analytics.gulp.workers.dev/api/v1
security:
  - BearerAuth: []
  - AdminKeyQuery: []
paths:
  /agencies:
    get:
      summary: List agencies
      operationId: listAgencies
      description: >
        Retrieve all agencies, ordered by creation date (newest first). Returns
        a summary view of each agency without its linked locations.
      responses:
        "200":
          description: List of agencies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgencyListResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Admin API not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create agency
      operationId: createAgency
      description: >
        Create a new agency. Agencies group multiple client tenants under a
        single management entity. The `agency_key` (format `ak_` + 32 hex
        characters) is auto-generated by the database.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgencyRequest"
      responses:
        "201":
          description: Agency created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgencyResponse"
        "400":
          description: Missing required field `name`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Admin API not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /agencies/{id}:
    get:
      summary: Retrieve agency
      operationId: getAgency
      description: >
        Fetch a single agency by its ID, including all client tenants
        (locations) currently linked to it.
      parameters:
        - $ref: "#/components/parameters/AgencyId"
      responses:
        "200":
          description: Agency with linked locations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgencyDetailResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Agency not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Admin API not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      summary: Update agency
      operationId: updateAgency
      description: >
        Partially update an agency. Only `name` and `is_active` can be changed;
        include only the fields you want to modify. Returns `400` if neither
        field is supplied.
      parameters:
        - $ref: "#/components/parameters/AgencyId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgencyRequest"
      responses:
        "200":
          description: Agency updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgencyResponse"
        "400":
          description: No updatable fields provided
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Admin API not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete agency
      operationId: deleteAgency
      description: >
        Permanently delete an agency. All linked locations are first unlinked
        (their `agency_id` is set to `null`); the location records themselves
        are not deleted. **This action is irreversible.**
      parameters:
        - $ref: "#/components/parameters/AgencyId"
      responses:
        "200":
          description: Agency deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Admin API not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /agencies/{id}/rotate-key:
    post:
      summary: Rotate agency key
      operationId: rotateAgencyKey
      description: >
        Generate a new `agency_key` (format `ak_` + 32 hex characters) and
        immediately invalidate the previous key. Client-auth caches successful
        lookups for 60 seconds, which bounds propagation of the new key.
      parameters:
        - $ref: "#/components/parameters/AgencyId"
      responses:
        "200":
          description: Key rotated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RotateKeyResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Agency not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Admin API not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /agencies/{id}/locations:
    post:
      summary: Link location
      operationId: linkAgencyLocation
      description: >
        Link a client tenant (location) to this agency by setting the
        location's `agency_id`. After linking, the agency's BigQuery export
        views are refreshed in the background to include the new location.
      parameters:
        - $ref: "#/components/parameters/AgencyId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkLocationRequest"
      responses:
        "200":
          description: Location linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkLocationResponse"
        "400":
          description: Missing required field `location_id`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Agency or location not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Admin API not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /agencies/{id}/locations/{locationId}:
    delete:
      summary: Unlink location
      operationId: unlinkAgencyLocation
      description: >
        Unlink a client tenant (location) from this agency by clearing its
        `agency_id`. The location must currently belong to the agency. The
        agency's BigQuery export views are refreshed synchronously before the
        response returns, so departed-client data is dropped immediately.
      parameters:
        - $ref: "#/components/parameters/AgencyId"
        - $ref: "#/components/parameters/LocationId"
      responses:
        "200":
          description: Location unlinked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Location not linked to this agency
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Admin API not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: "Admin API key as bearer token. Format: `Bearer YOUR_ADMIN_KEY`"
    AdminKeyQuery:
      type: apiKey
      in: query
      name: admin_key
      description: Alternative to the Authorization header for server-to-server scenarios.
  parameters:
    AgencyId:
      name: id
      in: path
      required: true
      description: Agency identifier (UUID).
      schema:
        type: string
        format: uuid
    LocationId:
      name: locationId
      in: path
      required: true
      description: Location (client tenant) identifier.
      schema:
        type: string
  schemas:
    CreateAgencyRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Agency display name.
          example: Digital Growth Partners
        is_active:
          type: boolean
          default: true
          description: Whether the agency is active. Defaults to `true`.
    UpdateAgencyRequest:
      type: object
      description: >
        Partial update — supply at least one of `name` or `is_active`. Other
        fields are ignored.
      properties:
        name:
          type: string
        is_active:
          type: boolean
    LinkLocationRequest:
      type: object
      required:
        - location_id
      properties:
        location_id:
          type: string
          description: Identifier of the client tenant (location) to link.
          example: acme-retail
    Agency:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 3f5e8a1c-9b2d-4e6f-8a7b-1c2d3e4f5a6b
        name:
          type: string
          example: Digital Growth Partners
        agency_key:
          type: string
          description: >
            Agency API key used for client-facing (`ak_`) authentication.
            Format: `ak_` followed by 32 hexadecimal characters.
          example: ak_0123456789abcdef0123456789abcdef
        is_active:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: "2024-02-10T14:00:00.000Z"
        updated_at:
          type: string
          format: date-time
          example: "2024-06-01T09:15:00.000Z"
    AgencyWithLocations:
      allOf:
        - $ref: "#/components/schemas/Agency"
        - type: object
          properties:
            locations:
              type: array
              items:
                $ref: "#/components/schemas/Location"
    Location:
      type: object
      description: A client tenant linked to the agency (from `location_keys`).
      properties:
        id:
          type: string
          example: acme-retail
        name:
          type: string
          nullable: true
          example: Acme Retail
        domain:
          type: string
          nullable: true
          example: acme-retail.com
        business_name:
          type: string
          nullable: true
          example: Acme Retail LLC
        status:
          type: boolean
          nullable: true
          example: true
        secret_key:
          type: string
          nullable: true
          description: Backend-only secret key (starts with `sk_`).
    AgencyListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Agency"
    AgencyResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Agency"
    AgencyDetailResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/AgencyWithLocations"
    RotateKeyResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        agency_key:
          type: string
          description: The newly generated agency key.
          example: ak_fedcba9876543210fedcba9876543210
    LinkLocationResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            agency_id:
              type: string
              format: uuid
              example: 3f5e8a1c-9b2d-4e6f-8a7b-1c2d3e4f5a6b
            location_id:
              type: string
              example: acme-retail
            location_name:
              type: string
              nullable: true
              example: Acme Retail
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Unauthorized
