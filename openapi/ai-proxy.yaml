openapi: "3.0.0"
info:
  version: 1.0.0
  title: AI Proxy
  description: >
    Server-side proxy to Anthropic Claude or Google Gemini. Provider API keys
    stay on the worker; browser clients authenticate with their publishable
    key. Unlike the KV and Pub/Sub admin routes, the AI proxy is mounted at the
    root (`/ai`) and does NOT use the admin key.
servers:
  - url: https://mythic-analytics.gulp.workers.dev
security:
  - PublishableKeyAuth: []
paths:
  /ai/chat:
    post:
      summary: Streaming chat completion
      operationId: aiChat
      description: >
        Proxy a chat request to the selected provider and stream the raw
        provider response back to the caller as server-sent events
        (`text/event-stream`). The worker injects the provider API key and, for
        Gemini, converts the Anthropic-style message/tool format on the fly.
        The response body is the provider's native SSE stream, not a JSON
        envelope. Blocked (`403`) for HIPAA-enabled locations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: >
            Provider server-sent event stream. The event schema matches the
            selected provider (Anthropic Messages streaming events, or Gemini
            `streamGenerateContent` SSE).
          content:
            text/event-stream:
              schema:
                type: string
                description: Raw provider SSE stream.
        "400":
          description: Unknown provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid publishable key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Client inactive, or AI proxy disabled for a HIPAA location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Provider API key not configured on the worker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: >
            Upstream provider error. The worker forwards the provider's HTTP
            status and returns the provider error text.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /ai/action:
    post:
      summary: Execute a server-side action
      operationId: aiAction
      description: >
        Run one of the supported server-side tools. `firecrawl_extract`
        extracts page content (placeholder until `FIRECRAWL_API_KEY` is set);
        `write_config` merges the supplied config into the caller's tenant
        configuration in KV (`CFG::<location_id>`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActionRequest"
      responses:
        "200":
          description: >
            Action result. Shape depends on the `action` value — see the
            `FirecrawlExtractResult` and `WriteConfigResult` schemas.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/FirecrawlExtractResult"
                  - $ref: "#/components/schemas/WriteConfigResult"
        "400":
          description: Unknown action, or `write_config` called without a config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid publishable key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Client inactive, or AI proxy disabled for a HIPAA location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to write config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    PublishableKeyAuth:
      type: apiKey
      in: header
      name: x-mythic-key
      description: >
        Client publishable key (`pk_...`). The worker resolves it to a
        location, verifies the location is active, and rejects HIPAA-enabled
        locations.
  schemas:
    ChatRequest:
      type: object
      required:
        - provider
        - messages
      properties:
        provider:
          type: string
          enum: ["anthropic", "gemini"]
          description: AI provider to proxy to.
          example: anthropic
        messages:
          type: array
          description: >
            Conversation history in Anthropic message format. Each message has
            a `role` and `content` (string, or an array of content blocks such
            as `text`, `tool_use`, and `tool_result`). Gemini requests are
            converted from this format server-side.
          items:
            type: object
          example:
            - role: user
              content: What were my top traffic sources last week?
        model:
          type: string
          description: >
            Provider model id. Defaults to `claude-sonnet-4-20250514`
            (Anthropic) or `gemini-2.0-flash` (Gemini).
          example: claude-sonnet-4-20250514
        system:
          type: string
          description: Optional system prompt.
        tools:
          type: array
          description: >
            Optional tool definitions in Anthropic format (`name`,
            `description`, `input_schema`). Converted to Gemini
            `functionDeclarations` when `provider` is `gemini`.
          items:
            type: object
    ActionRequest:
      type: object
      required:
        - action
      properties:
        action:
          type: string
          enum: ["firecrawl_extract", "write_config"]
          description: Server-side action to run.
          example: write_config
        params:
          type: object
          description: >
            Action parameters. `firecrawl_extract` expects `{ url }`;
            `write_config` expects `{ config }` (merged into the tenant config).
          example:
            config:
              theme: dark
    FirecrawlExtractResult:
      type: object
      properties:
        url:
          type: string
          nullable: true
          example: https://example.com/pricing
        content:
          type: string
          example: "Firecrawl extraction not yet configured. Please set FIRECRAWL_API_KEY."
        error:
          type: string
          nullable: true
          description: Present when `FIRECRAWL_API_KEY` is not set.
          example: FIRECRAWL_API_KEY not set
    WriteConfigResult:
      type: object
      properties:
        success:
          type: boolean
          example: true
        locationId:
          type: string
          example: loc_abc123
        updatedKeys:
          type: array
          description: Config keys that were merged.
          items:
            type: string
          example:
            - theme
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error message.
          example: Invalid publishable key
