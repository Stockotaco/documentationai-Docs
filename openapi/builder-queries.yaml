openapi: "3.0.0"
info:
  version: 1.0.0
  title: Queries
  description: >-
    Execute SQL against a client's BigQuery or Tinybird data using the
    Builder's server-side credentials. Includes an authenticated endpoint for
    the workspace and a token-based public endpoint for embedded dashboards.
servers:
  - url: https://mythic-analytics.gulp.workers.dev/builder
security:
  - BearerAuth: []
  - AgencyKeyQuery: []
  - SecretKeyQuery: []
paths:
  /query:
    post:
      summary: Execute query
      operationId: executeQuery
      description: >
        Run a SQL query against the resolved location's data source. The engine
        defaults to BigQuery; pass `engine: "tinybird"` (or `"clickhouse"`) to
        query Tinybird instead. Credentials are held server-side and never
        exposed.


        The `sql` string **must reference the authorized location** — either the
        location ID, its underscore-normalized form (hyphens replaced with
        underscores, as BigQuery datasets require), or the location's configured
        `client_project_id`. Queries that do not are rejected with `403`.


        Readable with an agency key (`ak_`, requires `?location_id=`) or a
        viewer key (`sk_`).
      parameters:
        - $ref: "#/components/parameters/LocationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRequest"
      responses:
        "200":
          description: Query results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResponse"
        "400":
          description: Missing `?location_id=`, invalid JSON, or missing `sql`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Query is not scoped to the authorized location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Query execution error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryErrorResponse"
        "502":
          description: Tinybird returned an error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryErrorResponse"
        "503":
          description: The requested engine is not configured on the server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /public/query:
    post:
      summary: Execute public query
      operationId: executePublicQuery
      description: >
        Run a query for an embedded dashboard or insight without a Builder key.
        Authenticate with a share token in a header instead:


        - `X-Dashboard-Token` — a dashboard's `public_token` (dashboard must be
          `is_public = true`).

        - `X-Embed-Token` — an insight's `embed_token` (insight must be
          `is_embeddable = true`).


        The token resolves to a location, and the same location-scoping rule as
        `POST /query` applies to the `sql` field. This route runs before key
        auth, so no `ak_`/`sk_` is required.
      security: []
      parameters:
        - $ref: "#/components/parameters/DashboardToken"
        - $ref: "#/components/parameters/EmbedToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRequest"
      responses:
        "200":
          description: Query results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResponse"
        "400":
          description: Invalid JSON or missing `sql`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing `X-Dashboard-Token` and `X-Embed-Token`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: >-
            Dashboard/insight not found, sharing disabled, or query not scoped
            to the resolved location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Query execution error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryErrorResponse"
        "502":
          description: Tinybird returned an error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryErrorResponse"
        "503":
          description: The requested engine is not configured on the server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >-
        Builder key as a bearer token. Use an agency key (`Bearer ak_...`) or a
        viewer key (`Bearer sk_...`).
    AgencyKeyQuery:
      type: apiKey
      in: query
      name: ak
      description: "Agency key passed as a query parameter. Format: `ak_...`."
    SecretKeyQuery:
      type: apiKey
      in: query
      name: sk
      description: "Viewer (secret) key passed as a query parameter. Format: `sk_...`."
  parameters:
    LocationId:
      name: location_id
      in: query
      required: false
      description: >-
        Client location to scope the request to. Required when authenticating
        with an agency key (`ak_`). Ignored for viewer keys (`sk_`).
      schema:
        type: string
        example: acme-retail
    DashboardToken:
      name: X-Dashboard-Token
      in: header
      required: false
      description: >-
        A dashboard's `public_token`. Required unless `X-Embed-Token` is
        supplied.
      schema:
        type: string
    EmbedToken:
      name: X-Embed-Token
      in: header
      required: false
      description: >-
        An insight's `embed_token`. Required unless `X-Dashboard-Token` is
        supplied.
      schema:
        type: string
  schemas:
    QueryRequest:
      type: object
      required:
        - sql
      properties:
        sql:
          type: string
          description: >-
            SQL to execute. Must reference the authorized location (raw ID,
            underscore-normalized ID, or `client_project_id`).
          example: >-
            SELECT event, COUNT(*) AS c FROM `acme_retail.events`
            WHERE _TABLE_SUFFIX >= '20240601' GROUP BY event ORDER BY c DESC
        engine:
          type: string
          description: >-
            Query engine. Omit or use any value other than `tinybird`/
            `clickhouse` for BigQuery (the default).
          enum: [bigquery, tinybird, clickhouse]
          default: bigquery
        projectId:
          type: string
          description: >-
            BigQuery project override. Defaults to the server's configured
            project. Ignored for Tinybird.
          example: hello-conversions
        maxResults:
          type: integer
          description: Maximum rows to return (BigQuery). Default `1000`.
          default: 1000
    QueryResponse:
      type: object
      description: >-
        Successful result. `schema`, `totalBytesProcessed`, and `jobId` are
        present for BigQuery; `statistics` is present for Tinybird.
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          description: Result rows as objects keyed by column name.
          items:
            type: object
          example:
            - { event: pageview, c: 1420 }
            - { event: click, c: 385 }
        rows:
          type: integer
          description: Number of rows returned.
          example: 2
        schema:
          type: object
          description: BigQuery result schema (BigQuery only).
        totalBytesProcessed:
          type: string
          description: Bytes scanned by the BigQuery job (BigQuery only).
        jobId:
          type: string
          description: BigQuery job ID (BigQuery only).
        statistics:
          type: object
          description: Tinybird query statistics (Tinybird only).
    QueryErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: "Tinybird error: 400 ..."
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Query must be scoped to your location
