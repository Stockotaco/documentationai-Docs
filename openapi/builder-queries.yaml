openapi: "3.0.0"
info:
  version: 2.0.0
  title: Queries
  description: >-
    Execute queries against a client's BigQuery data using the Builder's
    server-side credentials. Saved insights are executed **by id** — the
    server regenerates the SQL from the stored config with the tenant's
    dataset baked in, caches results, and rate-limits per location. Raw SQL
    is only accepted on the authenticated `/query` endpoint (builder live
    preview) and is validated server-side so it can only touch the
    authorized location's datasets.
servers:
  - url: https://mythic-analytics.gulp.workers.dev/builder
security:
  - BearerAuth: []
  - AgencyKeyQuery: []
  - SecretKeyQuery: []
paths:
  /query:
    post:
      summary: Execute raw SQL (builder preview)
      operationId: executeQuery
      description: >
        Run a read-only BigQuery SQL query against the resolved location's
        datasets. Credentials are held server-side and never exposed.


        **Scoping**: every table referenced in the SQL must live in one of the
        location's datasets — its underscore-normalized location ID or its
        configured `client_project_id` (normalized). References to any other
        dataset or project, write statements, and dynamic SQL are rejected
        with `403`. Comments and string literals cannot be used to bypass the
        check.


        BigQuery is the only supported engine; `engine: "tinybird"` /
        `"clickhouse"` are rejected with `400`. Queries are capped by a
        server-side `maximumBytesBilled` limit and rate-limited per location.


        Readable with an agency key (`ak_`, requires `?location_id=`) or a
        viewer key (`sk_`). For saved insights, prefer
        `POST /insights/{id}/query`.
      parameters:
        - $ref: "#/components/parameters/LocationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRequest"
      responses:
        "200":
          description: Query results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResponse"
        "400":
          description: >-
            Missing `?location_id=`, invalid JSON, missing `sql`, or an
            unsupported engine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: SQL references datasets outside the authorized location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded for this location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Query execution error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryErrorResponse"
        "503":
          description: BigQuery is not configured on the server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /insights/{id}/query:
    post:
      summary: Run a saved insight
      operationId: runInsight
      description: >
        Execute a saved insight. The server regenerates the SQL from the
        stored config (applying optional `dateRange`/`granularity` overrides),
        runs the main, comparison, and trend queries in parallel, and returns
        all three datasets. Results are cached server-side for the insight's
        `cache_ttl_seconds` (default 300) and rate-limited per location.


        Readable with an agency key (`ak_`, requires `?location_id=`) or a
        viewer key (`sk_`).
      parameters:
        - $ref: "#/components/parameters/LocationId"
        - name: id
          in: path
          required: true
          description: Insight UUID (must belong to the resolved location).
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InsightRunRequest"
      responses:
        "200":
          description: Insight results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsightRunResponse"
        "404":
          description: Insight not found for this location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded for this location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Query execution error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryErrorResponse"
  /public/query:
    post:
      summary: Run an embedded insight (public)
      operationId: executePublicQuery
      description: >
        Execute a saved insight for an embedded dashboard or insight without a
        Builder key. Authenticate with a share token in a header:


        - `X-Embed-Token` — an insight's `embed_token` (insight must be
          `is_embeddable = true`). Runs that insight; `insight_id` is ignored.

        - `X-Dashboard-Token` — a dashboard's `public_token` (dashboard must
          be `is_public = true`). Requires `insight_id`, which must be an
          insight on that dashboard.


        Raw SQL is **not accepted** — the server generates the SQL from the
        saved insight config, so a share token can only ever run its own
        insight against its own location. Results are cached server-side for
        the insight's `cache_ttl_seconds`. Public traffic is rate-limited on a
        separate, higher per-location allowance than the authenticated
        endpoints, so a busy public dashboard can't exhaust a tenant's own
        Builder calls.
      security: []
      parameters:
        - $ref: "#/components/parameters/DashboardToken"
        - $ref: "#/components/parameters/EmbedToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicInsightRunRequest"
      responses:
        "200":
          description: Insight results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsightRunResponse"
        "400":
          description: >-
            Invalid JSON, missing `insight_id` (dashboard tokens), or a legacy
            `sql` field was supplied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing `X-Dashboard-Token` and `X-Embed-Token`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: >-
            Dashboard/insight not found, sharing disabled, or the insight is
            not part of the dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded for this location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Query execution error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryErrorResponse"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >-
        Builder key as a bearer token. Use an agency key (`Bearer ak_...`) or a
        viewer key (`Bearer sk_...`).
    AgencyKeyQuery:
      type: apiKey
      in: query
      name: ak
      description: "Agency key passed as a query parameter. Format: `ak_...`."
    SecretKeyQuery:
      type: apiKey
      in: query
      name: sk
      description: "Viewer (secret) key passed as a query parameter. Format: `sk_...`."
  parameters:
    LocationId:
      name: location_id
      in: query
      required: false
      description: >-
        Client location to scope the request to. Required when authenticating
        with an agency key (`ak_`). Ignored for viewer keys (`sk_`).
      schema:
        type: string
        example: acme-retail
    DashboardToken:
      name: X-Dashboard-Token
      in: header
      required: false
      description: >-
        A dashboard's `public_token`. Required unless `X-Embed-Token` is
        supplied.
      schema:
        type: string
    EmbedToken:
      name: X-Embed-Token
      in: header
      required: false
      description: >-
        An insight's `embed_token`. Required unless `X-Dashboard-Token` is
        supplied.
      schema:
        type: string
  schemas:
    QueryRequest:
      type: object
      required:
        - sql
      properties:
        sql:
          type: string
          description: >-
            Read-only BigQuery SQL. Every table reference must live in one of
            the authorized location's datasets.
          example: >-
            SELECT event_name, COUNT(*) AS c FROM
            `hello-conversions.acme_retail.events` GROUP BY event_name ORDER
            BY c DESC
        maxResults:
          type: integer
          description: Maximum rows to return (capped at 1000).
          default: 1000
    DateRange:
      type: object
      description: Date range override.
      properties:
        preset:
          type: string
          enum: ["1h", "24h", "7d", "14d", "30d", "90d", "365d", "custom"]
        from:
          type: string
          format: date
          description: ISO date (with `preset: "custom"`).
        to:
          type: string
          format: date
          description: ISO date (with `preset: "custom"`).
    InsightRunRequest:
      type: object
      properties:
        dateRange:
          $ref: "#/components/schemas/DateRange"
        granularity:
          type: string
          enum: [day, week, month]
          description: Trend granularity override.
    PublicInsightRunRequest:
      allOf:
        - $ref: "#/components/schemas/InsightRunRequest"
        - type: object
          properties:
            insight_id:
              type: string
              format: uuid
              description: >-
                Insight to run. Required with `X-Dashboard-Token`; ignored
                with `X-Embed-Token`.
    InsightRunResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        insight:
          type: object
          description: The insight's definition (for rendering).
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            insight_type:
              type: string
              enum: [number, table, funnel, scorecard, bar, pie, line]
            config:
              type: object
        data:
          type: array
          description: Main query rows as objects keyed by column name.
          items:
            type: object
        comparisonData:
          type: array
          description: Previous-period rows (empty when not configured).
          items:
            type: object
        trendData:
          type: array
          description: Time-series rows (empty when not configured).
          items:
            type: object
        rows:
          type: integer
          description: Number of rows in `data`.
        cached:
          type: boolean
          description: True when served from the server-side cache.
    QueryResponse:
      type: object
      description: Successful raw-SQL result.
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          description: Result rows as objects keyed by column name.
          items:
            type: object
          example:
            - { event_name: pageview, c: 1420 }
            - { event_name: click, c: 385 }
        rows:
          type: integer
          description: Number of rows returned.
          example: 2
        schema:
          type: object
          description: BigQuery result schema.
        totalBytesProcessed:
          type: string
          description: Bytes scanned by the BigQuery job.
        jobId:
          type: string
          description: BigQuery job ID.
    QueryErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: "BigQuery error: ..."
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "Query must be scoped to your location: dataset \"other_tenant\" not allowed"
