openapi: "3.0.0"
info:
  version: 1.0.0
  title: Link Uptime Monitoring
  description: >
    Read uptime status and history for short link destinations through the
    Mythic Analytics Client API. Mounted at `/client/v1`.


    Monitoring is fully automatic — there is nothing to enable. A scheduled
    job checks every enabled, non-expired link with a `HEAD` request roughly
    every 5 minutes, ingests results to Tinybird, and (after two consecutive
    failures) publishes a `link_down` event; recovery publishes `link_up`.
    Subscribe to those events with the Link Uptime Webhooks API. These
    endpoints are read-only Tinybird proxies and accept either an agency key
    (`ak_`) or a location secret key (`sk_`).
servers:
  - url: https://mythic-analytics.gulp.workers.dev/client/v1
security:
  - ClientBearerAuth: []
  - AgencyKeyQuery: []
  - SecretKeyQuery: []
paths:
  /links/uptime:
    get:
      summary: Get current uptime status
      operationId: getUptimeStatus
      description: >
        Proxy to the Tinybird `uptime_status` pipe for the authenticated
        location. Returns the latest status per link (optionally filtered to a
        single slug) as the raw Tinybird JSON envelope.
      parameters:
        - $ref: "#/components/parameters/LocationIdQuery"
        - $ref: "#/components/parameters/LocationIdHeader"
        - $ref: "#/components/parameters/SlugQuery"
      responses:
        "200":
          description: Tinybird uptime status result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TinybirdResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/AnalyticsUnavailable"
  /links/uptime/history:
    get:
      summary: Get uptime history
      operationId: getUptimeHistory
      description: >
        Proxy to the Tinybird `uptime_history` pipe for the authenticated
        location. Returns the uptime time series (optionally filtered by slug
        and date range) as the raw Tinybird JSON envelope.
      parameters:
        - $ref: "#/components/parameters/LocationIdQuery"
        - $ref: "#/components/parameters/LocationIdHeader"
        - $ref: "#/components/parameters/SlugQuery"
        - $ref: "#/components/parameters/DateFrom"
        - $ref: "#/components/parameters/DateTo"
      responses:
        "200":
          description: Tinybird uptime history result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TinybirdResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/AnalyticsUnavailable"
components:
  securitySchemes:
    ClientBearerAuth:
      type: http
      scheme: bearer
      description: >-
        Client API key as a bearer token. Use an agency key (`ak_...`,
        read-write) or a location secret key (`sk_...`, read-only). Format:
        `Bearer ak_...` or `Bearer sk_...`.
    AgencyKeyQuery:
      type: apiKey
      in: query
      name: ak
      description: Agency key passed as a query parameter instead of the Authorization header.
    SecretKeyQuery:
      type: apiKey
      in: query
      name: sk
      description: Location secret key passed as a query parameter instead of the Authorization header.
  parameters:
    LocationIdQuery:
      name: location_id
      in: query
      required: false
      description: >-
        Target location (client) id. Required when authenticating with an
        agency key (`ak_`); alternative to the `X-Location-Id` header. Ignored
        for secret keys.
      schema:
        type: string
    LocationIdHeader:
      name: X-Location-Id
      in: header
      required: false
      description: >-
        Target location (client) id. Required when authenticating with an
        agency key (`ak_`); alternative to the `location_id` query parameter.
      schema:
        type: string
    SlugQuery:
      name: slug
      in: query
      required: false
      description: Restrict results to a single link slug.
      schema:
        type: string
    DateFrom:
      name: date_from
      in: query
      required: false
      description: Start of the date range (forwarded to Tinybird).
      schema:
        type: string
    DateTo:
      name: date_to
      in: query
      required: false
      description: End of the date range (forwarded to Tinybird).
      schema:
        type: string
  responses:
    Unauthorized:
      description: Missing or invalid key, or missing `location_id` for an agency key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    AnalyticsUnavailable:
      description: Analytics backend not configured
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    TinybirdResponse:
      type: object
      description: Raw Tinybird pipe JSON response, proxied through unchanged.
      properties:
        meta:
          type: array
          description: Column metadata (name/type per field).
          items:
            type: object
        data:
          type: array
          description: Result rows.
          items:
            type: object
        rows:
          type: integer
          example: 12
        statistics:
          type: object
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Analytics not configured
