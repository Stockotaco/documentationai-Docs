openapi: "3.0.0"
info:
  version: 1.0.0
  title: MCP Tools
  description: >-
    Platform-level management of discovered MCP tools and per-agency tool
    access. Mounted under /admin/mcp and authenticated with the platform
    ADMIN_KEY. Tools are created by probing a server (see MCP Servers), not by
    direct creation.
servers:
  - url: https://mythic-analytics.gulp.workers.dev
security:
  - BearerAuth: []
  - AdminKeyQuery: []
paths:
  /admin/mcp/tools:
    get:
      summary: List tools
      operationId: listMcpTools
      description: >
        List all tools discovered across every server. Each tool is enriched
        with `server_name`, `server_url`, and a full `agency_access` list.
      parameters:
        - name: server_id
          in: query
          description: Filter to tools belonging to a single server.
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of tools
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolListResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/mcp/tools/{id}:
    patch:
      summary: Update tool
      operationId: updateMcpTool
      description: >
        Update a tool. Only `is_enabled` and `display_name` may be changed;
        all other fields are managed by probing.
      parameters:
        - $ref: "#/components/parameters/ToolId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateToolRequest"
      responses:
        "200":
          description: Tool updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResponse"
        "400":
          description: No fields to update
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Tool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/mcp/tools/{id}/agency-access:
    get:
      summary: List tool agency access
      operationId: getToolAgencyAccess
      description: >
        List every agency together with its access status for this tool.
        Agencies without an explicit record default to `is_enabled: true`.
      parameters:
        - $ref: "#/components/parameters/ToolId"
      responses:
        "200":
          description: Agency access list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgencyAccessListResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Tool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Bulk update tool agency access
      operationId: bulkSetToolAgencyAccess
      description: >
        Upsert access for multiple agencies at once. Entries missing
        `agency_id` or `is_enabled` are skipped and reported in `errors`.
      parameters:
        - $ref: "#/components/parameters/ToolId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkAgencyAccessRequest"
      responses:
        "200":
          description: Access records upserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgencyAccessBulkResponse"
        "400":
          description: Missing or empty agencies array
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Tool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/mcp/tools/{id}/agency-access/{agencyId}:
    put:
      summary: Set one agency's tool access
      operationId: setToolAgencyAccess
      description: Enable or disable a single agency's access to this tool.
      parameters:
        - $ref: "#/components/parameters/ToolId"
        - name: agencyId
          in: path
          required: true
          description: Agency identifier.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SingleAgencyAccessRequest"
      responses:
        "200":
          description: Access record upserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgencyAccessRecordResponse"
        "400":
          description: Missing is_enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Tool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: "Platform admin key as bearer token. Format: `Bearer YOUR_ADMIN_KEY`"
    AdminKeyQuery:
      type: apiKey
      in: query
      name: admin_key
      description: Alternative to the Authorization header for server-to-server scenarios.
  parameters:
    ToolId:
      name: id
      in: path
      required: true
      description: MCP tool UUID.
      schema:
        type: string
        format: uuid
  schemas:
    UpdateToolRequest:
      type: object
      description: At least one field must be provided.
      properties:
        is_enabled:
          type: boolean
          description: Whether the tool is available through the gateway.
        display_name:
          type: string
          description: Human-friendly name override.
    BulkAgencyAccessRequest:
      type: object
      required:
        - agencies
      properties:
        agencies:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/AgencyAccessInput"
    SingleAgencyAccessRequest:
      type: object
      required:
        - is_enabled
      properties:
        is_enabled:
          type: boolean
    AgencyAccessInput:
      type: object
      required:
        - agency_id
        - is_enabled
      properties:
        agency_id:
          type: string
          format: uuid
        is_enabled:
          type: boolean
    McpTool:
      type: object
      properties:
        id:
          type: string
          format: uuid
        server_id:
          type: string
          format: uuid
        name:
          type: string
          example: query_analytics
        display_name:
          type: string
          nullable: true
          example: Query Analytics Data
        description:
          type: string
          nullable: true
        input_schema:
          type: object
          nullable: true
          description: JSON Schema for the tool's arguments (from the upstream probe).
        annotations:
          type: object
          nullable: true
          description: MCP tool annotations (readOnlyHint, destructiveHint, etc.).
        is_enabled:
          type: boolean
          example: true
        server_name:
          type: string
          nullable: true
        server_url:
          type: string
          format: uri
          nullable: true
        agency_access:
          type: array
          items:
            $ref: "#/components/schemas/AgencyAccessRecord"
        created_at:
          type: string
          format: date-time
    AgencyAccessRecord:
      type: object
      properties:
        agency_id:
          type: string
          format: uuid
        agency_name:
          type: string
          nullable: true
        is_enabled:
          type: boolean
          description: Defaults to true when no explicit record exists.
    ToolResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/McpTool"
    ToolListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/McpTool"
    AgencyAccessListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AgencyAccessRecord"
    AgencyAccessRecordResponse:
      type: object
      properties:
        data:
          type: object
          description: The upserted mcp_tool_agency_access row.
    AgencyAccessBulkResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
        errors:
          type: array
          nullable: true
          description: Present only when some entries were rejected.
          items:
            type: object
            properties:
              agency_id:
                type: string
              error:
                type: string
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Unauthorized
