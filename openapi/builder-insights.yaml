openapi: "3.0.0"
info:
  version: 1.0.0
  title: Insights
  description: >-
    Create, list, retrieve, update, and delete saved insights. An insight is a
    named analytics query with visualization settings, scoped to a single
    client location.
servers:
  - url: https://mythic-analytics.gulp.workers.dev/builder
security:
  - BearerAuth: []
  - AgencyKeyQuery: []
  - SecretKeyQuery: []
paths:
  /insights:
    get:
      summary: List insights
      operationId: listInsights
      description: >
        List insights for the resolved location, ordered by `updated_at`
        descending. Readable with an agency key (`ak_`) or a viewer key
        (`sk_`). Agency keys must pass `?location_id=`.
      parameters:
        - $ref: "#/components/parameters/LocationId"
      responses:
        "200":
          description: Insights for the location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsightListResponse"
        "400":
          description: Missing `?location_id=` when using an agency key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authorization key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create or update insight
      operationId: saveInsight
      description: >
        Create a new insight, or update an existing one when an `id` is
        included in the body. Requires an agency key (`ak_`) and
        `?location_id=`. On update, the insight must belong to the resolved
        location. Returns the saved row.
      parameters:
        - $ref: "#/components/parameters/LocationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveInsightRequest"
      responses:
        "200":
          description: Insight created or updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsightResponse"
        "400":
          description: Missing `?location_id=` or invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Write access requires an agency key (`ak_`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Database error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /insights/{id}:
    get:
      summary: Retrieve insight
      operationId: getInsight
      description: >
        Fetch a single insight by ID. The insight must belong to the resolved
        location. Returns the full row including `config`, `generated_sql`, and
        embed settings.
      parameters:
        - $ref: "#/components/parameters/InsightId"
        - $ref: "#/components/parameters/LocationId"
      responses:
        "200":
          description: The insight
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsightDetailResponse"
        "404":
          description: Insight not found for this location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      summary: Update insight metadata
      operationId: patchInsight
      description: >
        Partially update an insight. Only `name`, `description`, `tags`, and
        `is_favorite` may be patched here — use `POST /insights` with an `id`
        to change the query `config`. Requires an agency key (`ak_`).
      parameters:
        - $ref: "#/components/parameters/InsightId"
        - $ref: "#/components/parameters/LocationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchInsightRequest"
      responses:
        "200":
          description: Insight updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: No valid fields to update
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Write access requires an agency key (`ak_`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete insight
      operationId: deleteInsight
      description: >
        Permanently delete an insight scoped to the resolved location. Requires
        an agency key (`ak_`).
      parameters:
        - $ref: "#/components/parameters/InsightId"
        - $ref: "#/components/parameters/LocationId"
      responses:
        "200":
          description: Insight deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Write access requires an agency key (`ak_`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Database error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >-
        Builder key as a bearer token. Use an agency key for full CRUD
        (`Bearer ak_...`) or a viewer key for read-only access
        (`Bearer sk_...`).
    AgencyKeyQuery:
      type: apiKey
      in: query
      name: ak
      description: "Agency key passed as a query parameter. Format: `ak_...`."
    SecretKeyQuery:
      type: apiKey
      in: query
      name: sk
      description: "Viewer (secret) key passed as a query parameter. Format: `sk_...`."
  parameters:
    InsightId:
      name: id
      in: path
      required: true
      description: Insight UUID.
      schema:
        type: string
        format: uuid
    LocationId:
      name: location_id
      in: query
      required: false
      description: >-
        Client location to scope the request to. Required when authenticating
        with an agency key (`ak_`) and must be a location linked to that agency.
        Ignored for viewer keys (`sk_`), which are already bound to a single
        location.
      schema:
        type: string
        example: acme-retail
  schemas:
    Insight:
      type: object
      properties:
        id:
          type: string
          format: uuid
        location_id:
          type: string
          example: acme-retail
        data_connection_id:
          type: string
          format: uuid
          nullable: true
        created_by:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
          example: Pageviews by day
        description:
          type: string
          nullable: true
        insight_type:
          type: string
          enum: [number, table, funnel, scorecard, bar, pie, line]
          example: number
        config:
          type: object
          description: >-
            Visualization + query definition (metrics, dimensions, filters,
            date range, layout). Shape depends on `insight_type`.
        generated_sql:
          type: string
          nullable: true
          description: SQL compiled from `config`, if any.
        visualization:
          type: object
        cached_result:
          type: object
          nullable: true
        cache_ttl_seconds:
          type: integer
          example: 300
        is_embeddable:
          type: boolean
          example: false
        embed_token:
          type: string
          description: Token used for public embedding via `POST /public/query`.
          example: 9f8a7b6c5d4e3f2a1b0c9d8e7f6a5b4c
        tags:
          type: array
          items:
            type: string
          example: [funnel, paid]
        canvas_id:
          type: string
          format: uuid
          nullable: true
          description: Set when the insight was generated from a canvas.
        is_favorite:
          type: boolean
          example: false
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    InsightSummary:
      type: object
      description: Fields returned by the list endpoint.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        insight_type:
          type: string
          enum: [number, table, funnel, scorecard, bar, pie, line]
        tags:
          type: array
          items:
            type: string
        canvas_id:
          type: string
          format: uuid
          nullable: true
        is_favorite:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SaveInsightRequest:
      type: object
      required:
        - name
        - insight_type
        - config
      properties:
        id:
          type: string
          format: uuid
          description: Include to update an existing insight; omit to create.
        name:
          type: string
          example: Pageviews by day
        description:
          type: string
          example: Daily pageview trend for the last 30 days
        insight_type:
          type: string
          enum: [number, table, funnel, scorecard, bar, pie, line]
          example: line
        config:
          type: object
          description: Query + visualization definition.
        generated_sql:
          type: string
          description: Optional pre-compiled SQL.
    PatchInsightRequest:
      type: object
      description: >-
        At least one field is required. Fields outside this set are ignored.
      properties:
        name:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        is_favorite:
          type: boolean
    InsightResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Insight"
    InsightDetailResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Insight"
    InsightListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/InsightSummary"
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Write access requires an agency key (ak_)
