openapi: "3.0.0"
info:
  version: 1.0.0
  title: Canvases
  description: >-
    Create, list, retrieve, and delete canvases, and drive their lifecycle:
    save state, publish, version history, rollback, activation toggle, funnel
    import, dashboard generation, and platform configs. A canvas is a visual
    node-and-edge map of a client's funnel, scoped to a single location.
servers:
  - url: https://mythic-analytics.gulp.workers.dev/builder
security:
  - BearerAuth: []
  - AgencyKeyQuery: []
  - SecretKeyQuery: []
paths:
  /canvases:
    get:
      summary: List canvases
      operationId: listCanvases
      description: >
        List canvases for the resolved location, ordered by `updated_at`
        descending. Each row includes a computed `node_count`. Agency keys
        (`ak_`) must pass `?location_id=`; viewer keys (`sk_`) are scoped.
      parameters:
        - $ref: "#/components/parameters/LocationId"
      responses:
        "200":
          description: Canvases for the location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CanvasListResponse"
        "400":
          description: Missing `?location_id=` when using an agency key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authorization key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create or update canvas
      operationId: saveCanvasMeta
      description: >
        Create a new canvas, or update an existing one's `name`/`description`
        when an `id` is included in the body. Requires an agency key (`ak_`)
        and `?location_id=`. Returns the saved row.
      parameters:
        - $ref: "#/components/parameters/LocationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveCanvasMetaRequest"
      responses:
        "200":
          description: Canvas created or updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CanvasResponse"
        "403":
          description: Write access requires an agency key (`ak_`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /canvases/import-funnel:
    post:
      summary: Import canvas from a GHL funnel
      operationId: importFunnelCanvas
      description: >
        Create a canvas from a GoHighLevel funnel object. Each funnel step
        becomes a `page` node (positioned left to right by `sequence`), a URL
        pattern is added for the step's `url` (match type `contains`) and its
        `id` (match type `step_id`), and sequential steps are connected with
        edges. Pass the funnel object returned by `GET /ghl/funnels`. Requires
        an agency key (`ak_`) and `?location_id=`.
      parameters:
        - $ref: "#/components/parameters/LocationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportFunnelRequest"
      responses:
        "200":
          description: Canvas created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CanvasResponse"
        "400":
          description: Missing `name` or `funnel.steps`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Write access requires an agency key (`ak_`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /canvases/{id}:
    get:
      summary: Retrieve canvas
      operationId: getCanvas
      description: >
        Fetch a single canvas by ID, including its `viewport`. Must belong to
        the resolved location.
      parameters:
        - $ref: "#/components/parameters/CanvasId"
        - $ref: "#/components/parameters/LocationId"
      responses:
        "200":
          description: The canvas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CanvasDetailResponse"
        "404":
          description: Canvas not found for this location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete canvas
      operationId: deleteCanvas
      description: >
        Permanently delete a canvas and its nodes, edges, URLs, and events
        (via cascade). Requires an agency key (`ak_`).
      parameters:
        - $ref: "#/components/parameters/CanvasId"
        - $ref: "#/components/parameters/LocationId"
      responses:
        "200":
          description: Canvas deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Write access requires an agency key (`ak_`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /canvases/{id}/toggle:
    patch:
      summary: Toggle canvas active state
      operationId: toggleCanvas
      description: >
        Set the canvas `is_active` flag. Requires an agency key (`ak_`).
      parameters:
        - $ref: "#/components/parameters/CanvasId"
        - $ref: "#/components/parameters/LocationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleCanvasRequest"
      responses:
        "200":
          description: State updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Write access requires an agency key (`ak_`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /canvases/{id}/save:
    post:
      summary: Save canvas state
      operationId: saveCanvasState
      description: >
        Persist the full working state of a canvas: viewport, the complete set
        of nodes, and the complete set of edges. Nodes and edges not present in
        the payload are deleted. Increments the canvas `version` and writes a
        version snapshot. Requires an agency key (`ak_`).
      parameters:
        - $ref: "#/components/parameters/CanvasId"
        - $ref: "#/components/parameters/LocationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveCanvasStateRequest"
      responses:
        "200":
          description: Canvas saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionBumpResponse"
        "403":
          description: Write access requires an agency key (`ak_`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Canvas not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Save error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /canvases/{id}/publish:
    post:
      summary: Publish canvas
      operationId: publishCanvas
      description: >
        Mark the canvas's current `version` as published: sets
        `published_version` and stamps `published_at` on the matching version
        snapshot. Requires an agency key (`ak_`).
      parameters:
        - $ref: "#/components/parameters/CanvasId"
        - $ref: "#/components/parameters/LocationId"
      responses:
        "200":
          description: Canvas published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishResponse"
        "403":
          description: Write access requires an agency key (`ak_`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Canvas not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /canvases/{id}/versions:
    get:
      summary: List canvas versions
      operationId: listCanvasVersions
      description: >
        List version snapshots for a canvas, ordered by `version` descending.
        The canvas must belong to the resolved location.
      parameters:
        - $ref: "#/components/parameters/CanvasId"
        - $ref: "#/components/parameters/LocationId"
      responses:
        "200":
          description: Version history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionListResponse"
        "404":
          description: Canvas not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /canvases/{id}/rollback:
    post:
      summary: Rollback canvas
      operationId: rollbackCanvas
      description: >
        Replace the canvas's nodes, edges, URLs, and events with those from a
        supplied `snapshot` (the `snapshot` field of a version row from
        `GET /canvases/{id}/versions`), then bump the version and record a new
        snapshot. Requires an agency key (`ak_`).
      parameters:
        - $ref: "#/components/parameters/CanvasId"
        - $ref: "#/components/parameters/LocationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RollbackRequest"
      responses:
        "200":
          description: Canvas rolled back
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionBumpResponse"
        "400":
          description: Missing `snapshot`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Write access requires an agency key (`ak_`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Canvas not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /canvases/{id}/generate-dashboard:
    post:
      summary: Generate dashboard from canvas
      operationId: generateCanvasDashboard
      description: >
        Build (or regenerate) a dashboard of funnel insights from the canvas's
        page nodes. Page nodes are topologically sorted by edges, and a fixed
        set of insights (unique users, sessions, pageviews, conversion funnel,
        traffic by step, session UTMs, purchases) is created and linked. If a
        dashboard already exists for this canvas it is regenerated in place.
        No request body. Requires an agency key (`ak_`).
      parameters:
        - $ref: "#/components/parameters/CanvasId"
        - $ref: "#/components/parameters/LocationId"
      responses:
        "200":
          description: Dashboard created or regenerated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateDashboardResponse"
        "403":
          description: Write access requires an agency key (`ak_`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Canvas not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /canvases/{id}/platform-configs:
    get:
      summary: List platform configs
      operationId: listPlatformConfigs
      description: >
        List the destination platform configs (pixel IDs, measurement IDs, etc.)
        for the resolved location, ordered with defaults first. These are
        location-scoped and shared across the location's canvases.
      parameters:
        - $ref: "#/components/parameters/CanvasId"
        - $ref: "#/components/parameters/LocationId"
      responses:
        "200":
          description: Platform configs for the location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformConfigListResponse"
        "401":
          description: Authorization key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >-
        Builder key as a bearer token. Use an agency key for full CRUD
        (`Bearer ak_...`) or a viewer key for read-only access
        (`Bearer sk_...`).
    AgencyKeyQuery:
      type: apiKey
      in: query
      name: ak
      description: "Agency key passed as a query parameter. Format: `ak_...`."
    SecretKeyQuery:
      type: apiKey
      in: query
      name: sk
      description: "Viewer (secret) key passed as a query parameter. Format: `sk_...`."
  parameters:
    CanvasId:
      name: id
      in: path
      required: true
      description: Canvas UUID.
      schema:
        type: string
        format: uuid
    LocationId:
      name: location_id
      in: query
      required: false
      description: >-
        Client location to scope the request to. Required when authenticating
        with an agency key (`ak_`). Ignored for viewer keys (`sk_`).
      schema:
        type: string
        example: acme-retail
  schemas:
    Canvas:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_key:
          type: string
          description: The client location ID that owns the canvas.
          example: acme-retail
        name:
          type: string
          example: Product Launch Funnel
        description:
          type: string
          nullable: true
        viewport:
          type: object
          description: Saved pan/zoom state.
          example: { x: 0, y: 0, zoom: 1 }
        is_active:
          type: boolean
          example: false
        version:
          type: integer
          description: Current working version.
          example: 3
        published_version:
          type: integer
          description: Version currently marked as published (`0` if never published).
          example: 2
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CanvasSummary:
      allOf:
        - $ref: "#/components/schemas/Canvas"
        - type: object
          properties:
            node_count:
              type: integer
              description: Number of nodes on the canvas (computed).
              example: 5
    CanvasVersion:
      type: object
      properties:
        id:
          type: string
          format: uuid
        canvas_id:
          type: string
          format: uuid
        version:
          type: integer
          example: 3
        snapshot:
          type: object
          description: Full canvas state at this version (nodes, edges, urls, events).
        published_at:
          type: string
          format: date-time
          nullable: true
        created_by:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
    PlatformConfig:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_key:
          type: string
          example: acme-retail
        platform:
          type: string
          enum: [meta_pixel, ga4, google_ads, tiktok, linkedin, pinterest, custom_html]
          example: meta_pixel
        credentials:
          type: object
          description: Platform credentials (e.g. pixel/measurement IDs).
        label:
          type: string
          example: Meta Pixel — Acme
        is_default:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SaveCanvasMetaRequest:
      type: object
      required:
        - name
      properties:
        id:
          type: string
          format: uuid
          description: Include to update an existing canvas; omit to create.
        name:
          type: string
          example: Product Launch Funnel
        description:
          type: string
          nullable: true
    ImportFunnelRequest:
      type: object
      required:
        - name
        - funnel
      properties:
        name:
          type: string
          example: Product Launch Funnel
        description:
          type: string
        funnel:
          type: object
          required:
            - steps
          properties:
            name:
              type: string
            steps:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    description: GHL step ID (stored as a `step_id` URL match).
                  name:
                    type: string
                  url:
                    type: string
                    description: Step URL (stored as a `contains` URL match).
                  sequence:
                    type: integer
                    description: Ordering; steps are sorted ascending.
    ToggleCanvasRequest:
      type: object
      required:
        - is_active
      properties:
        is_active:
          type: boolean
          example: true
    SaveCanvasStateRequest:
      type: object
      properties:
        viewport:
          type: object
          example: { x: 0, y: 0, zoom: 1 }
        nodes:
          type: array
          description: Complete node set. Missing nodes are deleted.
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              type:
                type: string
                enum: [page, action, decision, offsite]
              label:
                type: string
              position_x:
                type: number
              position_y:
                type: number
        edges:
          type: array
          description: Complete edge set. Missing edges are deleted.
          items:
            type: object
            properties:
              id:
                type: string
              source_node_id:
                type: string
                format: uuid
              target_node_id:
                type: string
                format: uuid
              source_handle:
                type: string
                nullable: true
              target_handle:
                type: string
                nullable: true
              label:
                type: string
                nullable: true
    RollbackRequest:
      type: object
      required:
        - snapshot
      properties:
        snapshot:
          type: object
          description: >-
            A version snapshot with `nodes`, `edges`, `urls`, and `events`
            arrays (as returned in a `canvas_versions` row).
          properties:
            nodes:
              type: array
              items:
                type: object
            edges:
              type: array
              items:
                type: object
            urls:
              type: array
              items:
                type: object
            events:
              type: array
              items:
                type: object
    CanvasResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Canvas"
    CanvasDetailResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Canvas"
    CanvasListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CanvasSummary"
    VersionListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CanvasVersion"
    PlatformConfigListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PlatformConfig"
    VersionBumpResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        version:
          type: integer
          example: 4
    PublishResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        published_version:
          type: integer
          example: 3
    GenerateDashboardResponse:
      type: object
      properties:
        dashboardId:
          type: string
          format: uuid
        created:
          type: boolean
          description: "`true` on first-time creation."
          example: true
        regenerated:
          type: boolean
          description: "`true` when an existing dashboard was rebuilt."
          example: false
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Canvas not found
