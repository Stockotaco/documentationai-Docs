openapi: "3.0.0"
info:
  version: 1.0.0
  title: MCP Servers
  description: >-
    Platform-level management of upstream MCP servers and per-agency server
    access in the Mythic Analytics platform. Mounted under /admin/mcp and
    authenticated with the platform ADMIN_KEY.
servers:
  - url: https://mythic-analytics.gulp.workers.dev
security:
  - BearerAuth: []
  - AdminKeyQuery: []
paths:
  /admin/mcp/servers:
    get:
      summary: List servers
      operationId: listMcpServers
      description: >
        List every registered MCP server (both platform-wide servers with a
        null `agency_id` and agency-owned servers). Each server is enriched
        with `ownership`, `agency_name`, `tool_count`, and a full
        `agency_access` list.
      responses:
        "200":
          description: List of servers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerListResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create server
      operationId: createMcpServer
      description: >
        Register a new upstream MCP server. Omit `agency_id` to create a
        platform-wide server available to all agencies. The URL must use
        `https://` and must not resolve to localhost or a private/internal IP
        range (SSRF protection). `default_headers` may not include hop-by-hop
        or forwarding headers.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServerRequest"
      responses:
        "201":
          description: Server created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerResponse"
        "400":
          description: Missing required field, invalid URL, blocked header, or invalid scope_prefix
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/mcp/servers/{id}:
    patch:
      summary: Update server
      operationId: updateMcpServer
      description: >
        Partially update a server. Only `name`, `url`, `default_headers`,
        `is_enabled`, and `scope_prefix` may be changed. Pass `scope_prefix:
        null` to clear it.
      parameters:
        - $ref: "#/components/parameters/ServerId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateServerRequest"
      responses:
        "200":
          description: Server updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerResponse"
        "400":
          description: No fields to update, invalid URL, blocked header, or invalid scope_prefix
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Server not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete server
      operationId: deleteMcpServer
      description: >
        Delete an MCP server. Discovered tools are removed via cascading
        foreign keys.
      parameters:
        - $ref: "#/components/parameters/ServerId"
      responses:
        "200":
          description: Server deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/mcp/servers/{id}/probe:
    post:
      summary: Probe server
      operationId: probeMcpServer
      description: >
        Connect to the upstream server, run `initialize` + `tools/list`, and
        upsert discovered tools into the platform. Tools are matched by name to
        preserve existing IDs and access records; tools that no longer exist
        upstream are removed. Updates `last_probed_at`.
      parameters:
        - $ref: "#/components/parameters/ServerId"
      responses:
        "200":
          description: Probe completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProbeResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Server not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream probe failed (server unreachable or protocol error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/mcp/servers/{id}/agency-access:
    get:
      summary: List server agency access
      operationId: getServerAgencyAccess
      description: >
        List every agency together with its access status for this server.
        Agencies without an explicit record default to `is_enabled: true`.
      parameters:
        - $ref: "#/components/parameters/ServerId"
      responses:
        "200":
          description: Agency access list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgencyAccessListResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Server not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Bulk update server agency access
      operationId: bulkSetServerAgencyAccess
      description: >
        Upsert access for multiple agencies at once. Entries missing
        `agency_id` or `is_enabled` are skipped and reported in `errors`.
      parameters:
        - $ref: "#/components/parameters/ServerId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkAgencyAccessRequest"
      responses:
        "200":
          description: Access records upserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgencyAccessBulkResponse"
        "400":
          description: Missing or empty agencies array
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Server not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/mcp/servers/{id}/agency-access/{agencyId}:
    put:
      summary: Set one agency's server access
      operationId: setServerAgencyAccess
      description: Enable or disable a single agency's access to this server.
      parameters:
        - $ref: "#/components/parameters/ServerId"
        - name: agencyId
          in: path
          required: true
          description: Agency identifier.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SingleAgencyAccessRequest"
      responses:
        "200":
          description: Access record upserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgencyAccessRecordResponse"
        "400":
          description: Missing is_enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Admin key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Server not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: "Platform admin key as bearer token. Format: `Bearer YOUR_ADMIN_KEY`"
    AdminKeyQuery:
      type: apiKey
      in: query
      name: admin_key
      description: Alternative to the Authorization header for server-to-server scenarios.
  parameters:
    ServerId:
      name: id
      in: path
      required: true
      description: MCP server UUID.
      schema:
        type: string
        format: uuid
  schemas:
    CreateServerRequest:
      type: object
      required:
        - name
        - url
      properties:
        name:
          type: string
          description: Display name for the server.
          example: Analytics Tools Server
        url:
          type: string
          format: uri
          description: Upstream MCP server endpoint (must be https and public).
          example: https://mcp.example.com/analytics
        default_headers:
          type: object
          additionalProperties:
            type: string
          description: >
            Static headers sent on every upstream request (e.g. an auth token).
            Hop-by-hop and forwarding headers are rejected.
          example:
            Authorization: Bearer sk-upstream-xxxx
        is_enabled:
          type: boolean
          description: Whether the server is active. Defaults to true.
        scope_prefix:
          type: string
          nullable: true
          description: >
            Optional scope namespace for this server's tools. Must match
            `^[a-z][a-z0-9_-]{0,29}$`. Gateway keys then require
            `<scope_prefix>:call`; when unset, `upstream:call` is required.
          example: analytics
        agency_id:
          type: string
          format: uuid
          nullable: true
          description: >
            Owning agency. Omit or send null to create a platform-wide server
            shared with all agencies.
    UpdateServerRequest:
      type: object
      description: At least one updatable field must be provided.
      properties:
        name:
          type: string
        url:
          type: string
          format: uri
        default_headers:
          type: object
          additionalProperties:
            type: string
        is_enabled:
          type: boolean
        scope_prefix:
          type: string
          nullable: true
          description: Send null to clear the scope prefix.
    BulkAgencyAccessRequest:
      type: object
      required:
        - agencies
      properties:
        agencies:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/AgencyAccessInput"
    SingleAgencyAccessRequest:
      type: object
      required:
        - is_enabled
      properties:
        is_enabled:
          type: boolean
    AgencyAccessInput:
      type: object
      required:
        - agency_id
        - is_enabled
      properties:
        agency_id:
          type: string
          format: uuid
        is_enabled:
          type: boolean
    McpServer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        agency_id:
          type: string
          format: uuid
          nullable: true
          description: Null for platform-wide servers.
        name:
          type: string
          example: Analytics Tools Server
        url:
          type: string
          format: uri
          example: https://mcp.example.com/analytics
        is_enabled:
          type: boolean
          example: true
        scope_prefix:
          type: string
          nullable: true
          example: analytics
        ownership:
          type: string
          enum: ["platform", "agency"]
          description: Derived from agency_id.
        agency_name:
          type: string
          nullable: true
        tool_count:
          type: integer
          example: 8
        agency_access:
          type: array
          description: One entry per agency with its effective access.
          items:
            $ref: "#/components/schemas/AgencyAccessRecord"
        last_probed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AgencyAccessRecord:
      type: object
      properties:
        agency_id:
          type: string
          format: uuid
        agency_name:
          type: string
          nullable: true
        is_enabled:
          type: boolean
          description: Defaults to true when no explicit record exists.
    ProbeResult:
      type: object
      properties:
        server_id:
          type: string
          format: uuid
        tools_discovered:
          type: integer
          example: 8
        tools:
          type: array
          items:
            type: object
    ServerResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/McpServer"
    ServerListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/McpServer"
    AgencyAccessListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AgencyAccessRecord"
    AgencyAccessRecordResponse:
      type: object
      properties:
        data:
          type: object
          description: The upserted mcp_server_agency_access row.
    AgencyAccessBulkResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
          description: Upserted access rows.
        errors:
          type: array
          nullable: true
          description: Present only when some entries were rejected.
          items:
            type: object
            properties:
              agency_id:
                type: string
              error:
                type: string
    ProbeResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/ProbeResult"
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Unauthorized
