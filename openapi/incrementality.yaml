openapi: "3.0.0"
info:
  version: 1.0.0
  title: Incrementality
  description: >
    Geo-holdout incrementality testing and per-channel coefficient derivation.
    Define a test (test/control regions + before/after windows), compute the
    weighted-synthetic-control diff-in-diff iROAS from your BigQuery dataset
    (events revenue + Airbyte Meta spend), and read back a precision-weighted
    running median coefficient per measurement series. Client-scoped: an
    agency key (`ak_`) has read-write access to a single named location; a
    location secret key (`sk_`) is a read-only viewer of its own location.
servers:
  - url: https://mythic-analytics.gulp.workers.dev
security:
  - BearerAuth: []
  - AgencyKeyQuery: []
  - SecretKeyQuery: []
paths:
  /client/v1/incrementality/eligibility:
    get:
      summary: Check geo-testing eligibility
      operationId: checkEligibility
      description: >
        Pre-flight before any experiment: is this client a viable geo-testing
        candidate? Five checks — geo coverage (share of revenue carrying a
        region), history depth (≥28 days), market count (≥6 regions with
        meaningful revenue), matchability (the largest markets have at least
        one other market that moves with them, Pearson ≥ 0.5), and
        detectability (the daily budget the client's noise floor implies for a
        conclusive 30-day break-even test; judged against `daily_budget` when
        provided).
      parameters:
        - name: daily_budget
          in: query
          description: Planned daily test spend to judge detectability against.
          required: false
          schema:
            type: number
        - name: lookback_days
          in: query
          description: Days of history to assess. Default `90`, min `14`, max `365`.
          required: false
          schema:
            type: integer
            default: 90
        - name: event_name
          in: query
          description: Conversion event name (default `purchase`).
          required: false
          schema:
            type: string
        - name: json_path
          in: query
          description: >
            JSON path to revenue in properties_json (default `$.value` —
            properties_json IS the event's properties object).
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Eligibility verdict with per-check detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EligibilityResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          description: BigQuery is not configured in this environment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Eligibility query failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /client/v1/incrementality/markets:
    get:
      summary: Rank control markets
      operationId: rankControlMarkets
      description: >
        Daily revenue by region over a lookback window (default 90 days),
        with candidate control markets ranked by Pearson correlation of daily
        revenue against the proposed test set. Use this to design a test:
        propose `test_regions`, take the top-correlated candidates as controls.
        Omit `test_regions` to just inventory revenue by region.
      parameters:
        - name: test_regions
          in: query
          description: Comma-separated proposed test regions (e.g. `California,Texas`).
          required: false
          schema:
            type: string
        - name: lookback_days
          in: query
          description: Days of history to correlate over. Default `90`, min `14`, max `365`.
          required: false
          schema:
            type: integer
            default: 90
        - name: event_name
          in: query
          description: Conversion event name (default `purchase`).
          required: false
          schema:
            type: string
        - name: json_path
          in: query
          description: >
            JSON path to revenue in properties_json (default `$.value` —
            properties_json IS the event's properties object).
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Ranked control-market candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketsResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          description: BigQuery is not configured in this environment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Markets query failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /client/v1/incrementality/experiments:
    get:
      summary: List experiments
      operationId: listExperiments
      description: List the calling location's geo experiments, newest first. Both `ak_` and `sk_` keys may read.
      responses:
        "200":
          description: List of experiments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExperimentListResponse"
        "401":
          description: Missing or invalid key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
    post:
      summary: Create experiment
      operationId: createExperiment
      description: >
        Create a geo-holdout experiment. Requires an agency (`ak_`) key. The
        `definition` is validated strictly — real calendar dates, pre window
        ending before the test window, non-overlapping normalized region
        lists, known enum values — and by building both compute queries, so an
        uncomputable definition is rejected with `400 invalid_definition`.
        v1 supports `channel: "meta"` only. If the test window overlaps an
        existing experiment on the same channel, the 201 response carries a
        top-level `warnings` array (overlapping tests are not independent
        measurements).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExperimentRequest"
      responses:
        "201":
          description: Experiment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExperimentResponse"
        "400":
          description: Invalid body or definition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Operation requires an agency (`ak_`) key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/UpstreamError"
  /client/v1/incrementality/experiments/{id}:
    get:
      summary: Get experiment
      operationId: getExperiment
      description: Fetch one experiment (with its computed `result`, if any) for the calling location.
      parameters:
        - $ref: "#/components/parameters/ExperimentId"
      responses:
        "200":
          description: The experiment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExperimentResponse"
        "404":
          description: Experiment not found for this location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
  /client/v1/incrementality/experiments/{id}/compute:
    post:
      summary: Compute experiment
      operationId: computeExperiment
      description: >
        Run the weighted-synthetic-control diff-in-diff inference for this
        experiment against the location's BigQuery dataset, store the metrics
        on the experiment's `result`, and set `status` to `computed`. Requires
        an agency (`ak_`) key.

        Compute is gated on the measured window (test window + cooldown):
        before it closes the endpoint returns `409 window_not_complete`.
        Pass `{ "allow_partial": true }` for a provisional mid-window read —
        it is stamped `result.partial: true` and excluded from `/coefficients`
        until a full compute overwrites it.

        Compute also refuses to produce silently-wrong numbers: no revenue in
        the test or control regions (`422 no_revenue_in_regions` /
        `no_revenue_in_controls`), a truncated BigQuery page
        (`422 result_truncated`), a missing Meta insights table
        (`422 spend_table_missing`), mixed account currencies
        (`422 mixed_currencies` — set `spend.account_id`), or Meta spend data
        that ends well before the measured window (`409 stale_spend_data` —
        wait for the next Airbyte sync).
      parameters:
        - $ref: "#/components/parameters/ExperimentId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                allow_partial:
                  type: boolean
                  default: false
                  description: Compute before the measured window closes (provisional; excluded from /coefficients).
      responses:
        "200":
          description: Computed experiment (result populated)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExperimentResponse"
        "400":
          description: Definition is invalid or failed the tenant-scope guard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Operation requires an agency (`ak_`) key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Experiment not found for this location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Measured window still open (window_not_complete) or Meta spend data stale (stale_spend_data)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Not computable — no revenue in regions, truncated result, missing spend table, or mixed currencies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: BigQuery is not configured in this environment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Compute query failed or the result could not be saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /client/v1/incrementality/experiments/{id}/validate:
    get:
      summary: Validate experiment (A/A placebo or drift check)
      operationId: validateExperiment
      description: >
        Before the test starts: an A/A placebo — the pre period is split in
        half and the exact inference runs with the second half as a fake post.
        A placebo lift significant in EITHER direction (`aa_pass: false`,
        abs(z) ≥ 1.96) means the market pairing is invalid;
        `market_match_quality` is the synthetic-control fit R².
        While running: an interim read — lift so far (labeled
        `peeking: true`), and `drift_detected` when outlier days appear
        inside the test window. `control_shift_z` is reported but is
        informational only: control regions are held out, so their level
        shift vs pre is the intended treatment contrast, not drift.
      parameters:
        - $ref: "#/components/parameters/ExperimentId"
      responses:
        "200":
          description: Validation verdict with full inference detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateResponse"
        "404":
          description: Experiment not found for this location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Not enough data (pre window too short for an A/A split, or too few days)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/UpstreamError"
  /client/v1/incrementality/experiments/{id}/launch-plan:
    get:
      summary: Get launch plan
      operationId: getLaunchPlan
      description: >
        The complete Meta ad-side recipe for conducting the holdout: control
        regions resolved to Marketing API targeting region keys, the exact
        `excluded_geo_locations` change, apply/revert dates, a step-by-step
        checklist, and paste-ready API calls. Instructions only — Mythic never
        mutates the ad account. Non-US regions are returned under
        `unresolved_regions` with a Targeting Search call to resolve them.
      parameters:
        - $ref: "#/components/parameters/ExperimentId"
      responses:
        "200":
          description: The launch plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaunchPlanResponse"
        "400":
          description: Experiment definition has no test window
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Experiment not found for this location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
  /client/v1/incrementality/coefficients/history:
    get:
      summary: Coefficient history (progressive truth over time)
      operationId: getCoefficientHistory
      description: >
        Every computed experiment's coefficient in computed_at order, each with
        the running precision-weighted median at that point — watch the
        progressive truth converge test by test. Grouped by `series_key`:
        only experiments measuring the same estimand (channel + revenue
        definition + spend scope) pool together. Partial (mid-window)
        computes and poor-control-fit results are excluded.
      parameters:
        - name: channel
          in: query
          description: Restrict to one channel (e.g. `meta`).
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Per-channel coefficient time series
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoefficientHistoryResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/UpstreamError"
  /client/v1/incrementality/coefficients:
    get:
      summary: Get coefficients (progressive truth)
      operationId: getCoefficients
      description: >
        Return the inverse-variance weighted median coefficient per
        measurement series across computed experiments for the location.
        Weight = 1/se_coefficient² — precision, not effect size, so a huge
        noisy lift earns no extra say. Partial (mid-window) computes and
        poor-control-fit results are excluded. Each entry carries the
        `series_key` identifying the exact estimand (channel + revenue
        definition + spend scope/conversion).
      parameters:
        - name: channel
          in: query
          description: Restrict to one channel (e.g. `meta`).
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Per-channel coefficients
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoefficientsResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >
        Client key as bearer token. Use an agency key (`Bearer ak_...`) for
        read-write access or a location secret key (`Bearer sk_...`) for
        read-only access.
    AgencyKeyQuery:
      type: apiKey
      in: query
      name: ak
      description: Agency key as a query parameter. Prefer the `Authorization` header.
    SecretKeyQuery:
      type: apiKey
      in: query
      name: sk
      description: Secret key as a query parameter. Prefer the `Authorization` header.
  parameters:
    ExperimentId:
      name: id
      in: path
      required: true
      description: Experiment identifier.
      schema:
        type: string
        format: uuid
  responses:
    RateLimited:
      description: >
        Rate limit exceeded (120 requests per 10s per location). A `Retry-After`
        header indicates when to retry.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UpstreamError:
      description: Upstream data store returned an error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    Window:
      type: object
      required: [from, to]
      properties:
        from:
          type: string
          format: date
          example: "2026-05-01"
        to:
          type: string
          format: date
          example: "2026-05-31"
    RevenueConfig:
      type: object
      description: Where conversion revenue comes from.
      properties:
        source:
          type: string
          enum: [event, table]
          default: event
        event_name:
          type: string
          description: (source=event) Conversion event name.
          example: purchase
        json_path:
          type: string
          description: >
            (source=event) JSON path to the revenue value in properties_json.
            Default `$.value` — properties_json IS the event's properties
            object (e.g. capture('purchase', { value: 99 })).
          example: "$.value"
        timezone:
          type: string
          description: >
            (source=event) IANA timezone for the revenue day boundary (e.g.
            `America/New_York`). Defaults to UTC. Meta spend dates always
            follow the ad account's timezone.
          example: "America/New_York"
        table:
          type: string
          description: (source=table) Commerce table name in the dataset.
          example: transactions
        column:
          type: string
          description: (source=table) Revenue column.
          example: amount
        region_col:
          type: string
          description: (source=table) Region column on the table.
          example: state
        date_col:
          type: string
          description: (source=table) Date/timestamp column on the table.
          example: created_date
    SpendConfig:
      type: object
      description: How Meta spend is attributed to the test.
      properties:
        source:
          type: string
          enum: [geo_stream, campaigns]
        region_col:
          type: string
          description: (source=geo_stream) Region column on the region-broken Meta stream.
          example: region
        table:
          type: string
          description: Meta insights table (defaults to meta_ads_ads_insights_action_type).
        campaign_ids:
          type: array
          items:
            type: string
          description: (source=campaigns) Campaign ids targeting the test regions.
        name_pattern:
          type: string
          description: (source=campaigns) Literal substring matched against campaign_name (`%`/`_` are escaped, not wildcards).
        account_id:
          type: string
          description: >
            Restrict spend to one Meta ad account. Required in practice when
            the location dataset receives multiple connections — otherwise
            whole-account fallback sums every account, and mixed currencies
            are rejected with `422 mixed_currencies`.
        purchase_action_type:
          type: string
          description: >
            Meta action type to read conversion value from (e.g. `lead` for
            lead-gen). Defaults to `omni_purchase` with `purchase` fallback.
            Exactly one type is read — Meta reports the same conversion under
            several overlapping action types, so they are never summed.
          example: lead
    ExperimentDefinition:
      type: object
      required: [test_regions, control_regions, test_window]
      properties:
        test_regions:
          type: array
          items:
            type: string
          example: ["California", "Texas"]
        control_regions:
          type: array
          items:
            type: string
          example: ["Ohio", "Georgia"]
        pre_window:
          allOf:
            - $ref: "#/components/schemas/Window"
          description: >
            Optional baseline period. Defaults to the same-length period
            immediately before test_window.
        test_window:
          $ref: "#/components/schemas/Window"
        revenue:
          $ref: "#/components/schemas/RevenueConfig"
        spend:
          $ref: "#/components/schemas/SpendConfig"
        daily_budget:
          type: number
          description: >
            Planned daily test spend. When present, a power analysis runs at
            create time and the experiment carries a `design` with
            `recommended_days`.
          example: 500
        mde_iroas:
          type: number
          default: 1.0
          description: >
            Minimum detectable iROAS for the power analysis. Default 1.0 =
            size the test to detect break-even incrementality.
        design_lookback_days:
          type: integer
          default: 90
          description: Days of history the power analysis fits the noise floor on.
        cooldown_days:
          type: integer
          description: >
            Extend the measured window this many days past test_window.to so
            lagged conversions land inside the measurement. The launch plan
            keeps geo exclusions in place through the cooldown.
        exclude_dates:
          type: array
          items:
            type: string
            format: date
          description: >
            Dates dropped from the analysis. Use for reported outlier_days —
            outliers are never removed silently.
        alert_webhook_url:
          type: string
          description: >
            https URL POSTed an incrementality.drift_alert payload by the
            daily drift sweep while the test is running.
    ExperimentDesign:
      type: object
      description: Power-analysis output (computed at create when daily_budget is set).
      properties:
        ok:
          type: boolean
        reason:
          type: string
          description: Present when ok=false (insufficient_history, no_revenue_in_regions, no_variance).
        recommended_days:
          type: integer
          description: Minimum test length to conclude at the stated assumptions (floor 7).
          example: 28
        raw_days:
          type: integer
        sigma_daily:
          type: number
          description: Daily residual noise floor the recommendation rests on.
        scaling_k:
          type: number
          description: Pre-period test/control scaling factor.
        baseline_days:
          type: integer
        baseline_window:
          $ref: "#/components/schemas/Window"
        assumptions:
          type: object
          properties:
            daily_budget:
              type: number
            mde_iroas:
              type: number
            alpha:
              type: number
            power:
              type: number
    ExperimentProgress:
      type: object
      description: Derived lifecycle position (computed at read time).
      properties:
        phase:
          type: string
          enum: [pending, running, cooldown, awaiting_compute, computed]
          description: >
            `cooldown` = test window closed but the measured window (test +
            cooldown_days) is still accumulating lagged conversions.
        days_total:
          type: integer
          description: Measured window length (test days + cooldown days).
        test_days:
          type: integer
        cooldown_days:
          type: integer
        days_elapsed:
          type: integer
        days_remaining:
          type: integer
        percent:
          type: integer
        recommended_days:
          type: integer
          nullable: true
        underpowered:
          type: boolean
          nullable: true
          description: True when the planned test window is shorter than recommended_days.
    ExperimentResult:
      type: object
      description: Computed metrics (present once status is `computed`).
      properties:
        incremental_revenue:
          type: number
        test_spend:
          type: number
        platform_revenue:
          type: number
        iroas:
          type: number
        platform_roas:
          type: number
        coefficient:
          type: number
          example: 1.15
        ci_width:
          type: number
          description: Relative CI half-width (90% two-sided) — display only; weighting uses se_coefficient.
        se_lift:
          type: number
          description: Standard error of the incremental-revenue estimate.
        sigma_daily:
          type: number
          description: Daily residual noise floor (dof-corrected for the fitted control weights).
        se_iroas:
          type: number
          description: se_lift ÷ test_spend.
        se_coefficient:
          type: number
          description: se_lift ÷ platform_revenue — drives inverse-variance weighting in /coefficients.
        z_score:
          type: number
        confidence:
          type: number
          description: One-sided confidence the lift is positive, Φ(z) (e.g. 0.97).
          example: 0.97
        p_value:
          type: number
          description: One-sided p-value.
        significant:
          type: boolean
          description: True at one-sided 95% (p_value ≤ 0.05) — consistent with coefficient_ci excluding 0.
        two_sided_significant:
          type: boolean
          description: "|z| ≥ 1.96 — watches both tails; the A/A placebo criterion."
        iroas_ci:
          type: array
          items:
            type: number
          description: 90% two-sided interval on iROAS, [low, high] (±1.645 SE — consistent with the one-sided 95% test).
        coefficient_ci:
          type: array
          items:
            type: number
          description: 90% two-sided interval on the coefficient, [low, high].
        partial:
          type: boolean
          description: True when computed mid-window via allow_partial (excluded from /coefficients until recomputed).
        series_key:
          type: string
          description: Estimand identity (channel + revenue def + spend scope) — /coefficients pools only matching keys.
        spend_currency:
          type: string
          nullable: true
          description: Meta account currency of the spend scope.
        spend_data_through:
          type: string
          format: date
          nullable: true
          description: Latest Meta spend date available at compute time (freshness signal).
        pre_days:
          type: integer
        post_days:
          type: integer
        control_weights:
          type: object
          description: Fitted synthetic-control weight per control region.
          additionalProperties:
            type: number
        fit_r2:
          type: number
          nullable: true
          description: Pre-period fit quality of the control blend.
        outlier_days:
          type: array
          items:
            type: string
            format: date
          description: Days whose residual is >3σ off the pre-period distribution (reported, not removed).
        excluded_dates:
          type: array
          items:
            type: string
            format: date
        control_shift_z:
          type: number
          nullable: true
          description: >
            Control-blend level shift vs pre period, in two-sample SE units.
            INFORMATIONAL: control regions are held out, so a shift here is
            the intended treatment contrast — not by itself evidence of drift.
        warnings:
          type: array
          items:
            type: string
          description: >
            e.g. windows_not_whole_weeks, short_pre_period,
            weights_fallback_single_k, poor_control_fit (excluded from
            /coefficients), spend_data_recent_partial, no_spend_data.
        test_pre:
          type: number
        test_post:
          type: number
        control_pre:
          type: number
        control_post:
          type: number
        computed_at:
          type: string
          format: date-time
    Experiment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        location_id:
          type: string
        name:
          type: string
        channel:
          type: string
          example: meta
        status:
          type: string
          enum: [draft, computed]
        definition:
          $ref: "#/components/schemas/ExperimentDefinition"
        design:
          $ref: "#/components/schemas/ExperimentDesign"
        progress:
          $ref: "#/components/schemas/ExperimentProgress"
        result:
          $ref: "#/components/schemas/ExperimentResult"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateExperimentRequest:
      type: object
      required: [name, definition]
      properties:
        name:
          type: string
          example: "Q3 Meta geo holdout — West"
        channel:
          type: string
          enum: [meta]
          default: meta
          description: v1 is Meta-only (spend + launch-plan adapters are Meta-specific).
        definition:
          $ref: "#/components/schemas/ExperimentDefinition"
    ExperimentResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/Experiment"
    ExperimentListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/Experiment"
    ValidateResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          description: >
            Mode-specific verdict fields plus the full inference detail
            (same fields as ExperimentResult, without spend ratios).
          properties:
            mode:
              type: string
              enum: [aa, interim]
            phase:
              type: string
            aa_pass:
              type: boolean
              description: (mode=aa) Placebo lift NOT significant in either direction (|z| < 1.96) — pairing is valid.
            market_match_quality:
              type: number
              nullable: true
              description: (mode=aa) Synthetic-control fit R².
            drift_detected:
              type: boolean
              description: (mode=interim) Outlier days appeared inside the test window.
            drift_outlier_days:
              type: array
              items:
                type: string
                format: date
              description: (mode=interim) The outlier days behind drift_detected.
            peeking:
              type: boolean
              description: (mode=interim) Interim numbers are not a result.
    EligibilityResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            window:
              $ref: "#/components/schemas/Window"
            eligible:
              type: boolean
            failing_checks:
              type: array
              items:
                type: string
            checks:
              type: object
              properties:
                geo_coverage:
                  type: object
                  properties:
                    pass:
                      type: boolean
                    share_with_region:
                      type: number
                      example: 0.94
                history:
                  type: object
                  properties:
                    pass:
                      type: boolean
                    days_with_data:
                      type: integer
                market_count:
                  type: object
                  properties:
                    pass:
                      type: boolean
                    viable_markets:
                      type: integer
                      description: Regions carrying ≥2% of regional revenue.
                matchability:
                  type: object
                  properties:
                    pass:
                      type: boolean
                    best_match_correlation:
                      type: number
                      nullable: true
                      description: >
                        Best cross-market Pearson correlation among the largest
                        viable markets — big markets you can't match are not
                        test cells. Pass at ≥ 0.5.
                detectability:
                  type: object
                  properties:
                    pass:
                      type: boolean
                    sigma_daily:
                      type: number
                    daily_budget_for_30d_test:
                      type: number
                      description: >
                        Daily spend needed to detect break-even iROAS in a
                        30-day test given this client's noise floor.
                    daily_budget:
                      type: number
                      description: Echoed when provided.
    MarketsResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            window:
              $ref: "#/components/schemas/Window"
            test_regions:
              type: array
              items:
                type: string
            test_total_revenue:
              type: number
            days:
              type: integer
              description: Number of days in the correlated series.
            candidates:
              type: array
              description: Control candidates, best-correlated first.
              items:
                type: object
                properties:
                  region:
                    type: string
                    example: Ohio
                  correlation:
                    type: number
                    nullable: true
                    description: Pearson correlation of daily revenue vs the test set.
                    example: 0.93
                  total_revenue:
                    type: number
                  volume_ratio:
                    type: number
                    nullable: true
                    description: Candidate revenue ÷ test-set revenue over the window.
    CoefficientsResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            type: object
            properties:
              channel:
                type: string
                example: meta
              series_key:
                type: string
                description: Estimand identity this coefficient pools over.
              coefficient:
                type: number
                nullable: true
                example: 1.15
              test_count:
                type: integer
                example: 3
    LaunchPlanResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            strategy:
              type: string
              example: holdout
            launchable:
              type: boolean
              description: False when any control region is unresolved — the targeting change would exclude nothing and the experiment would be invalid.
            launch_blockers:
              type: array
              items:
                type: string
              description: Present when launchable=false — what must be resolved first.
            summary:
              type: string
            apply_on:
              type: string
              format: date
            revert_on:
              type: string
              format: date
              description: The day AFTER the test window ends.
            control_regions:
              type: array
              items:
                $ref: "#/components/schemas/RegionKey"
            test_regions:
              type: array
              items:
                $ref: "#/components/schemas/RegionKey"
            unresolved_regions:
              type: array
              items:
                type: string
              description: Regions not in the built-in US key map — resolve via the verify call.
            targeting_change:
              type: object
              description: The exact excluded_geo_locations object to merge into each ad set's targeting.
            steps:
              type: array
              items:
                type: string
            api_calls:
              type: object
              properties:
                verify_region_keys:
                  type: string
                read_targeting:
                  type: string
                apply_exclusions:
                  type: string
            notes:
              type: array
              items:
                type: string
    RegionKey:
      type: object
      properties:
        key:
          type: string
          example: "3878"
        name:
          type: string
          example: Ohio
    CoefficientHistoryResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            type: object
            properties:
              channel:
                type: string
                example: meta
              series_key:
                type: string
              points:
                type: array
                description: Computed experiments in computed_at order.
                items:
                  type: object
                  properties:
                    experiment_id:
                      type: string
                      format: uuid
                    name:
                      type: string
                    computed_at:
                      type: string
                      format: date-time
                    test_window:
                      $ref: "#/components/schemas/Window"
                    coefficient:
                      type: number
                      description: This experiment's own coefficient.
                    ci_width:
                      type: number
                      nullable: true
                    confidence:
                      type: number
                      nullable: true
                    running_coefficient:
                      type: number
                      description: Weighted median across all tests up to this point.
                    test_count:
                      type: integer
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: object
