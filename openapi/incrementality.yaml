openapi: "3.0.0"
info:
  version: 1.0.0
  title: Incrementality
  description: >
    Geo-holdout incrementality testing and per-channel coefficient derivation.
    Define a test (test/control regions + before/after windows), compute the
    difference-in-differences iROAS from your BigQuery dataset (events revenue +
    Airbyte Meta spend), and read back a confidence-weighted running median
    coefficient per channel. Client-scoped: an agency key (`ak_`) has read-write
    access to a single named location; a location secret key (`sk_`) is a
    read-only viewer of its own location.
servers:
  - url: https://mythic-analytics.gulp.workers.dev
security:
  - BearerAuth: []
  - AgencyKeyQuery: []
  - SecretKeyQuery: []
paths:
  /client/v1/incrementality/eligibility:
    get:
      summary: Check geo-testing eligibility
      operationId: checkEligibility
      description: >
        Pre-flight before any experiment: is this client a viable geo-testing
        candidate? Four checks — geo coverage (share of revenue carrying a
        region), history depth (≥28 days), matchable market count (≥6 regions
        with meaningful revenue), and detectability (the daily budget the
        client's noise floor implies for a conclusive 30-day break-even test;
        judged against `daily_budget` when provided).
      parameters:
        - name: daily_budget
          in: query
          description: Planned daily test spend to judge detectability against.
          required: false
          schema:
            type: number
        - name: lookback_days
          in: query
          description: Days of history to assess. Default `90`, min `14`, max `365`.
          required: false
          schema:
            type: integer
            default: 90
        - name: event_name
          in: query
          description: Conversion event name (default `purchase`).
          required: false
          schema:
            type: string
        - name: json_path
          in: query
          description: JSON path to revenue in properties_json (default `$.properties.value`).
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Eligibility verdict with per-check detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EligibilityResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          description: BigQuery is not configured in this environment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Eligibility query failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /client/v1/incrementality/markets:
    get:
      summary: Rank control markets
      operationId: rankControlMarkets
      description: >
        Daily revenue by region over a lookback window (default 90 days),
        with candidate control markets ranked by Pearson correlation of daily
        revenue against the proposed test set. Use this to design a test:
        propose `test_regions`, take the top-correlated candidates as controls.
        Omit `test_regions` to just inventory revenue by region.
      parameters:
        - name: test_regions
          in: query
          description: Comma-separated proposed test regions (e.g. `California,Texas`).
          required: false
          schema:
            type: string
        - name: lookback_days
          in: query
          description: Days of history to correlate over. Default `90`, min `14`, max `365`.
          required: false
          schema:
            type: integer
            default: 90
        - name: event_name
          in: query
          description: Conversion event name (default `purchase`).
          required: false
          schema:
            type: string
        - name: json_path
          in: query
          description: JSON path to revenue in properties_json (default `$.properties.value`).
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Ranked control-market candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketsResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          description: BigQuery is not configured in this environment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Markets query failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /client/v1/incrementality/experiments:
    get:
      summary: List experiments
      operationId: listExperiments
      description: List the calling location's geo experiments, newest first. Both `ak_` and `sk_` keys may read.
      responses:
        "200":
          description: List of experiments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExperimentListResponse"
        "401":
          description: Missing or invalid key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
    post:
      summary: Create experiment
      operationId: createExperiment
      description: >
        Create a geo-holdout experiment. Requires an agency (`ak_`) key. The
        `definition` is validated by building the compute query — an
        uncomputable definition (bad regions, windows, or identifiers) is
        rejected with `400 invalid_definition`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExperimentRequest"
      responses:
        "201":
          description: Experiment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExperimentResponse"
        "400":
          description: Invalid body or definition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Operation requires an agency (`ak_`) key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/UpstreamError"
  /client/v1/incrementality/experiments/{id}:
    get:
      summary: Get experiment
      operationId: getExperiment
      description: Fetch one experiment (with its computed `result`, if any) for the calling location.
      parameters:
        - $ref: "#/components/parameters/ExperimentId"
      responses:
        "200":
          description: The experiment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExperimentResponse"
        "404":
          description: Experiment not found for this location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
  /client/v1/incrementality/experiments/{id}/compute:
    post:
      summary: Compute experiment
      operationId: computeExperiment
      description: >
        Run the difference-in-differences query for this experiment against the
        location's BigQuery dataset, store the metrics on the experiment's
        `result`, and set `status` to `computed`. Requires an agency (`ak_`) key.
      parameters:
        - $ref: "#/components/parameters/ExperimentId"
      responses:
        "200":
          description: Computed experiment (result populated)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExperimentResponse"
        "400":
          description: Definition is invalid or failed the tenant-scope guard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Operation requires an agency (`ak_`) key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Experiment not found for this location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: BigQuery is not configured in this environment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Compute query failed or the result could not be saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /client/v1/incrementality/experiments/{id}/launch-plan:
    get:
      summary: Get launch plan
      operationId: getLaunchPlan
      description: >
        The complete Meta ad-side recipe for conducting the holdout: control
        regions resolved to Marketing API targeting region keys, the exact
        `excluded_geo_locations` change, apply/revert dates, a step-by-step
        checklist, and paste-ready API calls. Instructions only — Mythic never
        mutates the ad account. Non-US regions are returned under
        `unresolved_regions` with a Targeting Search call to resolve them.
      parameters:
        - $ref: "#/components/parameters/ExperimentId"
      responses:
        "200":
          description: The launch plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaunchPlanResponse"
        "400":
          description: Experiment definition has no test window
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Experiment not found for this location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
  /client/v1/incrementality/coefficients/history:
    get:
      summary: Coefficient history (progressive truth over time)
      operationId: getCoefficientHistory
      description: >
        Every computed experiment's coefficient in computed_at order, each with
        the running confidence-weighted median at that point — watch the
        progressive truth converge test by test.
      parameters:
        - name: channel
          in: query
          description: Restrict to one channel (e.g. `meta`).
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Per-channel coefficient time series
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoefficientHistoryResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/UpstreamError"
  /client/v1/incrementality/coefficients:
    get:
      summary: Get coefficients (progressive truth)
      operationId: getCoefficients
      description: >
        Return the confidence-weighted median coefficient per channel across all
        computed experiments for the location. Tighter tests (smaller
        `ci_width`) pull the median more strongly.
      parameters:
        - name: channel
          in: query
          description: Restrict to one channel (e.g. `meta`).
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Per-channel coefficients
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoefficientsResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >
        Client key as bearer token. Use an agency key (`Bearer ak_...`) for
        read-write access or a location secret key (`Bearer sk_...`) for
        read-only access.
    AgencyKeyQuery:
      type: apiKey
      in: query
      name: ak
      description: Agency key as a query parameter. Prefer the `Authorization` header.
    SecretKeyQuery:
      type: apiKey
      in: query
      name: sk
      description: Secret key as a query parameter. Prefer the `Authorization` header.
  parameters:
    ExperimentId:
      name: id
      in: path
      required: true
      description: Experiment identifier.
      schema:
        type: string
        format: uuid
  responses:
    RateLimited:
      description: >
        Rate limit exceeded (120 requests per 10s per location). A `Retry-After`
        header indicates when to retry.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UpstreamError:
      description: Upstream data store returned an error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    Window:
      type: object
      required: [from, to]
      properties:
        from:
          type: string
          format: date
          example: "2026-05-01"
        to:
          type: string
          format: date
          example: "2026-05-31"
    RevenueConfig:
      type: object
      description: Where conversion revenue comes from.
      properties:
        source:
          type: string
          enum: [event, table]
          default: event
        event_name:
          type: string
          description: (source=event) Conversion event name.
          example: purchase
        json_path:
          type: string
          description: (source=event) JSON path to the revenue value in properties_json.
          example: "$.properties.value"
        table:
          type: string
          description: (source=table) Commerce table name in the dataset.
          example: transactions
        column:
          type: string
          description: (source=table) Revenue column.
          example: amount
        region_col:
          type: string
          description: (source=table) Region column on the table.
          example: state
        date_col:
          type: string
          description: (source=table) Date/timestamp column on the table.
          example: created_date
    SpendConfig:
      type: object
      description: How Meta spend is attributed to the test.
      properties:
        source:
          type: string
          enum: [geo_stream, campaigns]
        region_col:
          type: string
          description: (source=geo_stream) Region column on the region-broken Meta stream.
          example: region
        table:
          type: string
          description: Meta insights table (defaults to meta_ads_ads_insights_action_type).
        campaign_ids:
          type: array
          items:
            type: string
          description: (source=campaigns) Campaign ids targeting the test regions.
        name_pattern:
          type: string
          description: (source=campaigns) Substring matched against campaign_name.
        purchase_action_type:
          type: string
          description: >
            Meta action type to read conversion value from (e.g. `lead` for
            lead-gen). Defaults to `omni_purchase` with `purchase` fallback.
            Exactly one type is read — Meta reports the same conversion under
            several overlapping action types, so they are never summed.
          example: lead
    ExperimentDefinition:
      type: object
      required: [test_regions, control_regions, test_window]
      properties:
        test_regions:
          type: array
          items:
            type: string
          example: ["California", "Texas"]
        control_regions:
          type: array
          items:
            type: string
          example: ["Ohio", "Georgia"]
        pre_window:
          allOf:
            - $ref: "#/components/schemas/Window"
          description: >
            Optional baseline period. Defaults to the same-length period
            immediately before test_window.
        test_window:
          $ref: "#/components/schemas/Window"
        revenue:
          $ref: "#/components/schemas/RevenueConfig"
        spend:
          $ref: "#/components/schemas/SpendConfig"
        daily_budget:
          type: number
          description: >
            Planned daily test spend. When present, a power analysis runs at
            create time and the experiment carries a `design` with
            `recommended_days`.
          example: 500
        mde_iroas:
          type: number
          default: 1.0
          description: >
            Minimum detectable iROAS for the power analysis. Default 1.0 =
            size the test to detect break-even incrementality.
        design_lookback_days:
          type: integer
          default: 90
          description: Days of history the power analysis fits the noise floor on.
    ExperimentDesign:
      type: object
      description: Power-analysis output (computed at create when daily_budget is set).
      properties:
        ok:
          type: boolean
        reason:
          type: string
          description: Present when ok=false (insufficient_history, no_revenue_in_regions, no_variance).
        recommended_days:
          type: integer
          description: Minimum test length to conclude at the stated assumptions (floor 7).
          example: 28
        raw_days:
          type: integer
        sigma_daily:
          type: number
          description: Daily residual noise floor the recommendation rests on.
        scaling_k:
          type: number
          description: Pre-period test/control scaling factor.
        baseline_days:
          type: integer
        baseline_window:
          $ref: "#/components/schemas/Window"
        assumptions:
          type: object
          properties:
            daily_budget:
              type: number
            mde_iroas:
              type: number
            alpha:
              type: number
            power:
              type: number
    ExperimentProgress:
      type: object
      description: Derived lifecycle position (computed at read time).
      properties:
        phase:
          type: string
          enum: [pending, running, awaiting_compute, computed]
        days_total:
          type: integer
        days_elapsed:
          type: integer
        days_remaining:
          type: integer
        percent:
          type: integer
        recommended_days:
          type: integer
          nullable: true
        underpowered:
          type: boolean
          nullable: true
          description: True when the planned window is shorter than recommended_days.
    ExperimentResult:
      type: object
      description: Computed metrics (present once status is `computed`).
      properties:
        incremental_revenue:
          type: number
        test_spend:
          type: number
        platform_revenue:
          type: number
        iroas:
          type: number
        platform_roas:
          type: number
        coefficient:
          type: number
          example: 1.15
        ci_width:
          type: number
          description: Relative 95% CI width used to weight the running median.
        se_lift:
          type: number
          description: Standard error of the incremental-revenue estimate.
        z_score:
          type: number
        confidence:
          type: number
          description: One-sided probability the lift is real (e.g. 0.97).
          example: 0.97
        p_value:
          type: number
        significant:
          type: boolean
          description: True when p_value ≤ 0.05.
        iroas_ci:
          type: array
          items:
            type: number
          description: 95% confidence interval on iROAS, [low, high].
        coefficient_ci:
          type: array
          items:
            type: number
          description: 95% confidence interval on the coefficient, [low, high].
        pre_days:
          type: integer
        post_days:
          type: integer
        test_pre:
          type: number
        test_post:
          type: number
        control_pre:
          type: number
        control_post:
          type: number
        computed_at:
          type: string
          format: date-time
    Experiment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        location_id:
          type: string
        name:
          type: string
        channel:
          type: string
          example: meta
        status:
          type: string
          enum: [draft, computed]
        definition:
          $ref: "#/components/schemas/ExperimentDefinition"
        design:
          $ref: "#/components/schemas/ExperimentDesign"
        progress:
          $ref: "#/components/schemas/ExperimentProgress"
        result:
          $ref: "#/components/schemas/ExperimentResult"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateExperimentRequest:
      type: object
      required: [name, definition]
      properties:
        name:
          type: string
          example: "Q3 Meta geo holdout — West"
        channel:
          type: string
          default: meta
        definition:
          $ref: "#/components/schemas/ExperimentDefinition"
    ExperimentResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/Experiment"
    ExperimentListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/Experiment"
    EligibilityResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            window:
              $ref: "#/components/schemas/Window"
            eligible:
              type: boolean
            failing_checks:
              type: array
              items:
                type: string
            checks:
              type: object
              properties:
                geo_coverage:
                  type: object
                  properties:
                    pass:
                      type: boolean
                    share_with_region:
                      type: number
                      example: 0.94
                history:
                  type: object
                  properties:
                    pass:
                      type: boolean
                    days_with_data:
                      type: integer
                market_count:
                  type: object
                  properties:
                    pass:
                      type: boolean
                    viable_markets:
                      type: integer
                      description: Regions carrying ≥2% of regional revenue.
                detectability:
                  type: object
                  properties:
                    pass:
                      type: boolean
                    sigma_daily:
                      type: number
                    daily_budget_for_30d_test:
                      type: number
                      description: >
                        Daily spend needed to detect break-even iROAS in a
                        30-day test given this client's noise floor.
                    daily_budget:
                      type: number
                      description: Echoed when provided.
    MarketsResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            window:
              $ref: "#/components/schemas/Window"
            test_regions:
              type: array
              items:
                type: string
            test_total_revenue:
              type: number
            days:
              type: integer
              description: Number of days in the correlated series.
            candidates:
              type: array
              description: Control candidates, best-correlated first.
              items:
                type: object
                properties:
                  region:
                    type: string
                    example: Ohio
                  correlation:
                    type: number
                    nullable: true
                    description: Pearson correlation of daily revenue vs the test set.
                    example: 0.93
                  total_revenue:
                    type: number
                  volume_ratio:
                    type: number
                    nullable: true
                    description: Candidate revenue ÷ test-set revenue over the window.
    CoefficientsResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            type: object
            properties:
              channel:
                type: string
                example: meta
              coefficient:
                type: number
                nullable: true
                example: 1.15
              test_count:
                type: integer
                example: 3
    LaunchPlanResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            strategy:
              type: string
              example: holdout
            summary:
              type: string
            apply_on:
              type: string
              format: date
            revert_on:
              type: string
              format: date
              description: The day AFTER the test window ends.
            control_regions:
              type: array
              items:
                $ref: "#/components/schemas/RegionKey"
            test_regions:
              type: array
              items:
                $ref: "#/components/schemas/RegionKey"
            unresolved_regions:
              type: array
              items:
                type: string
              description: Regions not in the built-in US key map — resolve via the verify call.
            targeting_change:
              type: object
              description: The exact excluded_geo_locations object to merge into each ad set's targeting.
            steps:
              type: array
              items:
                type: string
            api_calls:
              type: object
              properties:
                verify_region_keys:
                  type: string
                read_targeting:
                  type: string
                apply_exclusions:
                  type: string
            notes:
              type: array
              items:
                type: string
    RegionKey:
      type: object
      properties:
        key:
          type: string
          example: "3878"
        name:
          type: string
          example: Ohio
    CoefficientHistoryResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            type: object
            properties:
              channel:
                type: string
                example: meta
              points:
                type: array
                description: Computed experiments in computed_at order.
                items:
                  type: object
                  properties:
                    experiment_id:
                      type: string
                      format: uuid
                    name:
                      type: string
                    computed_at:
                      type: string
                      format: date-time
                    test_window:
                      $ref: "#/components/schemas/Window"
                    coefficient:
                      type: number
                      description: This experiment's own coefficient.
                    ci_width:
                      type: number
                      nullable: true
                    confidence:
                      type: number
                      nullable: true
                    running_coefficient:
                      type: number
                      description: Weighted median across all tests up to this point.
                    test_count:
                      type: integer
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: object
