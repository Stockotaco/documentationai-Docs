        dataset_location:
          type: string
          default: US
        staging_bucket_name:
          type: string
        staging_bucket_path:
          type: string
        hmac_key_access_id:
          type: string
        hmac_key_secret:
          type: string
        keep_files_in_gcs_bucket:
          type: string
    ProvisionResult:
      type: object
      properties:
        workspace_id:
          type: string
        destination_id:
          type: string
        status:
          type: string
          example: active
    CreateConnectionRequest:
      type: object
      required:
        - platform
      properties:
        platform:
          type: string
          example: google_ads
        display_name:
          type: string
        account_id:
          type: string
        source_config:
          type: object
        sync_frequency:
          $ref: "#/components/schemas/SyncFrequency"
        streams:
          type: array
          items:
            $ref: "#/components/schemas/Stream"
    AdminCreateConnectionRequest:
      allOf:
        - type: object
          required:
            - client_id
            - agency_id
          properties:
            client_id:
              type: string
              example: acme-retail
            agency_id:
              type: string
        - $ref: "#/components/schemas/CreateConnectionRequest"
    UpdateConnectionRequest:
      type: object
      properties:
        display_name:
          type: string
        sync_frequency:
          $ref: "#/components/schemas/SyncFrequency"
        streams:
          type: array
          items:
            $ref: "#/components/schemas/Stream"
        status:
          type: string
          enum: ["active", "error", "paused"]
    Connection:
      type: object
      properties:
        id:
          type: string
        client_id:
          type: string
        agency_id:
          type: string
        platform:
          type: string
        connection_id:
          type: string
          description: Airbyte connection ID.
        source_id:
          type: string
          description: Airbyte source ID.
        display_name:
          type: string
        account_id:
          type: string
          nullable: true
        status:
          type: string
          enum: ["active", "error", "paused"]
        sync_frequency:
