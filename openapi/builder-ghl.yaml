openapi: "3.0.0"
info:
  version: 1.0.0
  title: GoHighLevel Funnels
  description: >-
    List funnels from the GoHighLevel account linked to a client location. The
    Builder proxies this request server-side using the client's stored GHL
    location ID and proxy API key.
servers:
  - url: https://mythic-analytics.gulp.workers.dev/builder
security:
  - BearerAuth: []
  - AgencyKeyQuery: []
  - SecretKeyQuery: []
paths:
  /ghl/funnels:
    get:
      summary: List GoHighLevel funnels
      operationId: listGhlFunnels
      description: >
        List funnels for the resolved location's linked GoHighLevel account.
        The client's `ghl_location_id` and `proxy_api_key` (stored on the
        location record) are used to authenticate against the GHL Funnels API.
        The GHL response is returned verbatim. Agency keys (`ak_`) must pass
        `?location_id=`.
      parameters:
        - $ref: "#/components/parameters/LocationId"
        - name: limit
          in: query
          description: Maximum funnels to return. Default `50`.
          required: false
          schema:
            type: string
            default: "50"
        - name: offset
          in: query
          description: Number of funnels to skip. Default `0`.
          required: false
          schema:
            type: string
            default: "0"
      responses:
        "200":
          description: >-
            Funnel list, proxied verbatim from the GoHighLevel Funnels API. The
            exact shape follows GHL's `GET /funnels/funnel/list` response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GhlFunnelListResponse"
        "400":
          description: >-
            Missing `?location_id=` (agency key), no GHL Location ID configured
            for the client, or no proxy API key configured for the client.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authorization key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to reach the GHL proxy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: >-
            On a non-2xx from GoHighLevel, the upstream status code is passed
            through with an error envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GhlUpstreamError"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >-
        Builder key as a bearer token. Use an agency key (`Bearer ak_...`) or a
        viewer key (`Bearer sk_...`).
    AgencyKeyQuery:
      type: apiKey
      in: query
      name: ak
      description: "Agency key passed as a query parameter. Format: `ak_...`."
    SecretKeyQuery:
      type: apiKey
      in: query
      name: sk
      description: "Viewer (secret) key passed as a query parameter. Format: `sk_...`."
  parameters:
    LocationId:
      name: location_id
      in: query
      required: false
      description: >-
        Client location to scope the request to. Required when authenticating
        with an agency key (`ak_`). Ignored for viewer keys (`sk_`). This is the
        Mythic location ID, not the GoHighLevel location ID.
      schema:
        type: string
        example: acme-retail
  schemas:
    GhlFunnel:
      type: object
      description: >-
        A GoHighLevel funnel. Fields are defined by the GHL Funnels API and
        passed through unchanged; the properties below are representative.
      properties:
        _id:
          type: string
        name:
          type: string
          example: Product Launch Funnel
        steps:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              url:
                type: string
              sequence:
                type: integer
    GhlFunnelListResponse:
      type: object
      description: Proxied GoHighLevel funnel list response.
      properties:
        funnels:
          type: array
          items:
            $ref: "#/components/schemas/GhlFunnel"
        count:
          type: integer
          example: 5
    GhlUpstreamError:
      type: object
      properties:
        error:
          type: string
          example: "GHL API error: 401"
        details:
          type: string
          description: Raw error body returned by GoHighLevel.
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: No GHL Location ID configured for this client
