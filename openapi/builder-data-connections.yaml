openapi: "3.0.0"
info:
  version: 1.0.0
  title: Data Connections
  description: >-
    List the data connections registered for a client location. A data
    connection defines the engine (Tinybird or BigQuery) and dataset that
    insights and queries run against.
servers:
  - url: https://mythic-analytics.gulp.workers.dev/builder
security:
  - BearerAuth: []
  - AgencyKeyQuery: []
  - SecretKeyQuery: []
paths:
  /data-connections:
    get:
      summary: List data connections
      operationId: listDataConnections
      description: >
        List all data connections for the resolved location. Readable with an
        agency key (`ak_`, requires `?location_id=`) or a viewer key (`sk_`).
      parameters:
        - $ref: "#/components/parameters/LocationId"
      responses:
        "200":
          description: Data connections for the location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataConnectionListResponse"
        "400":
          description: Missing `?location_id=` when using an agency key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authorization key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Database error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >-
        Builder key as a bearer token. Use an agency key (`Bearer ak_...`) or a
        viewer key (`Bearer sk_...`).
    AgencyKeyQuery:
      type: apiKey
      in: query
      name: ak
      description: "Agency key passed as a query parameter. Format: `ak_...`."
    SecretKeyQuery:
      type: apiKey
      in: query
      name: sk
      description: "Viewer (secret) key passed as a query parameter. Format: `sk_...`."
  parameters:
    LocationId:
      name: location_id
      in: query
      required: false
      description: >-
        Client location to scope the request to. Required when authenticating
        with an agency key (`ak_`). Ignored for viewer keys (`sk_`).
      schema:
        type: string
        example: acme-retail
  schemas:
    DataConnection:
      type: object
      properties:
        id:
          type: string
          format: uuid
        location_id:
          type: string
          example: acme-retail
        name:
          type: string
          example: Mythic Analytics (Tinybird)
        engine:
          type: string
          enum: [tinybird, bigquery]
          example: tinybird
        config:
          type: object
          description: >-
            Engine-specific settings. For Tinybird, e.g.
            `{ "datasource": "pubsub_events_analytics_mv" }`; for BigQuery, e.g.
            `{ "project": "...", "dataset": "...", "table": "..." }`.
          example:
            datasource: pubsub_events_analytics_mv
        is_default:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    DataConnectionListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/DataConnection"
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Unauthorized
